# ─────────────────────────────────────────────────────────────────────────────
# lefthook.yml — local git hooks template.
# ─────────────────────────────────────────────────────────────────────────────
# Goal: catch ~90% of CI lint failures *before* push so reviewers and CI
# runners aren't bothered with mechanical issues. See docs/setup-lefthook.md
# for installation, opt-out, and emergency-bypass instructions.
#
# Consumers: this is OPT-IN. Run `lefthook install` once to enable.
# Skipping:
#   LEFTHOOK=0 git commit                       # bypass all hooks (use sparingly)
#   git commit --no-verify                      # bypass current stage only
#   lefthook run pre-commit --tags security     # run only `security`-tagged checks
#   lefthook run pre-commit --exclude-tags lint # run pre-commit minus all `lint`
#
# All commands here must be available in the repo's expected dev environment;
# missing tools degrade gracefully (skip with a notice) instead of failing.
# ─────────────────────────────────────────────────────────────────────────────

min_version: 1.7.0

assert_lefthook_installed: false

# Suppress lefthook's own banner; per-command annotations are what matter.
no_tty: false
colors: true

# ─────────────────────────────────────────────────────────────────────────────
# pre-commit — runs against STAGED files only. Must stay fast (<5s typical).
# ─────────────────────────────────────────────────────────────────────────────
pre-commit:
  parallel: true
  commands:
    # ── guards ────────────────────────────────────────────────────────────
    guard-no-main-commit:
      tags: guard
      run: |
        branch="$(git symbolic-ref --short HEAD 2>/dev/null || echo detached)"
        case "$branch" in
          main|master)
            echo "::error::Direct commits to '$branch' are forbidden. Create a feature branch."
            exit 1
            ;;
        esac

    guard-dotenv:
      tags: guard security
      glob: ".env*"
      run: |
        for f in {staged_files}; do
          case "$(basename "$f")" in
            .env|.env.*)
              # .env.example / .env.sample / .env.template are allowed.
              case "$(basename "$f")" in
                .env.example|.env.sample|.env.template) continue ;;
              esac
              echo "::error file=$f::Refusing to commit '$f'. Add it to .gitignore and use a secret manager."
              exit 1
              ;;
          esac
        done

    guard-large-files:
      tags: guard
      run: |
        threshold=524288  # 512KB
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          size=$(wc -c < "$f" | tr -d ' ')
          if [ "$size" -gt "$threshold" ]; then
            echo "::error file=$f::File is ${size} bytes (> ${threshold}). Use Git LFS or split it."
            exit 1
          fi
        done

    guard-secrets:
      tags: guard security
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --verbose --redact
        else
          echo "::notice::gitleaks not installed; skipping local secret scan (CI still runs full scan)"
        fi

    # ── unpinned-action quick check (cheap pre-cursor to verify-sha) ──────
    forbid-unpinned-actions:
      tags: lint security
      glob: "{**/*.yml,**/*.yaml}"
      exclude: "manifest.yml|manifest-pending.yml"
      run: |
        bad=0
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          # Look for `uses: <owner>/<repo>@<ref>` where ref is NOT a 40-char hex SHA.
          # Local refs (./...) and docker:// refs are allowed.
          while IFS= read -r line; do
            ref="${line##*@}"
            ref="${ref%%[[:space:]]*}"
            ref="${ref%\"}"
            ref="${ref#\"}"
            case "$ref" in
              "")           continue ;;
              ./*|docker:*) continue ;;
            esac
            if ! printf '%s' "$ref" | grep -qE '^[0-9a-f]{40}$'; then
              echo "::error file=$f::Unpinned action ref '@$ref' — pin to a 40-char SHA (see manifest.yml)."
              bad=1
            fi
          done < <(grep -nE '^[[:space:]]*uses:[[:space:]]*[^./[:space:]][^[:space:]]+@' "$f" || true)
        done
        exit "$bad"

    # ── format / lint ─────────────────────────────────────────────────────
    shell-lint:
      tags: lint
      glob: "*.sh"
      run: |
        if command -v shellcheck >/dev/null 2>&1; then
          shellcheck {staged_files}
        else
          echo "::notice::shellcheck not installed; skipping shell lint"
        fi

    shell-format:
      tags: format
      glob: "*.sh"
      stage_fixed: true
      run: |
        if command -v shfmt >/dev/null 2>&1; then
          # -i 2 (2-space indent), -ci (switch case indent), -s (simplify), -w (write)
          shfmt -i 2 -ci -s -w {staged_files}
        else
          echo "::notice::shfmt not installed; skipping shell format"
        fi

    yaml-lint:
      tags: lint
      glob: "*.{yml,yaml}"
      run: |
        if command -v yamllint >/dev/null 2>&1; then
          yamllint {staged_files}
        else
          echo "::notice::yamllint not installed; skipping yaml lint"
        fi

    actionlint:
      tags: lint
      # Lint workflow files and reusable composite action.yml definitions.
      glob: "{.github/workflows/**/*.{yml,yaml},actions/**/action.yml,actions/**/action.yaml,action.yml}"
      run: |
        if command -v actionlint >/dev/null 2>&1; then
          actionlint -color {staged_files}
        else
          echo "::notice::actionlint not installed; skipping (brew install actionlint)"
        fi

    json-validate:
      tags: lint
      glob: "*.json"
      run: |
        bad=0
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          if command -v jq >/dev/null 2>&1; then
            if ! jq empty "$f" >/dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON."
              bad=1
            fi
          elif command -v python3 >/dev/null 2>&1; then
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" >/dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON."
              bad=1
            fi
          else
            echo "::notice::neither jq nor python3 available; skipping JSON validation"
            break
          fi
        done
        exit "$bad"

    bats-lint:
      tags: lint
      glob: "*.bats"
      run: |
        # bats has no formatter; lint as bash via shellcheck.
        if command -v shellcheck >/dev/null 2>&1; then
          shellcheck -s bash {staged_files}
        fi

    eof-newline:
      tags: format
      # Most text files; skip binaries / known formatted-as-is fixtures.
      glob: "*.{sh,bats,yml,yaml,json,md,toml,py,go,ts,tsx,js,jsx}"
      run: |
        bad=0
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          # File must end with a newline.
          if [ -n "$(tail -c1 "$f")" ]; then
            echo "::error file=$f::Missing trailing newline at EOF."
            bad=1
          fi
        done
        exit "$bad"

    # ── manifest-aware verify-sha (cheap when triggered) ──────────────────
    verify-sha-when-manifest-changed:
      tags: security
      # Only run the full verify-sha when manifest or any uses:-bearing file changes.
      glob: "{manifest.yml,manifest-pending.yml,.github/workflows/**/*.{yml,yaml},actions/**/*.{yml,yaml}}"
      run: |
        if [ -x .github/scripts/verify-sha-consistency.sh ] && command -v yq >/dev/null 2>&1; then
          bash .github/scripts/verify-sha-consistency.sh
        else
          echo "::notice::yq not installed; skipping local verify-sha (CI still runs)"
        fi

# ─────────────────────────────────────────────────────────────────────────────
# commit-msg — runs once per commit. Cheap.
# ─────────────────────────────────────────────────────────────────────────────
commit-msg:
  commands:
    conventional-commit:
      run: |
        msg_file="{1}"
        first_line="$(head -n1 "$msg_file")"
        case "$first_line" in
          "Merge "*|"Revert "*|"fixup! "*|"squash! "*) exit 0 ;;
        esac
        if ! echo "$first_line" | grep -qE '^(feat|fix|refactor|docs|test|chore|perf|ci|build|style|revert)(\(.+\))?(!)?: .{1,}$'; then
          echo "::error::Commit subject does not follow Conventional Commits."
          echo "::error::Got: '$first_line'"
          echo "::error::Expected: '<type>(<scope>)?: <subject>' where type ∈ feat|fix|refactor|docs|test|chore|perf|ci|build|style|revert"
          exit 1
        fi

    subject-length:
      run: |
        msg_file="{1}"
        first_line="$(head -n1 "$msg_file")"
        case "$first_line" in
          "Merge "*|"Revert "*|"fixup! "*|"squash! "*) exit 0 ;;
        esac
        len=${#first_line}
        if [ "$len" -gt 72 ]; then
          echo "::error::Commit subject is ${len} chars (> 72). Tighten it or move detail to the body."
          exit 1
        fi

    body-line-length:
      run: |
        msg_file="{1}"
        # Warn-only: long body lines hurt git log readability but shouldn't block.
        long=0
        # Skip subject (line 1) and the blank separator (line 2).
        awk 'NR>2 && length($0) > 100 {print NR": "length($0)" chars"}' "$msg_file" | while IFS= read -r line; do
          [ -n "$line" ] && echo "::warning::Long body line — $line"
          long=1
        done
        exit 0

# ─────────────────────────────────────────────────────────────────────────────
# pre-push — broader checks. Allowed to be slower (target <30s).
# ─────────────────────────────────────────────────────────────────────────────
pre-push:
  parallel: true
  commands:
    bats:
      tags: test
      run: |
        if command -v bats >/dev/null 2>&1 && [ -d tests ]; then
          bats tests/scripts tests/actions
        else
          echo "::notice::bats not installed or tests/ missing; skipping pre-push test run"
        fi

    verify-sha:
      tags: security
      run: |
        if [ -x .github/scripts/verify-sha-consistency.sh ] && command -v yq >/dev/null 2>&1; then
          bash .github/scripts/verify-sha-consistency.sh
        else
          echo "::notice::yq not installed; skipping local verify-sha (CI still runs)"
        fi

    actionlint-full:
      tags: lint
      run: |
        if command -v actionlint >/dev/null 2>&1; then
          actionlint -color
        else
          echo "::notice::actionlint not installed; skipping repo-wide actionlint"
        fi

    shellcheck-full:
      tags: lint
      # Repo-wide shellcheck across all tracked .sh files. Skipped if heavy users
      # set LEFTHOOK_EXCLUDE=lint or remove the tag locally.
      run: |
        if ! command -v shellcheck >/dev/null 2>&1; then
          echo "::notice::shellcheck not installed; skipping repo-wide shell lint"
          exit 0
        fi
        # Use NUL-delimited paths to handle spaces; restrict to tracked files.
        files="$(git ls-files -z '*.sh' | xargs -0 -I{} echo {})"
        if [ -z "$files" ]; then
          echo "::notice::no .sh files tracked; skipping"
          exit 0
        fi
        # shellcheck disable=SC2086
        shellcheck $files

    yamllint-full:
      tags: lint
      run: |
        if ! command -v yamllint >/dev/null 2>&1; then
          echo "::notice::yamllint not installed; skipping repo-wide yaml lint"
          exit 0
        fi
        yamllint .

# ─────────────────────────────────────────────────────────────────────────────
# post-merge — friendly nudges, never blocking.
# ─────────────────────────────────────────────────────────────────────────────
post-merge:
  commands:
    notify-lefthook-changed:
      run: |
        if git diff --name-only HEAD@{1} HEAD 2>/dev/null | grep -qx 'lefthook.yml'; then
          echo "::notice::lefthook.yml changed — run 'lefthook install' to refresh local hooks."
        fi
