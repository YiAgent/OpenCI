name: "Publish Gate Context"
description: |
  Publish gate context as a workflow artifact for downstream consumers.
  Central coordination point for the PR gate pattern.

inputs:
  pr-number:
    description: "Pull request number"
    required: true
  head-sha:
    description: "Head commit SHA"
    required: true
  gate-result:
    description: "Gate result (success/failure/skipped)"
    required: true
  changes:
    description: "JSON object of changed areas (e.g. {\"backend\":true,\"frontend\":false})"
    required: true
  secrets-ok:
    description: "Whether all required secrets are present"
    required: false
    default: "true"
  runner-env:
    description: "JSON object of runner environment versions"
    required: false
    default: "{}"

runs:
  using: "composite"
  steps:
    - name: Build gate context
      id: context
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr-number }}
        HEAD_SHA: ${{ inputs.head-sha }}
        GATE_RESULT: ${{ inputs.gate-result }}
        CHANGES: ${{ inputs.changes }}
        SECRETS_OK: ${{ inputs.secrets-ok }}
        RUNNER_ENV: ${{ inputs.runner-env }}
      run: |
        set -euo pipefail
        cat > gate-context.json << EOF
        {
          "gate_version": "1.0",
          "pr_number": $PR_NUMBER,
          "head_sha": "$HEAD_SHA",
          "gate_result": "$GATE_RESULT",
          "changes": $CHANGES,
          "secrets_ok": $SECRETS_OK,
          "runner_env": $RUNNER_ENV,
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF
        echo "## Gate Context Published" >> "$GITHUB_STEP_SUMMARY"
        echo '```json' >> "$GITHUB_STEP_SUMMARY"
        cat gate-context.json >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: gate-context
        path: gate-context.json
        retention-days: 1
        overwrite: true
