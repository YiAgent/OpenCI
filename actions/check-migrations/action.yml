name: "Check Database Migrations"
description: |
  Validate database migrations are consistent and can be applied.
  Checks for pending migrations and migration file integrity.

inputs:
  migration-dir:
    description: "Directory containing migration files"
    required: true
  database-url:
    description: "Database connection URL"
    required: false
    default: ""

outputs:
  migrations-ok:
    description: "Whether migrations are valid"
    value: ${{ steps.check.outputs.migrations_ok }}

runs:
  using: "composite"
  steps:
    - name: Check migration files
      id: check
      shell: bash
      env:
        MIGRATION_DIR: ${{ inputs.migration-dir }}
      run: |
        set -euo pipefail

        if [ ! -d "$MIGRATION_DIR" ]; then
          echo "::warning::Migration directory not found: $MIGRATION_DIR"
          echo "migrations_ok=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Check for duplicate migration timestamps
        DUPLICATES=$(ls "$MIGRATION_DIR" | cut -d_ -f1 | sort | uniq -d)
        if [ -n "$DUPLICATES" ]; then
          echo "::error::Duplicate migration timestamps: $DUPLICATES"
          echo "migrations_ok=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        # Check migration ordering
        PREV=""
        for FILE in $(ls "$MIGRATION_DIR" | sort); do
          if [ -n "$PREV" ] && [[ "$FILE" < "$PREV" ]]; then
            echo "::error::Migration ordering issue: $FILE after $PREV"
            echo "migrations_ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          PREV="$FILE"
        done

        echo "migrations_ok=true" >> "$GITHUB_OUTPUT"
        echo "::notice::Found $(ls "$MIGRATION_DIR" | wc -l) migration files"

    - name: Summary
      shell: bash
      run: |
        echo "## Migration Check" >> "$GITHUB_STEP_SUMMARY"
        echo "- Directory: ${{ inputs.migration-dir }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Status: ${{ steps.check.outputs.migrations_ok }}" >> "$GITHUB_STEP_SUMMARY"
