name: "Deploy to Vercel"
description: |
  Deploy a project to Vercel.

inputs:
  token:
    description: "Vercel token"
    required: true
  project-id:
    description: "Vercel project ID"
    required: true
  org-id:
    description: "Vercel org ID"
    required: true
  prod:
    description: "Deploy to production"
    required: false
    default: "false"

outputs:
  deployment-url:
    description: "Deployment URL"
    value: ${{ steps.deploy.outputs.url }}

runs:
  using: "composite"
  steps:
    - name: Deploy to Vercel
      id: deploy
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ inputs.token }}
        vercel-project-id: ${{ inputs.project-id }}
        vercel-org-id: ${{ inputs.org-id }}
        vercel-args: ${{ inputs.prod == 'true' && '--prod' || '' }}

    - name: Summary
      shell: bash
      run: |
        echo "## Deploy to Vercel" >> "$GITHUB_STEP_SUMMARY"
        echo "- Project: ${{ inputs.project-id }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Production: ${{ inputs.prod }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
