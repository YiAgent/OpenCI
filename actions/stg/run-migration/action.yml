# ─────────────────────────────────────────────────────────────────────────────
# stg/run-migration — run a real DB migration against staging.
# ─────────────────────────────────────────────────────────────────────────────
# Same harness shape as ci/check-migration but executes a non-dry-run command.
# Caller MUST provide a command that is itself idempotent (re-runs are safe).
# ─────────────────────────────────────────────────────────────────────────────
name: STG · Run Migration
description: Run a DB migration command, fail on non-zero exit.

inputs:
  migration-cmd:
    description: Shell command that runs the migration.
    required: true

runs:
  using: composite
  steps:
    - name: Run migration
      shell: bash
      env:
        MIGRATION_CMD: ${{ inputs.migration-cmd }}
      run: |
        set -euo pipefail
        echo "::notice title=Migration Apply::cmd=${MIGRATION_CMD}"
        bash -c "$MIGRATION_CMD"
        echo "::notice title=Migration Apply::ok"
