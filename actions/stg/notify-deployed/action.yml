# ─────────────────────────────────────────────────────────────────────────────
# stg/notify-deployed — Slack notification for staging deploy outcome.
# ─────────────────────────────────────────────────────────────────────────────
# This composite delegates to integrations/slack-notify (an ATOM, not a
# composite — see SPEC GC2: composites cannot call composites).
# ─────────────────────────────────────────────────────────────────────────────
name: STG · Notify Deployed
description: Post staging deploy status to Slack.

inputs:
  status:
    description: success | failure
    required: true
  app-name:
    description: Application name.
    required: true
  image-ref:
    description: Image reference that was deployed.
    required: true
  webhook-url:
    description: Slack webhook URL (empty → graceful skip).
    required: false
    default: ""
  run-url:
    description: GitHub Actions run URL.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: ./actions/integrations/slack-notify
      with:
        webhook-url: ${{ inputs.webhook-url }}
        status:      ${{ inputs.status }}
        title:       "STG · ${{ inputs.app-name }} · ${{ inputs.status }}"
        body:        "Image: `${{ inputs.image-ref }}`"
        link:        ${{ inputs.run-url }}
