# ─────────────────────────────────────────────────────────────────────────────
# stg/agent-test — autonomous L1-L4 testing skeleton.
# ─────────────────────────────────────────────────────────────────────────────
# STATUS: skeleton. Each level has a different harness (curl + fuzzer for
# L1, property-based testing tool for L2, browser automation for L4).
# We pass the level to claude-harness which produces a finding JSON; the
# real "exec the test" piece is consumer-specific. Findings land in
# triage/agent-test/<level>.json for the reporter to pick up.
# ─────────────────────────────────────────────────────────────────────────────
name: STG · Agent Test
description: Autonomous staging test (L1 schema fuzz / L2 property / L3 scenario / L4 browser).

inputs:
  level:        { required: true,  description: "1 | 2 | 3 | 4" }
  health-url:   { required: true,  description: Staging health URL }
  image-digest: { required: true,  description: Deployed image digest }
  anthropic-api-key: { required: true, description: ANTHROPIC_API_KEY }

  api-base-url:
    required: false
    default: ""
    description: Custom Anthropic-compatible base URL
  model:
    required: false
    default: ""
    description: Override the Claude model (defaults to claude-harness composite default)

runs:
  using: composite
  steps:
    - id: ctx
      shell: bash
      env:
        L:      ${{ inputs.level }}
        URL:    ${{ inputs.health-url }}
        DIGEST: ${{ inputs.image-digest }}
      run: |
        ctx="$(jq -nc \
          --arg level "$L" \
          --arg url   "$URL" \
          --arg dig   "$DIGEST" \
          '{level: ($level | tonumber), health_url: $url, image_digest: $dig}')"
        {
          echo "context<<__OPENCI_EOF__"
          echo "$ctx"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - id: harness
      uses: ./.openci/actions/_common/claude-harness
      with:
        task:      stg/agent-test
        context:   ${{ steps.ctx.outputs.context }}
        max-turns: "10"
        api-key:   ${{ inputs.anthropic-api-key }}

        api-base-url:  ${{ inputs.api-base-url }}
        model:         ${{ inputs.model || 'claude-sonnet-4-5-20250929' }}
    # `result` is a transcript PATH under claude-code-action@v1.x; extract the
    # agent's finding text so the staged file holds the report, not a path.
    - name: Extract findings
      id: findings
      uses: ./.openci/actions/_common/extract-text
      with:
        execution-file: ${{ steps.harness.outputs.execution-file }}

    - name: Stage findings
      shell: bash
      env:
        L: ${{ inputs.level }}
        OUTPUT: ${{ steps.findings.outputs.text }}
      run: |
        mkdir -p triage/agent-test
        printf '%s\n' "$OUTPUT" > "triage/agent-test/L${L}.json"
        echo "::notice title=Agent Test Staged::level=$L"

    - uses: ./.openci/actions/_common/gitleaks-artifact
      with:
        scan-path: triage/agent-test
