name: "Consume Gate Context"
description: |
  Download and parse gate context artifact from the PR gate workflow.
  Determines whether the current workflow should run based on gate results.

inputs:
  area:
    description: "Area to check (backend/frontend/docs/infra/ci)"
    required: false
    default: ""

outputs:
  gate-ok:
    description: "Whether the gate passed"
    value: ${{ steps.parse.outputs.gate_ok }}
  should-run:
    description: "Whether this workflow should run"
    value: ${{ steps.parse.outputs.should_run }}
  pr-number:
    description: "PR number from gate context"
    value: ${{ steps.parse.outputs.pr_number }}
  head-sha:
    description: "Head SHA from gate context"
    value: ${{ steps.parse.outputs.head_sha }}

runs:
  using: "composite"
  steps:
    - name: Download gate context
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
      with:
        name: gate-context
        path: gate-context/

    - name: Parse gate context
      id: parse
      shell: bash
      env:
        AREA: ${{ inputs.area }}
      run: python3 ${{ github.action_path }}/scripts/parse.py gate-context/gate-context.json "$AREA"

    - name: Summary
      shell: bash
      run: |
        echo "## Gate Context" >> "$GITHUB_STEP_SUMMARY"
        echo "- Gate OK: ${{ steps.parse.outputs.gate_ok }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Should Run: ${{ steps.parse.outputs.should_run }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Area: ${{ inputs.area }}" >> "$GITHUB_STEP_SUMMARY"
