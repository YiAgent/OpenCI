name: "Run Lint"
description: |
  Run linting with reviewdog annotations for inline PR feedback.
  Supports ruff, eslint, golangci-lint, and custom tools.

inputs:
  tool:
    description: "Lint tool to use (ruff/eslint/golangci-lint/custom)"
    required: true
  level:
    description: "Annotation level (error/warning/info)"
    required: false
    default: "warning"
  reviewdog-reporter:
    description: "reviewdog reporter (github-pr-review/github-check/github-pr-check)"
    required: false
    default: "github-pr-review"
  working-directory:
    description: "Working directory for lint command"
    required: false
    default: "."
  custom-command:
    description: "Custom lint command (when tool=custom)"
    required: false
    default: ""
  filter-mode:
    description: "reviewdog filter mode (added/diff_context/file/nofilter)"
    required: false
    default: "added"
  fail-on-error:
    description: "Fail action on lint errors"
    required: false
    default: "false"

outputs:
  issues-found:
    description: "Number of issues found"
    value: ${{ steps.lint.outputs.issues_found }}

runs:
  using: "composite"
  steps:
    - name: Install reviewdog
      shell: bash
      run: |
        curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b "$HOME/bin" v0.20.3
        echo "$HOME/bin" >> "$GITHUB_PATH"

    - name: Run lint
      id: lint
      shell: bash
      env:
        TOOL: ${{ inputs.tool }}
        LEVEL: ${{ inputs.level }}
        REPORTER: ${{ inputs.reviewdog-reporter }}
        WORKDIR: ${{ inputs.working-directory }}
        CUSTOM_CMD: ${{ inputs.custom-command }}
        FILTER_MODE: ${{ inputs.filter-mode }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
        REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        cd "$WORKDIR"

        case "$TOOL" in
          ruff)
            LINT_CMD="ruff check --output-format=concise ."
            ;;
          eslint)
            LINT_CMD="eslint --format compact ."
            ;;
          golangci-lint)
            LINT_CMD="golangci-lint run --out-format=line-number ./..."
            ;;
          custom)
            if [ -z "$CUSTOM_CMD" ]; then
              echo "::error::custom-command is required when tool=custom"
              exit 1
            fi
            LINT_CMD="$CUSTOM_CMD"
            ;;
          *)
            echo "::error::Unknown tool: $TOOL"
            exit 1
            ;;
        esac

        set +e
        REVIEWDOG_EXIT=0
        eval "$LINT_CMD" 2>&1 | reviewdog -f=pep8 -name="$TOOL" -reporter="$REPORTER" -level="$LEVEL" -filter-mode="$FILTER_MODE" || REVIEWDOG_EXIT=$?
        set -e

        # Count issues from reviewdog output
        ISSUES=$(eval "$LINT_CMD" 2>&1 | wc -l || true)
        echo "issues_found=$ISSUES" >> "$GITHUB_OUTPUT"

        if [ "$FAIL_ON_ERROR" = "true" ] && [ "$REVIEWDOG_EXIT" -ne 0 ]; then
          exit 1
        fi

    - name: Summary
      if: always()
      shell: bash
      run: |
        echo "## Lint Results" >> "$GITHUB_STEP_SUMMARY"
        echo "- Tool: ${{ inputs.tool }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Issues: ${{ steps.lint.outputs.issues-found }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Reporter: ${{ inputs.reviewdog-reporter }}" >> "$GITHUB_STEP_SUMMARY"
