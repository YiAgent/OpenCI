name: "Build Docker Image"
description: |
  Build and push a multi-arch Docker image.
  Uses Docker Buildx for cross-platform builds.

inputs:
  context:
    description: "Build context directory"
    required: false
    default: "."
  file:
    description: "Dockerfile path"
    required: false
    default: "Dockerfile"
  tags:
    description: "Image tags (newline-separated)"
    required: true
  platforms:
    description: "Target platforms (comma-separated)"
    required: false
    default: "linux/amd64"
  push:
    description: "Push image to registry"
    required: false
    default: "true"
  registry:
    description: "Container registry URL"
    required: false
    default: "ghcr.io"
  username:
    description: "Registry username"
    required: false
    default: ""
  password:
    description: "Registry password/token"
    required: false
    default: ""

outputs:
  image-digest:
    description: "Image digest"
    value: ${{ steps.build.outputs.digest }}
  image-tag:
    description: "Primary image tag"
    value: ${{ steps.meta.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

    - name: Login to registry
      if: inputs.username != ''
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
      with:
        images: ${{ inputs.registry }}/${{ github.repository }}
        tags: ${{ inputs.tags }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc6bb6  # v6.18.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Summary
      shell: bash
      run: |
        echo "## Build Image" >> "$GITHUB_STEP_SUMMARY"
        echo "- Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Platforms: ${{ inputs.platforms }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Pushed: ${{ inputs.push }}" >> "$GITHUB_STEP_SUMMARY"
