# ─────────────────────────────────────────────────────────────────────────────
# integrations/slack-notify — atomic Slack notifier (graceful-skip).
# ─────────────────────────────────────────────────────────────────────────────
# This is an ATOM (single responsibility, no other composites/atoms called),
# so callers from a composite (e.g. _common/notify-deployed) don't break the
# "composite cannot call composite" rule (SPEC GC2).
# ─────────────────────────────────────────────────────────────────────────────
name: Slack Notify (atom)
description: Post a Block Kit message to Slack when SLACK_WEBHOOK_URL is set.

inputs:
  webhook-url:
    description: Slack incoming-webhook URL. Empty → graceful skip.
    required: false
    default: ""
  status:
    description: success | failure | warning | info.
    required: false
    default: info
  title:
    description: Message title.
    required: true
  body:
    description: Message body (markdown).
    required: false
    default: ""
  link:
    description: URL to attach as a primary action button.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check webhook
      id: check
      shell: bash
      env:
        URL: ${{ inputs.webhook-url }}
      run: |
        if [ -z "$URL" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Slack Skipped::SLACK_WEBHOOK_URL not configured, graceful skip"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build payload
      if: steps.check.outputs.skip != 'true'
      id: payload
      shell: bash
      env:
        STATUS: ${{ inputs.status }}
        TITLE:  ${{ inputs.title }}
        BODY:   ${{ inputs.body }}
        LINK:   ${{ inputs.link }}
      run: |
        case "$STATUS" in
          success) emoji=":white_check_mark:" ;;
          failure) emoji=":x:"                 ;;
          warning) emoji=":warning:"           ;;
          *)       emoji=":information_source:" ;;
        esac
        echo "::notice title=Slack Notify (would-send)::status=$STATUS title=$TITLE link=$LINK"
        echo "emoji=$emoji" >> "$GITHUB_OUTPUT"

    - uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
      if: steps.check.outputs.skip != 'true'
      with:
        webhook:      ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload: |
          {
            "text": "${{ steps.payload.outputs.emoji }} ${{ inputs.title }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${{ steps.payload.outputs.emoji }} *${{ inputs.title }}*\n${{ inputs.body }}"
                }
              }
            ]
          }
