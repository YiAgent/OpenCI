name: Linear Bridge
description: Create a git branch named after a Linear issue.

inputs:
  linear-id:    { required: true, description: Linear issue id (e.g. AIC-123) }
  linear-title: { required: true, description: Issue title }
  linear-labels: { required: false, default: "", description: Comma-separated labels }
  base-branch:  { required: false, default: main, description: Base ref for the new branch }
  github-token:
    required: true
    description: "GITHUB_TOKEN with contents:write"

outputs:
  branch:
    value: ${{ steps.derive.outputs.branch }}
  branch-url:
    value: ${{ steps.create.outputs.url }}
  already-existed:
    value: ${{ steps.create.outputs.already-existed }}

runs:
  using: composite
  steps:
    - id: derive
      shell: bash
      env:
        LINEAR_ID:     ${{ inputs.linear-id }}
        LINEAR_TITLE:  ${{ inputs.linear-title }}
        LINEAR_LABELS: ${{ inputs.linear-labels }}
      run: bash "${{ github.action_path }}/derive-branch.sh"

    - id: create
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO:     ${{ github.repository }}
        BRANCH:   ${{ steps.derive.outputs.branch }}
        BASE:     ${{ inputs.base-branch }}
      run: |
        set -euo pipefail
        url="https://github.com/${REPO}/tree/${BRANCH}"

        # Check if branch exists already.
        if gh api "repos/${REPO}/branches/${BRANCH}" >/dev/null 2>&1; then
          echo "already-existed=true" >> "$GITHUB_OUTPUT"
          echo "url=$url"             >> "$GITHUB_OUTPUT"
          echo "::notice title=Linear Bridge::branch already exists: $BRANCH"
          exit 0
        fi

        # Resolve base sha.
        base_sha="$(gh api "repos/${REPO}/git/refs/heads/${BASE}" --jq '.object.sha')"

        # Create.
        gh api -X POST "repos/${REPO}/git/refs" \
          -f ref="refs/heads/${BRANCH}" \
          -f sha="${base_sha}" >/dev/null

        echo "already-existed=false" >> "$GITHUB_OUTPUT"
        echo "url=$url"               >> "$GITHUB_OUTPUT"
        echo "::notice title=Linear Bridge::created branch $BRANCH from $BASE"
