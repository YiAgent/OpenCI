name: Docs · Execute Plan
description: >
  Apply high-confidence doc updates from a docs-action-plan/v1 by committing
  files to a new branch and opening a pull request.

inputs:
  action-plan:
    description: Compact JSON string of the docs-action-plan/v1 produced by the agent.
    required: true
  run-id:
    description: GitHub run ID used as the branch suffix and in the PR body.
    required: true

outputs:
  pr-url:
    description: HTML URL of the auto-update PR, if one was created.
    value: ${{ steps.run.outputs.pr-url }}
  pr-number:
    description: Number of the auto-update PR, if one was created.
    value: ${{ steps.run.outputs.pr-number }}

runs:
  using: composite
  steps:
    - name: Apply plan and open PR
      id: run
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
      env:
        ACTION_PLAN: ${{ inputs.action-plan }}
        RUN_ID:      ${{ inputs.run-id }}
      with:
        script: |
          const { executeDocsPlan } = require('${{ github.action_path }}/execute.js');
          await executeDocsPlan({ github, context, env: process.env });
