# ─────────────────────────────────────────────────────────────────────────────
# docs/detect — Stage 2: code-doc drift analysis + agent workspace build.
# ─────────────────────────────────────────────────────────────────────────────
# Detects three classes of documentation debt:
#   drift      — code changed since last doc commit, docs untouched
#   api-stale  — OpenAPI spec older than its source directory
#   changelog  — merged PRs not yet reflected in CHANGELOG.md
#
# Packages findings into docs-workspace/ and uploads as an artifact for
# Stage 3 (agent) to consume.
# ─────────────────────────────────────────────────────────────────────────────
name: Docs · Detect
description: Detect code-doc drift and build the agent workspace artifact.

inputs:
  docs-path:
    description: Documentation directory to analyse.
    required: false
    default: docs
  api-spec-path:
    description: Path to OpenAPI spec file. Leave empty to skip API staleness check.
    required: false
    default: ""
  api-source-path:
    description: Source directory compared against api-spec-path modification times.
    required: false
    default: src

outputs:
  drift-detected:
    description: '"true" when code changed but docs did not.'
    value: ${{ steps.analyse.outputs.drift-detected }}
  api-stale:
    description: '"true" when the OpenAPI spec is older than the source directory.'
    value: ${{ steps.analyse.outputs.api-stale }}
  changelog-stale:
    description: '"true" when merged PRs post-date the last CHANGELOG update.'
    value: ${{ steps.analyse.outputs.changelog-stale }}
  needs-update:
    description: '"true" when any detection check triggered.'
    value: ${{ steps.analyse.outputs.needs-update }}

runs:
  using: composite
  steps:
    - name: Analyse drift and collect signals
      id: analyse
      shell: bash
      env:
        DOCS_PATH:       ${{ inputs.docs-path || 'docs' }}
        API_SPEC_PATH:   ${{ inputs.api-spec-path }}
        API_SOURCE_PATH: ${{ inputs.api-source-path || 'src' }}
        GH_TOKEN:        ${{ github.token }}
        PR_NUMBER:       ${{ github.event.pull_request.number }}
        EVENT_NAME:      ${{ github.event_name }}
      run: bash "${{ github.action_path }}/detect.sh"

    - name: Load agent context
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p docs-workspace
        # Merge: OpenCI defaults first, then consumer overrides
        {
          cat .openci/.github/agent/shared/context/AGENTS.md  2>/dev/null || true
          printf '\n'
          cat .openci/.github/agent/docs/context/rules.md     2>/dev/null || true
          printf '\n'
          cat .openci/.github/agent/docs/context/structure.md 2>/dev/null || true
          printf '\n'
          cat .openci/.github/agent/docs/context/changelog-format.md 2>/dev/null || true
          printf '\n'
          cat .github/agent/shared/context/AGENTS.md          2>/dev/null || true
          printf '\n'
          cat .github/agent/docs/context/rules.md             2>/dev/null || true
          printf '\n'
          cat .github/agent/docs/context/structure.md         2>/dev/null || true
          printf '\n'
          cat .github/agent/docs/context/changelog-format.md  2>/dev/null || true
        } > docs-workspace/context.md

    - name: Write agent prompt
      shell: bash
      run: |
        cat > docs-workspace/prompt.md << 'PROMPT'
        You are the OpenCI Docs Sync Agent. Read the workspace files and return
        exactly one JSON object with schema version docs-action-plan/v1.

        Required reading order:
        1. docs-workspace/context.md       (behavior rules and output contract)
        2. docs-workspace/detect.json      (what drift was detected)
        3. docs-workspace/code-changes.txt (recent code changes, if present)
        4. docs-workspace/pr-diff.patch    (PR diff, if present)
        5. docs-workspace/pr-files.json    (PR file list, if present)

        Return ONE JSON object. No surrounding prose. No markdown fences.
        PROMPT

    - name: Upload workspace artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: docs-detect-${{ github.run_id }}
        path: docs-workspace/
        retention-days: 3
        if-no-files-found: error
