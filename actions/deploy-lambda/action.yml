name: "Deploy to AWS Lambda"
description: |
  Deploy a container image to an AWS Lambda function.

inputs:
  function-name:
    description: "Lambda function name"
    required: true
  image-uri:
    description: "Container image URI"
    required: true
  aws-region:
    description: "AWS region"
    required: false
    default: "us-east-1"

outputs:
  function-arn:
    description: "Lambda function ARN"
    value: ${{ steps.deploy.outputs.function-arn }}

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.2.1
      with:
        aws-region: ${{ inputs.aws-region }}

    - name: Update Lambda function
      id: deploy
      shell: bash
      env:
        FUNCTION_NAME: ${{ inputs.function-name }}
        IMAGE_URI: ${{ inputs.image-uri }}
      run: |
        set -euo pipefail
        RESULT=$(aws lambda update-function-code \
          --function-name "$FUNCTION_NAME" \
          --image-uri "$IMAGE_URI" \
          --query 'FunctionArn' --output text)
        echo "function-arn=$RESULT" >> "$GITHUB_OUTPUT"

    - name: Wait for update
      shell: bash
      env:
        FUNCTION_NAME: ${{ inputs.function-name }}
      run: |
        aws lambda wait function-updated-v2 --function-name "$FUNCTION_NAME"

    - name: Summary
      shell: bash
      run: |
        echo "## Deploy to Lambda" >> "$GITHUB_STEP_SUMMARY"
        echo "- Function: ${{ inputs.function-name }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Image: ${{ inputs.image-uri }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- ARN: ${{ steps.deploy.outputs.function-arn }}" >> "$GITHUB_STEP_SUMMARY"
