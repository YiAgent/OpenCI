# ─────────────────────────────────────────────────────────────────────────────
# community/stale-close — close items that stayed `stale` past close-days.
# ─────────────────────────────────────────────────────────────────────────────
# Sister to stale-mark. Same pure-shell rationale.
# ─────────────────────────────────────────────────────────────────────────────
name: Community · Stale Close
description: Close items that have been stale beyond close-days.

inputs:
  resource:      { required: true, description: "issues | pulls" }
  close-days:    { required: true, description: "Days after stale-mark before closing" }
  close-message: { required: false, default: "Closing as stale. Reopen if still relevant.", description: "" }
  github-token:  { required: true, description: GITHUB_TOKEN }

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN:      ${{ inputs.github-token }}
        REPO:          ${{ github.repository }}
        RESOURCE:      ${{ inputs.resource }}
        CLOSE_DAYS:    ${{ inputs.close-days }}
        MESSAGE:       ${{ inputs.close-message }}
      run: |
        set -euo pipefail
        cutoff_epoch="$(( $(date -u +%s) - CLOSE_DAYS * 86400 ))"
        # Look at items currently labelled `stale`.
        endpoint="repos/${REPO}/${RESOURCE}"
        page=1
        closed=0
        while :; do
          batch="$(gh api -X GET "${endpoint}?state=open&labels=stale&per_page=100&page=${page}" 2>/dev/null || echo '[]')"
          count="$(jq 'length' <<<"$batch")"
          [ "$count" = "0" ] && break
          while IFS= read -r row; do
            num="$(jq -r '.number'      <<<"$row")"
            updated="$(jq -r '.updated_at' <<<"$row")"
            if up_epoch="$(date -u -d "$updated" +%s 2>/dev/null)"; then :;
            elif up_epoch="$(date -u -j -f '%Y-%m-%dT%H:%M:%SZ' "$updated" +%s 2>/dev/null)"; then :;
            else continue; fi
            if [ "$up_epoch" -lt "$cutoff_epoch" ]; then
              gh issue comment "$num" --repo "$REPO" --body "$MESSAGE" >/dev/null 2>&1 || true
              gh issue close   "$num" --repo "$REPO" >/dev/null 2>&1 || true
              closed=$((closed + 1))
            fi
          done < <(jq -c '.[]' <<<"$batch")
          [ "$count" -lt "100" ] && break
          page=$((page + 1))
        done
        echo "::notice title=Stale Closed::resource=$RESOURCE count=$closed"
