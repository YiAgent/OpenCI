name: "Notify Linear"
description: |
  Create an issue in Linear via GraphQL API.

inputs:
  api-key:
    description: "Linear API key"
    required: true
  title:
    description: "Issue title"
    required: true
  team-id:
    description: "Linear team ID"
    required: true
  description:
    description: "Issue description (markdown)"
    required: false
    default: ""
  priority:
    description: "Priority (0=No priority, 1=Urgent, 2=High, 3=Medium, 4=Low)"
    required: false
    default: "3"

outputs:
  issue-id:
    description: "Created issue ID"
    value: ${{ steps.create.outputs.issue_id }}
  issue-url:
    description: "Created issue URL"
    value: ${{ steps.create.outputs.issue_url }}

runs:
  using: "composite"
  steps:
    - name: Create Linear issue
      id: create
      shell: bash
      env:
        API_KEY: ${{ inputs.api-key }}
        TITLE: ${{ inputs.title }}
        TEAM_ID: ${{ inputs.team-id }}
        DESCRIPTION: ${{ inputs.description }}
        PRIORITY: ${{ inputs.priority }}
      run: |
        set -euo pipefail
        QUERY='mutation IssueCreate($input: IssueCreateInput!) {
          issueCreate(input: $input) {
            success
            issue { id url }
          }
        }'
        VARIABLES=$(jq -n \
          --arg title "$TITLE" \
          --arg teamId "$TEAM_ID" \
          --arg desc "$DESCRIPTION" \
          --argjson priority "$PRIORITY" \
          '{input: {title: $title, teamId: $teamId, description: $desc, priority: $priority}}')
        RESULT=$(curl -sf -X POST "https://api.linear.app/graphql" \
          -H "Authorization: $API_KEY" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg q "$QUERY" --argjson v "$VARIABLES" '{query: $q, variables: $v}')")
        ISSUE_ID=$(echo "$RESULT" | jq -r '.data.issueCreate.issue.id')
        ISSUE_URL=$(echo "$RESULT" | jq -r '.data.issueCreate.issue.url')
        echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
        echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

    - name: Summary
      shell: bash
      run: |
        echo "## Linear Issue" >> "$GITHUB_STEP_SUMMARY"
        echo "- Title: ${{ inputs.title }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Issue: ${{ steps.create.outputs.issue_url }}" >> "$GITHUB_STEP_SUMMARY"
