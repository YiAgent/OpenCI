name: "Check Secrets"
description: |
  Validate that required secrets are present.
  Fails fast with clear error messages for missing secrets.

inputs:
  required-secrets:
    description: "Comma-separated list of required secret names"
    required: true
  optional-secrets:
    description: "Comma-separated list of optional secret names"
    required: false
    default: ""

outputs:
  secrets-ok:
    description: "Whether all required secrets are present"
    value: ${{ steps.check.outputs.secrets_ok }}

runs:
  using: "composite"
  steps:
    - name: Validate secrets
      id: check
      shell: bash
      env:
        REQUIRED: ${{ inputs.required-secrets }}
        OPTIONAL: ${{ inputs.optional-secrets }}
      run: |
        set -euo pipefail
        MISSING=()
        IFS=',' read -ra SECRETS <<< "$REQUIRED"
        for SECRET in "${SECRETS[@]}"; do
          SECRET=$(echo "$SECRET" | xargs)  # trim whitespace
          if [ -z "${!SECRET:-}" ]; then
            MISSING+=("$SECRET")
          fi
        done

        if [ ${#MISSING[@]} -gt 0 ]; then
          echo "::error::Missing required secrets: ${MISSING[*]}"
          echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        # Warn about optional secrets
        if [ -n "$OPTIONAL" ]; then
          IFS=',' read -ra OPT_SECRETS <<< "$OPTIONAL"
          for SECRET in "${OPT_SECRETS[@]}"; do
            SECRET=$(echo "$SECRET" | xargs)
            if [ -z "${!SECRET:-}" ]; then
              echo "::warning::Optional secret not set: $SECRET"
            fi
          done
        fi

        echo "secrets_ok=true" >> "$GITHUB_OUTPUT"

    - name: Summary
      shell: bash
      run: |
        echo "## Secret Validation" >> "$GITHUB_STEP_SUMMARY"
        echo "- Required: ${{ inputs.required-secrets }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Status: ${{ steps.check.outputs.secrets_ok }}" >> "$GITHUB_STEP_SUMMARY"
