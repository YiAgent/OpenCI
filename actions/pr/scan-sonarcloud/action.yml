# ─────────────────────────────────────────────────────────────────────────────
# pr/scan-sonarcloud — graceful-skip SonarCloud scan.
# ─────────────────────────────────────────────────────────────────────────────
name: PR · Scan SonarCloud
description: Run SonarCloud scan, skipping gracefully if SONAR_TOKEN is unset.

inputs:
  sonar-token:
    description: SonarCloud upload token. Empty means "skip gracefully".
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check token
      id: check
      shell: bash
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
      run: |
        if [ -z "$SONAR_TOKEN" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=SonarCloud Skipped::SONAR_TOKEN not configured, graceful skip"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
      if: steps.check.outputs.skip != 'true'
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
