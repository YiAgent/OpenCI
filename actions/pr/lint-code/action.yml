# ─────────────────────────────────────────────────────────────────────────────
# pr/lint-code — language-aware lint via MegaLinter.
# ─────────────────────────────────────────────────────────────────────────────
name: PR · Lint Code
description: Run language-aware linters via MegaLinter.

inputs:
  language:
    description: Detected language (drives MegaLinter flavor).
    required: true
  package-manager:
    description: Detected package manager.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Pick MegaLinter flavor
      id: flavor
      shell: bash
      env:
        LANGUAGE: ${{ inputs.language }}
      run: |
        # SPEC §11: language → flavor.
        case "$LANGUAGE" in
          node|javascript|typescript) flavor="javascript" ;;
          python)                     flavor="python"     ;;
          go)                         flavor="go"         ;;
          java|kotlin)                flavor="java"       ;;
          *)                          flavor="ci_light"   ;;
        esac
        echo "flavor=$flavor" >> "$GITHUB_OUTPUT"
        echo "::notice title=MegaLinter Flavor::language=$LANGUAGE flavor=$flavor"

    - uses: oxsecurity/megalinter/flavors/${{ steps.flavor.outputs.flavor }}@8fbdead70d1409964ab3d5afa885e18ee85388bb
      env:
        VALIDATE_ALL_CODEBASE: "false"
        APPLY_FIXES: "none"
