# ─────────────────────────────────────────────────────────────────────────────
# pr/lint-code — language-aware lint via MegaLinter.
# ─────────────────────────────────────────────────────────────────────────────
name: PR · Lint Code
description: Run language-aware linters via MegaLinter.

inputs:
  language:
    description: Detected language (drives MegaLinter flavor).
    required: true
  package-manager:
    description: Detected package manager.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Pick MegaLinter flavor
      id: flavor
      shell: bash
      env:
        LANGUAGE: ${{ inputs.language }}
      run: bash "${{ github.action_path }}/pick-flavor.sh"

    - uses: oxsecurity/megalinter/flavors/${{ steps.flavor.outputs.flavor }}@8fbdead70d1409964ab3d5afa885e18ee85388bb
      env:
        VALIDATE_ALL_CODEBASE: "false"
        APPLY_FIXES: "none"
