# ─────────────────────────────────────────────────────────────────────────────
# pr/check-coverage — local coverage gate + Codecov upload.
# ─────────────────────────────────────────────────────────────────────────────
# Two responsibilities:
#   1. Local gate via compute.sh — reads the coverage report on disk,
#      computes %, and gates by `mode` (pr=warn, stg/prd=block).
#   2. Hand-off to Codecov for visibility.
#
# Why split? The local gate gives stage-specific thresholds (PR 80% advisory,
# stg 60% blocking). Codecov tracks long-term trend but cannot apply
# different thresholds to the same project at different stages.
# ─────────────────────────────────────────────────────────────────────────────
name: PR · Check Coverage
description: Compute coverage %, gate by mode, then upload to Codecov.

inputs:
  coverage-file:
    description: Path to the coverage report (lcov.info | coverage.xml | coverage.out | coverage.json).
    required: true
  flags:
    description: Comma-separated Codecov flag set, e.g. "unit,backend".
    required: false
    default: ""
  coverage-threshold:
    description: Required coverage percentage (0–100).
    required: false
    default: "80"
  mode:
    description: pr (warn) | stg (block) | prd (block).
    required: false
    default: pr
  codecov-token:
    description: Codecov upload token (private repos require it).
    required: false
    default: ""

outputs:
  coverage-percent:
    description: Computed coverage percentage.
    value: ${{ steps.compute.outputs.coverage-percent }}
  passed:
    description: "true | false"
    value: ${{ steps.compute.outputs.passed }}

runs:
  using: composite
  steps:
    - name: Compute + gate
      id: compute
      shell: bash
      env:
        COVERAGE_FILE: ${{ inputs.coverage-file }}
        THRESHOLD:     ${{ inputs.coverage-threshold }}
        MODE:          ${{ inputs.mode }}
      run: bash "${{ github.action_path }}/compute.sh"

    - name: Upload to Codecov
      if: always() && inputs.codecov-token != ''
      uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4bb7dd5ced  # v5.4.0
      with:
        files: ${{ inputs.coverage-file }}
        flags: ${{ inputs.flags }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: "false"
