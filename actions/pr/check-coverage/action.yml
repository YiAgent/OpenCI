# ─────────────────────────────────────────────────────────────────────────────
# pr/check-coverage — upload coverage to Codecov + soft-enforce a threshold.
# ─────────────────────────────────────────────────────────────────────────────
# Codecov posts the actual gating PR check; this atom uploads the report and
# fails the action only if the file is missing (real coverage gating happens
# on Codecov). `coverage-threshold` is forwarded purely for observability:
# we annotate the threshold so reviewers see it without leaving GitHub.
# ─────────────────────────────────────────────────────────────────────────────
name: PR · Check Coverage
description: Upload coverage report to Codecov.

inputs:
  coverage-file:
    description: Path to the coverage report (lcov.info | coverage.xml | coverage.json).
    required: true
  flags:
    description: Comma-separated Codecov flag set, e.g. "unit,backend".
    required: false
    default: ""
  coverage-threshold:
    description: Display-only threshold; gating is configured in codecov.yml.
    required: false
    default: "80"
  codecov-token:
    description: Codecov upload token (private repos require it).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Verify coverage file exists
      shell: bash
      env:
        FILE: ${{ inputs.coverage-file }}
        THRESHOLD: ${{ inputs.coverage-threshold }}
      run: |
        set -euo pipefail
        if [ ! -f "$FILE" ]; then
          echo "::error title=Coverage Missing::Expected coverage report at $FILE"
          exit 1
        fi
        echo "::notice title=Coverage Threshold::display=${THRESHOLD}% (real gate lives in codecov.yml)"

    - name: Upload to Codecov
      uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4bb7dd5ced  # v5.4.0
      with:
        files: ${{ inputs.coverage-file }}
        flags: ${{ inputs.flags }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: "false"
