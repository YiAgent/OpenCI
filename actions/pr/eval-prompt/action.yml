# ─────────────────────────────────────────────────────────────────────────────
# pr/eval-prompt — promptfoo regression eval, gated on prompt path changes.
# ─────────────────────────────────────────────────────────────────────────────
# Runs only when:
#   • the consumer enabled `enable-eval` at the workflow level, AND
#   • the PR actually touched files under `skills/`.
#
# The path filter is the caller's responsibility (they pass `should-run`).
# Non-blocking: failures surface as annotations, the job stays green so a
# brittle eval doesn't block legitimate PRs (the eval signal lives in the
# Codecov-like dashboard, not the merge button).
# ─────────────────────────────────────────────────────────────────────────────
name: PR · Prompt Eval
description: Run promptfoo eval against changed prompts and publish a sticky comment.

inputs:
  config-path:
    description: Path to promptfoo config (default `promptfooconfig.yaml`).
    required: false
    default: "promptfooconfig.yaml"
  anthropic-api-key:
    description: ANTHROPIC_API_KEY (or any Anthropic-compatible key when api-base-url is set) for the eval models.
    required: true
  api-base-url:
    description: Custom Anthropic-compatible base URL — exported as ANTHROPIC_BASE_URL for promptfoo.
    required: false
    default: ""
  model:
    description: Model id passed to promptfoo via PROMPTFOO_MODEL env (informational; promptfoo config wins).
    required: false
    default: ""
  should-run:
    description: "true|false — caller decides whether prompt files changed."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Skip when nothing changed
      if: inputs.should-run != 'true'
      shell: bash
      run: echo "::notice title=Prompt Eval Skipped::No prompt files changed in this PR"

    - name: Run promptfoo
      if: inputs.should-run == 'true'
      uses: promptfoo/promptfoo-action@831a73deccc6a4a0ce91e671a511a6e70fa52349  # v1.0.0
      env:
        ANTHROPIC_API_KEY:  ${{ inputs.anthropic-api-key }}
        ANTHROPIC_BASE_URL: ${{ inputs.api-base-url }}
        PROMPTFOO_MODEL:    ${{ inputs.model }}
      with:
        config:           ${{ inputs.config-path }}
        no-share:         "true"
        cache:            "true"
