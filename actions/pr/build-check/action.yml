# ─────────────────────────────────────────────────────────────────────────────
# pr/build-check — confirm the Dockerfile still builds (no push).
# ─────────────────────────────────────────────────────────────────────────────
# `--load` brings the image into the local docker daemon so subsequent steps
# could exercise it; we skip `--push` because PR builds must never produce
# registry-visible artifacts.
# ─────────────────────────────────────────────────────────────────────────────
name: PR · Build Check
description: Validate Dockerfile builds without pushing.

inputs:
  dockerfile:
    description: Path to the Dockerfile.
    required: false
    default: Dockerfile
  context:
    description: Build context directory.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Set up Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

    - name: Build (no push)
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
      with:
        context:    ${{ inputs.context }}
        file:       ${{ inputs.dockerfile }}
        push:       "false"
        load:       "true"
        cache-from: "type=gha"
        cache-to:   "type=gha,mode=max"
