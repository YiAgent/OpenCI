name: PR · Auto Assign (fallback)
description: Round-robin reviewer when CODEOWNERS doesn't apply.

inputs:
  config-path:
    description: Path to auto-assign config.
    required: false
    default: .github/auto-assign.yml

runs:
  using: composite
  steps:
