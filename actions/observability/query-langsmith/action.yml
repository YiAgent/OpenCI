# ─────────────────────────────────────────────────────────────────────────────
# observability/query-langsmith — LangSmith run aggregates for the daily report.
# ─────────────────────────────────────────────────────────────────────────────
# Output schema:
#   { service: "langsmith",
#     metrics: { runs: <num|null>,
#                p95_latency_ms: <num|null>,
#                total_cost_usd: <num|null> },
#     window_hours: <num>,
#     _partial: <bool>,
#     _error: <string|null> }
#
# Uses the public Stats endpoint `/api/v1/runs/stats` which returns
# aggregates without paginating through every individual run.
# ─────────────────────────────────────────────────────────────────────────────
name: Observability · Query LangSmith
description: Fetch LLM run aggregates from LangSmith for the daily report.

inputs:
  api-key:      { required: false, default: "", description: LangSmith API key }
  endpoint:     { required: false, default: "https://api.smith.langchain.com", description: "" }
  project:      { required: false, default: "", description: LangSmith project name }
  window-hours: { required: false, default: "24", description: "" }

outputs:
  data:
    description: JSON blob with the schema above.
    value: ${{ steps.query.outputs.data }}

runs:
  using: composite
  steps:
    - id: query
      shell: bash
      timeout-minutes: 2
      env:
        KEY:     ${{ inputs.api-key }}
        URL:     ${{ inputs.endpoint }}
        PROJECT: ${{ inputs.project }}
        HOURS:   ${{ inputs.window-hours }}
      run: |
        set -euo pipefail
        emit() {
          {
            echo "data<<__OPENCI_EOF__"
            echo "$1"
            echo "__OPENCI_EOF__"
          } >> "$GITHUB_OUTPUT"
        }
        partial_error() {
          local reason="$1"
          emit "$(jq -nc --arg w "$HOURS" --arg r "$reason" \
            '{service:"langsmith", metrics:{runs:null,p95_latency_ms:null,total_cost_usd:null},
              window_hours:($w|tonumber), _partial:true, _error:$r}')"
          echo "::warning title=Query LangSmith::${reason}"
          exit 0
        }

        if [ -z "$KEY" ] || [ -z "$PROJECT" ]; then
          partial_error "credentials missing"
        fi

        # Compute window. LangSmith expects ISO 8601.
        if start_ts="$(date -u -v "-${HOURS}H" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null)"; then :;
        else start_ts="$(date -u -d "-${HOURS} hours" +%Y-%m-%dT%H:%M:%SZ)"; fi

        if ! resp="$(curl -sS --max-time 25 \
              -H "x-api-key: ${KEY}" \
              -G "${URL}/api/v1/runs/stats" \
              --data-urlencode "session=${PROJECT}" \
              --data-urlencode "start_time=${start_ts}" 2>/dev/null)"; then
          partial_error "http failed"
        fi

        runs="$(jq '.run_count // null' <<<"$resp" 2>/dev/null || echo null)"
        p95="$(jq  '(.latency_p95_seconds // null) | if . == null then null else . * 1000 end' <<<"$resp" 2>/dev/null || echo null)"
        cost="$(jq '.total_cost // .total_tokens_cost // null' <<<"$resp" 2>/dev/null || echo null)"

        out="$(jq -nc --arg w "$HOURS" \
          --argjson runs "$runs" --argjson p95 "$p95" --argjson cost "$cost" \
          '{service:"langsmith",
            metrics:{runs:$runs, p95_latency_ms:$p95, total_cost_usd:$cost},
            window_hours:($w|tonumber),
            _partial:false, _error:null}')"
        emit "$out"
        echo "::notice title=Query LangSmith::runs=${runs} p95=${p95}ms cost=\$${cost}"
