# ─────────────────────────────────────────────────────────────────────────────
# observability/query-datadog — real Datadog metric pull for daily report.
# ─────────────────────────────────────────────────────────────────────────────
# Output schema (stable, downstream depends on it):
#   { service: "datadog",
#     metrics: { rps: <num|null>,
#                p95_latency_ms: <num|null>,
#                error_rate: <num|null> },
#     window_hours: <num>,
#     _partial: <bool>,        // true when any sub-query failed
#     _error:   <string|null>  // human-readable reason when _partial=true
#   }
# Always exits 0 — partial data is valid downstream.
# ─────────────────────────────────────────────────────────────────────────────
name: Observability · Query Datadog
description: Fetch latency / RPS / error-rate from Datadog for the daily report.

inputs:
  api-key:      { required: false, default: "", description: Datadog API key }
  app-key:      { required: false, default: "", description: Datadog APP key }
  site:         { required: false, default: "datadoghq.com", description: "" }
  window-hours: { required: false, default: "24", description: "" }
  query-rps:    { required: false, default: "sum:trace.servlet.request.hits{*}.as_rate()", description: Datadog metric query for RPS }
  query-p95:    { required: false, default: "p95:trace.servlet.request.duration{*}", description: Datadog metric query for p95 latency }
  query-errors: { required: false, default: "sum:trace.servlet.request.errors{*}.as_rate()", description: Datadog metric query for error rate }

outputs:
  data:
    description: JSON blob with the schema above.
    value: ${{ steps.query.outputs.data }}

runs:
  using: composite
  steps:
    - id: query
      shell: bash
      timeout-minutes: 2
      env:
        KEY:     ${{ inputs.api-key }}
        APP_KEY: ${{ inputs.app-key }}
        SITE:    ${{ inputs.site }}
        HOURS:   ${{ inputs.window-hours }}
        Q_RPS:   ${{ inputs.query-rps }}
        Q_P95:   ${{ inputs.query-p95 }}
        Q_ERR:   ${{ inputs.query-errors }}
      run: |
        set -euo pipefail
        emit() {
          {
            echo "data<<__OPENCI_EOF__"
            echo "$1"
            echo "__OPENCI_EOF__"
          } >> "$GITHUB_OUTPUT"
        }
        partial_error() {
          local reason="$1"
          emit "$(jq -nc --arg w "$HOURS" --arg r "$reason" \
            '{service:"datadog", metrics:{rps:null,p95_latency_ms:null,error_rate:null},
              window_hours:($w|tonumber), _partial:true, _error:$r}')"
          echo "::warning title=Query Datadog::${reason}"
          exit 0
        }

        if [ -z "$KEY" ] || [ -z "$APP_KEY" ]; then
          partial_error "credentials missing"
        fi

        end_ts="$(date -u +%s)"
        start_ts="$(( end_ts - HOURS * 3600 ))"
        base="https://api.${SITE}/api/v1/query"

        fetch() {
          local q="$1"
          curl -sS --max-time 25 \
            -H "DD-API-KEY: ${KEY}" \
            -H "DD-APPLICATION-KEY: ${APP_KEY}" \
            -G "$base" \
            --data-urlencode "from=${start_ts}" \
            --data-urlencode "to=${end_ts}" \
            --data-urlencode "query=${q}" 2>/dev/null
        }

        # Each fetch returns { series: [{ pointlist: [[ts, value], ...] }] }.
        # We take the mean of all values in the first series; null if absent.
        avg_value() {
          local payload="$1"
          jq '
            if (.series? | length // 0) == 0 then null
            else
              ( .series[0].pointlist
                | map(.[1])
                | map(select(. != null))
                | if length == 0 then null else (add / length) end
              )
            end
          ' <<<"$payload"
        }

        partial=false
        err=""
        rps_resp="$(fetch "$Q_RPS")" || { partial=true; err="rps fetch failed"; rps_resp='{}'; }
        p95_resp="$(fetch "$Q_P95")" || { partial=true; err="${err:+$err; }p95 fetch failed"; p95_resp='{}'; }
        err_resp="$(fetch "$Q_ERR")" || { partial=true; err="${err:+$err; }errors fetch failed"; err_resp='{}'; }

        rps="$(avg_value "$rps_resp" 2>/dev/null || echo null)"
        p95="$(avg_value "$p95_resp" 2>/dev/null || echo null)"
        rate="$(avg_value "$err_resp" 2>/dev/null || echo null)"

        out="$(jq -nc --arg w "$HOURS" --arg er "$err" --argjson p "$partial" \
          --argjson rps "$rps" --argjson p95 "$p95" --argjson rate "$rate" \
          '{service:"datadog",
            metrics:{rps:$rps, p95_latency_ms:$p95, error_rate:$rate},
            window_hours:($w|tonumber),
            _partial:$p,
            _error: (if $er == "" then null else $er end)}')"
        emit "$out"
        echo "::notice title=Query Datadog::rps=$rps p95=$p95 err=$rate partial=$partial"
