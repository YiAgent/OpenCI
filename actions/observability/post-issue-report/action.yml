# ─────────────────────────────────────────────────────────────────────────────
# observability/post-issue-report — file the daily report as a GitHub Issue.
# ─────────────────────────────────────────────────────────────────────────────
# Labels are normative: ops-triage workflows can filter on
# `health-report,priority:p2` later, so don't drift the strings.
# ─────────────────────────────────────────────────────────────────────────────
name: Observability · Post Issue Report
description: Create a GitHub issue containing the daily report.

inputs:
  body:
    description: Report markdown.
    required: true
  date:
    description: ISO date (defaults to today UTC).
    required: false
    default: ""
  github-token:
    description: GITHUB_TOKEN with issues:write.
    required: true

outputs:
  issue-url:
    description: URL of the created issue.
    value: ${{ steps.create.outputs.issue-url }}

runs:
  using: composite
  steps:
    - id: create
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        BODY:     ${{ inputs.body }}
        DATE:     ${{ inputs.date }}
      run: |
        set -euo pipefail
        date="${DATE:-$(date -u +%Y-%m-%d)}"
        title="Daily Health Report - ${date}"
        # GitHub issue body limit 65535; truncate generously and append a hint.
        if [ "${#BODY}" -gt 60000 ]; then
          BODY="${BODY:0:60000}

…(truncated, see workflow run for full report)"
        fi
        url="$(gh issue create \
          --title "$title" \
          --body  "$BODY" \
          --label "health-report,priority:p2")"
        echo "issue-url=$url" >> "$GITHUB_OUTPUT"
        echo "::notice title=Health Report Issue::$url"
