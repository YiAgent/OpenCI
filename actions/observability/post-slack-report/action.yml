# ─────────────────────────────────────────────────────────────────────────────
# observability/post-slack-report — push report TL;DR to Slack.
# ─────────────────────────────────────────────────────────────────────────────
# Wraps integrations/slack-notify (atom) with channel + Block-Kit summary
# extraction. Full body lands in the GitHub issue; Slack gets the TL;DR
# only so the channel stays scannable.
# ─────────────────────────────────────────────────────────────────────────────
name: Observability · Post Slack Report
description: Send report TL;DR to Slack.

inputs:
  webhook-url: { required: false, default: "", description: Slack webhook URL }
  body:        { required: true,  description: Full report markdown }
  date:        { required: false, default: "",
                 description: ISO date (defaults to today UTC) }
  issue-url:   { required: false, default: "", description: Link back to the GitHub issue }

runs:
  using: composite
  steps:
    - name: Extract TL;DR
      id: tldr
      shell: bash
      env:
        BODY: ${{ inputs.body }}
      run: |
        set -euo pipefail
        # Take the section starting at "TL;DR" until the next heading or 8 lines.
        tldr="$(printf '%s\n' "$BODY" | awk '
          /^### TL;DR/ { in_blk=1; n=0; next }
          in_blk && /^###/ { exit }
          in_blk { print; n++; if (n >= 8) exit }
        ')"
        if [ -z "$tldr" ]; then tldr="(see issue for details)"; fi
        {
          echo "tldr<<__OPENCI_EOF__"
          echo "$tldr"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - uses: ./.openci/actions/integrations/slack-notify
      with:
        webhook-url: ${{ inputs.webhook-url }}
        status:      info
        title:       "Daily Health Report — ${{ inputs.date || github.run_id }}"
        body:        ${{ steps.tldr.outputs.tldr }}
        link:        ${{ inputs.issue-url }}
