# ─────────────────────────────────────────────────────────────────────────────
# observability/query-posthog — DAU pull via PostHog HogQL.
# ─────────────────────────────────────────────────────────────────────────────
# Output schema:
#   { service: "posthog",
#     metrics: { dau: <num|null> },
#     window_hours: <num>,
#     _partial: <bool>,
#     _error: <string|null> }
#
# We use the HogQL endpoint `/api/projects/<id>/query`, which is the
# PostHog-recommended programmatic-access path. Funnel queries are
# project-specific so we leave them for a follow-up; DAU is the most
# universally meaningful single number.
# ─────────────────────────────────────────────────────────────────────────────
name: Observability · Query PostHog
description: Fetch DAU from PostHog for the daily report.

inputs:
  api-key:      { required: false, default: "", description: PostHog personal API key }
  project-id:   { required: false, default: "", description: PostHog project id }
  host:         { required: false, default: "app.posthog.com", description: "" }
  window-hours: { required: false, default: "24", description: "" }

outputs:
  data:
    description: JSON blob with the schema above.
    value: ${{ steps.query.outputs.data }}

runs:
  using: composite
  steps:
    - id: query
      shell: bash
      timeout-minutes: 2
      env:
        KEY:        ${{ inputs.api-key }}
        PROJECT_ID: ${{ inputs.project-id }}
        HOST:       ${{ inputs.host }}
        HOURS:      ${{ inputs.window-hours }}
      run: |
        set -euo pipefail
        emit() {
          {
            echo "data<<__OPENCI_EOF__"
            echo "$1"
            echo "__OPENCI_EOF__"
          } >> "$GITHUB_OUTPUT"
        }
        partial_error() {
          local reason="$1"
          emit "$(jq -nc --arg w "$HOURS" --arg r "$reason" \
            '{service:"posthog", metrics:{dau:null}, window_hours:($w|tonumber),
              _partial:true, _error:$r}')"
          echo "::warning title=Query PostHog::${reason}"
          exit 0
        }

        if [ -z "$KEY" ] || [ -z "$PROJECT_ID" ]; then
          partial_error "credentials missing"
        fi

        # HogQL: distinct persons in the window. Tolerant to consumer-specific event names.
        hogql_query="SELECT count(DISTINCT person_id) FROM events WHERE timestamp >= now() - toIntervalHour(${HOURS})"
        body="$(jq -nc --arg q "$hogql_query" '{query:{kind:"HogQLQuery", query:$q}}')"
        endpoint="https://${HOST}/api/projects/${PROJECT_ID}/query/"

        if ! resp="$(curl -sS --max-time 25 -X POST \
              -H "Authorization: Bearer ${KEY}" \
              -H "Content-Type: application/json" \
              -d "$body" "$endpoint" 2>/dev/null)"; then
          partial_error "http failed"
        fi

        # HogQL response shape: { results: [[<count>]], ... }
        dau="$(jq '.results // [[]] | .[0][0] // null' <<<"$resp" 2>/dev/null || echo null)"

        out="$(jq -nc --arg w "$HOURS" --argjson dau "$dau" \
          '{service:"posthog", metrics:{dau:$dau}, window_hours:($w|tonumber),
            _partial:false, _error:null}')"
        emit "$out"
        echo "::notice title=Query PostHog::dau=${dau}"
