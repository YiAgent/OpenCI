# ─────────────────────────────────────────────────────────────────────────────
# observability/publish-report — file issue + post Slack TL;DR in one step.
# ─────────────────────────────────────────────────────────────────────────────
# Runs sequentially (issue first, slack second) so the slack post can link
# back to the issue URL. Both are advisory: failures are logged but do not
# fail the calling job.
# ─────────────────────────────────────────────────────────────────────────────
name: Observability · Publish Report
description: File the daily report as an Issue + Slack TL;DR.

inputs:
  body:
    description: Full report markdown.
    required: true
  date:
    description: ISO date.
    required: false
    default: ""
  github-token:
    description: GITHUB_TOKEN with issues:write.
    required: true
  slack-webhook-url:
    description: Slack webhook URL (empty → skip Slack post).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - id: issue
      uses: ./actions/observability/post-issue-report
      with:
        body:         ${{ inputs.body }}
        date:         ${{ inputs.date }}
        github-token: ${{ inputs.github-token }}

    - uses: ./actions/observability/post-slack-report
      with:
        webhook-url: ${{ inputs.slack-webhook-url }}
        body:        ${{ inputs.body }}
        date:        ${{ inputs.date }}
        issue-url:   ${{ steps.issue.outputs.issue-url }}
