# ─────────────────────────────────────────────────────────────────────────────
# deploy/docker — SSH-based Docker deploy (default deploy type).
# ─────────────────────────────────────────────────────────────────────────────
# Two modes:
#   compose (default) — docker compose pull + up -d on the target host.
#   run               — docker stop/rm + docker run on the target host.
#
# Always snapshots the current image before deploying so auto-rollback-docker
# has a concrete target.
#
# Security:
#   • SSH key is written to a masked temp file and removed after the step.
#   • image-ref must be a digest reference (registry/…@sha256:…) to prevent
#     tag-shift races; the action warns (but does not fail) for non-digest refs.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy · Docker
description: Deploy a Docker image to a remote host via SSH (compose or run).

inputs:
  app-name:
    description: Service name in docker-compose.yml, or container name for `run` mode.
    required: true
  image-ref:
    description: Full image reference (registry/owner/name@sha256:...).
    required: true
  ssh-host:
    description: Target server hostname or IP.
    required: true
  ssh-user:
    description: SSH user on the target server.
    required: false
    default: deploy
  ssh-key:
    description: Base64-encoded SSH private key.
    required: true
  ssh-port:
    description: SSH port.
    required: false
    default: "22"
  deploy-mode:
    description: "compose (default) or run."
    required: false
    default: compose
  compose-file:
    description: Path to docker-compose.yml on the target server (compose mode).
    required: false
    default: docker-compose.yml
  compose-project-dir:
    description: Working directory on the server that contains docker-compose.yml.
    required: false
    default: "~"
  container-name:
    description: Override container name (run mode). Defaults to app-name.
    required: false
    default: ""
  docker-run-args:
    description: Extra args appended to `docker run` (run mode only).
    required: false
    default: ""
  health-timeout:
    description: Seconds to wait for container to become healthy after deploy.
    required: false
    default: "60"

outputs:
  deploy-time:
    description: ISO 8601 deploy timestamp.
    value: ${{ steps.deploy.outputs.deploy-time }}
  previous-image:
    description: Image ref running before this deploy (used by auto-rollback-docker).
    value: ${{ steps.snapshot.outputs.previous-image }}

runs:
  using: composite
  steps:
    - name: Warn on non-digest image ref
      shell: bash
      env:
        IMAGE: ${{ inputs.image-ref }}
      run: |
        if [[ "$IMAGE" != *"@sha256:"* ]]; then
          echo "::warning title=Docker Deploy::image-ref is not a digest reference; tag may shift"
        fi

    - name: Write SSH key
      id: ssh-setup
      shell: bash
      env:
        KEY_B64: ${{ inputs.ssh-key }}
        PORT:    ${{ inputs.ssh-port }}
        HOST:    ${{ inputs.ssh-host }}
        USER:    ${{ inputs.ssh-user }}
      run: |
        set -euo pipefail
        key_path="${RUNNER_TEMP}/deploy_key_$$"
        echo "$KEY_B64" | base64 -d > "$key_path"
        chmod 600 "$key_path"
        echo "::add-mask::$(cat "$key_path" | tr -d '\n')"
        echo "SSH_KEY_PATH=$key_path" >> "$GITHUB_ENV"
        # Suppress host key prompt
        mkdir -p ~/.ssh
        ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Snapshot previous image
      id: snapshot
      shell: bash
      env:
        HOST:        ${{ inputs.ssh-host }}
        USER:        ${{ inputs.ssh-user }}
        PORT:        ${{ inputs.ssh-port }}
        APP:         ${{ inputs.app-name }}
        DEPLOY_MODE: ${{ inputs.deploy-mode }}
        COMPOSE_DIR: ${{ inputs.compose-project-dir }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
      run: |
        set -euo pipefail
        ssh_cmd() { ssh -i "$SSH_KEY_PATH" -p "$PORT" -o StrictHostKeyChecking=no "${USER}@${HOST}" "$@"; }

        prev=""
        if [ "$DEPLOY_MODE" = "compose" ]; then
          prev="$(ssh_cmd "cd ${COMPOSE_DIR} && docker compose -f ${COMPOSE_FILE} images ${APP} --format json 2>/dev/null \
            | jq -r '.[0].Image // empty' | head -1" || echo "")"
        else
          container="${CONTAINER_NAME:-$APP}"
          prev="$(ssh_cmd "docker inspect ${container} --format '{{.Config.Image}}' 2>/dev/null" || echo "")"
        fi

        echo "previous-image=${prev:-unknown}" >> "$GITHUB_OUTPUT"
        echo "::notice title=Docker Snapshot::app=$APP previous=${prev:-unknown}"

    - name: Deploy (compose mode)
      id: deploy
      if: inputs.deploy-mode == 'compose'
      shell: bash
      env:
        HOST:         ${{ inputs.ssh-host }}
        USER:         ${{ inputs.ssh-user }}
        PORT:         ${{ inputs.ssh-port }}
        APP:          ${{ inputs.app-name }}
        IMAGE:        ${{ inputs.image-ref }}
        COMPOSE_DIR:  ${{ inputs.compose-project-dir }}
        COMPOSE_FILE: ${{ inputs.compose-file }}
        TIMEOUT:      ${{ inputs.health-timeout }}
      run: |
        set -euo pipefail
        ssh_cmd() { ssh -i "$SSH_KEY_PATH" -p "$PORT" -o StrictHostKeyChecking=no "${USER}@${HOST}" "$@"; }

        # Update image in compose override file so the compose file itself is
        # not modified on the server (avoids dirty git state on server).
        ssh_cmd "cd ${COMPOSE_DIR} && \
          docker pull ${IMAGE} && \
          IMAGE=${IMAGE} docker compose -f ${COMPOSE_FILE} up -d --no-build ${APP}"

        # Wait for container health
        elapsed=0
        while [ "$elapsed" -lt "$TIMEOUT" ]; do
          status="$(ssh_cmd "docker inspect ${APP} --format '{{.State.Health.Status}}' 2>/dev/null" || echo "none")"
          if [ "$status" = "healthy" ] || [ "$status" = "none" ]; then
            break
          fi
          sleep 5
          elapsed=$((elapsed + 5))
        done

        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "deploy-time=$ts" >> "$GITHUB_OUTPUT"
        echo "::notice title=Docker Deployed::app=$APP image=$IMAGE host=$HOST mode=compose at=$ts"

    - name: Deploy (run mode)
      if: inputs.deploy-mode == 'run'
      shell: bash
      env:
        HOST:           ${{ inputs.ssh-host }}
        USER:           ${{ inputs.ssh-user }}
        PORT:           ${{ inputs.ssh-port }}
        APP:            ${{ inputs.app-name }}
        IMAGE:          ${{ inputs.image-ref }}
        CONTAINER_NAME: ${{ inputs.container-name }}
        EXTRA_ARGS:     ${{ inputs.docker-run-args }}
        TIMEOUT:        ${{ inputs.health-timeout }}
      run: |
        set -euo pipefail
        ssh_cmd() { ssh -i "$SSH_KEY_PATH" -p "$PORT" -o StrictHostKeyChecking=no "${USER}@${HOST}" "$@"; }
        container="${CONTAINER_NAME:-$APP}"

        ssh_cmd "docker pull ${IMAGE}"
        ssh_cmd "docker stop ${container} 2>/dev/null || true"
        ssh_cmd "docker rm   ${container} 2>/dev/null || true"
        ssh_cmd "docker run -d --name ${container} --restart unless-stopped ${EXTRA_ARGS} ${IMAGE}"

        # Wait for container health
        elapsed=0
        while [ "$elapsed" -lt "$TIMEOUT" ]; do
          status="$(ssh_cmd "docker inspect ${container} --format '{{.State.Health.Status}}' 2>/dev/null" || echo "none")"
          if [ "$status" = "healthy" ] || [ "$status" = "none" ]; then
            break
          fi
          sleep 5
          elapsed=$((elapsed + 5))
        done

        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "deploy-time=$ts" >> "$GITHUB_OUTPUT"
        echo "::notice title=Docker Deployed::app=$APP image=$IMAGE host=$HOST mode=run at=$ts"

    - name: Remove SSH key
      if: always()
      shell: bash
      run: rm -f "$SSH_KEY_PATH"
