name: "Setup Node.js Environment"
description: |
  Install Node.js + pnpm + project dependencies.
  Reads versions from .tool-versions (single source of truth).
  Uses GitHub Actions cache for pnpm packages.

inputs:
  node-version:
    description: "Node.js version override (default: read from .tool-versions)"
    required: false
    default: ""
  pnpm-version:
    description: "pnpm version override (default: read from .tool-versions)"
    required: false
    default: ""
  install-deps:
    description: "Run pnpm install to install dependencies"
    required: false
    default: "true"
  working-directory:
    description: "Working directory for dependency installation"
    required: false
    default: "."

outputs:
  node-version:
    description: "Resolved Node.js version"
    value: ${{ steps.versions.outputs.node }}
  pnpm-version:
    description: "Resolved pnpm version"
    value: ${{ steps.versions.outputs.pnpm }}

runs:
  using: "composite"
  steps:
    - name: Read tool versions
      id: versions
      shell: bash
      run: |
        if [ -f .tool-versions ]; then
          NODE="${{ inputs.node-version || '' }}"
          PNPM="${{ inputs.pnpm-version || '' }}"
          [ -z "$NODE" ] && NODE=$(grep '^node=' .tool-versions | cut -d= -f2)
          [ -z "$PNPM" ] && PNPM=$(grep '^pnpm=' .tool-versions | cut -d= -f2)
        else
          NODE="${{ inputs.node-version || '22' }}"
          PNPM="${{ inputs.pnpm-version || '9' }}"
        fi
        echo "node=$NODE" >> "$GITHUB_OUTPUT"
        echo "pnpm=$PNPM" >> "$GITHUB_OUTPUT"

    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4b3e4f  # v4.0.0
      with:
        version: ${{ steps.versions.outputs.pnpm }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7  # v4.4.0
      with:
        node-version: ${{ steps.versions.outputs.node }}
        cache: 'pnpm'
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Install dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile

    - name: Summary
      shell: bash
      run: |
        echo "## Setup Node.js" >> "$GITHUB_STEP_SUMMARY"
        echo "- Node.js: ${{ steps.versions.outputs.node }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- pnpm: ${{ steps.versions.outputs.pnpm }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Dependencies installed: ${{ inputs.install-deps }}" >> "$GITHUB_STEP_SUMMARY"
