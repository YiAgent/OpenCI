# ─────────────────────────────────────────────────────────────────────────────
# ci/eval-smoke — AI smoke eval against a freshly built image.
# ─────────────────────────────────────────────────────────────────────────────
# Calls the claude-harness composite with task=ci/smoke-eval. The prompt
# (skills/ci-smoke-eval/SKILL.md) returns structured JSON; downstream tooling
# can parse outputs.result if you want to gate beyond the AI's own opinion.
# ─────────────────────────────────────────────────────────────────────────────
name: CI · AI Smoke Eval
description: Ask Claude to evaluate a freshly built image's smoke endpoints.

inputs:
  image-digest:
    description: sha256:... digest produced by build-docker.
    required: true
  endpoints:
    description: JSON array of HTTP endpoints to probe.
    required: false
    default: "[]"
  expected-version:
    description: Version string the deployment should report.
    required: false
    default: ""
  anthropic-api-key:
    description: ANTHROPIC_API_KEY.
    required: true

outputs:
  result:
    description: AI eval report (JSON-encoded text).
    value: ${{ steps.report.outputs.text }}

  api-base-url:
    required: false
    default: ""
    description: Custom Anthropic-compatible base URL
  model:
    required: false
    default: ""
    description: Override the Claude model (defaults to claude-harness composite default)

runs:
  using: composite
  steps:
    - name: Build context
      id: ctx
      shell: bash
      env:
        DIGEST:    ${{ inputs.image-digest }}
        ENDPOINTS: ${{ inputs.endpoints }}
        VERSION:   ${{ inputs.expected-version }}
      run: |
        # Hand-built JSON, all values quoted via printf %s. ENDPOINTS is
        # already a JSON array (caller responsibility); we splice it raw.
        ctx=$(printf '{"image-digest":"%s","endpoints":%s,"expected-version":"%s"}' \
          "$DIGEST" "${ENDPOINTS:-[]}" "$VERSION")
        {
          echo "context<<__OPENCI_EOF__"
          echo "$ctx"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - id: harness
      uses: ./.openci/actions/_common/claude-harness
      with:
        task:     ci/smoke-eval
        context:  ${{ steps.ctx.outputs.context }}
        api-key:  ${{ inputs.anthropic-api-key }}
        api-base-url:  ${{ inputs.api-base-url }}
        model:         ${{ inputs.model || 'claude-sonnet-4-5-20250929' }}

    # `result` is a transcript PATH under claude-code-action@v1.x; extract the
    # eval report text so downstream `outputs.result` is the report, not a path.
    - id: report
      uses: ./.openci/actions/_common/extract-text
      with:
        execution-file: ${{ steps.harness.outputs.execution-file }}
