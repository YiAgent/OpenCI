# ─────────────────────────────────────────────────────────────────────────────
# ci/sign-image — Cosign keyless OIDC signing.
# ─────────────────────────────────────────────────────────────────────────────
# Keyless signing means: no long-lived cosign.key, identity comes from the
# GitHub OIDC issuer (`token.actions.githubusercontent.com`) and is
# verifiable later via `cosign verify`. Caller MUST grant `id-token: write`.
#
# Sign by digest, never by tag — tags can be retargeted.
# ─────────────────────────────────────────────────────────────────────────────
name: CI · Sign Image
description: Sign an image with Cosign keyless (GitHub OIDC).

inputs:
  image-ref:
    description: Image reference by digest (registry/owner/name@sha256:...).
    required: true

runs:
  using: composite
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20  # v3.5.0

    - name: Sign
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image-ref }}
        # Documents that we are using GitHub's OIDC issuer; cosign reads from env.
        COSIGN_EXPERIMENTAL: "1"
      run: |
        set -euo pipefail
        cosign sign --yes "$IMAGE_REF"
        echo "::notice title=Image Signed::ref=$IMAGE_REF"
