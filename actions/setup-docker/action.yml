name: "Setup Docker Buildx"
description: |
  Setup Docker Buildx and optionally log in to a container registry.
  Required for multi-arch builds.

inputs:
  registry:
    description: "Container registry URL (e.g., ghcr.io, docker.io)"
    required: false
    default: "ghcr.io"
  username:
    description: "Registry username"
    required: false
    default: ""
  password:
    description: "Registry password/token"
    required: false
    default: ""

outputs:
  registry:
    description: "Registry URL used"
    value: ${{ inputs.registry }}

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

    - name: Login to registry
      if: inputs.username != '' && inputs.password != ''
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Summary
      shell: bash
      run: |
        echo "## Setup Docker" >> "$GITHUB_STEP_SUMMARY"
        echo "- Registry: ${{ inputs.registry }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Logged in: ${{ inputs.username != '' }}" >> "$GITHUB_STEP_SUMMARY"
