# ─────────────────────────────────────────────────────────────────────────────
# _common/validate-env — block deploys when ENV_MATRIX.md required vars miss.
# ─────────────────────────────────────────────────────────────────────────────
# Pure-shell gate. The composite reads the matrix at the consumer's repo and
# compares against the environment provided by the caller (typically via
# `env:` mapping `secrets.*` → real names so the script can read them).
# ─────────────────────────────────────────────────────────────────────────────
name: Validate Env
description: Verify env-var presence against infra/ENV_MATRIX.md.

inputs:
  env-matrix-path:
    description: Path to the env matrix file.
    required: false
    default: infra/ENV_MATRIX.md
  target-env:
    description: Environment about to receive the deploy (dev|stg|prd|...).
    required: true

runs:
  using: composite
  steps:
    - name: Check env matrix
      shell: bash
      env:
        ENV_MATRIX_PATH: ${{ inputs.env-matrix-path }}
        TARGET_ENV:      ${{ inputs.target-env }}
      run: bash "${{ github.action_path }}/check.sh"
