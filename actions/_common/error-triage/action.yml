# ─────────────────────────────────────────────────────────────────────────────
# _common/error-triage — pull Sentry → AI decisions → create / dedupe issues.
# ─────────────────────────────────────────────────────────────────────────────
# STATUS: scaffold — Sentry fetch + per-decision dispatch hooks left as
# TODO. The atom shape lets consumers fill in their fetch and trust
# claude-harness for the routing logic.
# ─────────────────────────────────────────────────────────────────────────────
name: Ops · Error Triage
description: Triage new Sentry errors into GitHub issues (creates / dedupes / ignores).

inputs:
  sentry-token:   { required: false, default: "", description: Sentry token (skip when empty) }
  sentry-org:     { required: false, default: "", description: "" }
  sentry-project: { required: false, default: "", description: "" }
  github-token:   { required: true, description: GITHUB_TOKEN }
  anthropic-api-key: { required: true, description: ANTHROPIC_API_KEY }

runs:
  using: composite
  steps:
    - name: Skip when sentry-token unset
      id: gate
      shell: bash
      env:
        T: ${{ inputs.sentry-token }}
      run: |
        if [ -z "$T" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Error Triage Skipped::sentry-token not configured"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Fetch new + existing (stub)
      if: steps.gate.outputs.skip != 'true'
      id: fetch
      shell: bash
      env:
        TOKEN:    ${{ inputs.sentry-token }}
        ORG:      ${{ inputs.sentry-org }}
        PROJECT:  ${{ inputs.sentry-project }}
        GH_TOKEN: ${{ inputs.github-token }}
        REPO:     ${{ github.repository }}
      run: |
        set -euo pipefail
        # TODO: real Sentry fetch. We model the contract so the AI step still works.
        new_errors='[]'
        existing="$(gh api -X GET "repos/${REPO}/issues?labels=from-sentry&state=open" \
          --jq '[.[] | {number, title, labels: [.labels[].name]}]' 2>/dev/null || echo '[]')"
        ctx="$(jq -nc \
          --argjson new "$new_errors" \
          --argjson exist "$existing" \
          '{new_errors: $new, existing_issues: $exist}')"
        {
          echo "context<<__OPENCI_EOF__"
          echo "$ctx"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - id: harness
      if: steps.gate.outputs.skip != 'true'
      uses: ./actions/_common/claude-harness
      with:
        task:          ops/error-triage
        context:       ${{ steps.fetch.outputs.context }}
        max-turns:     "5"
        api-key:       ${{ inputs.anthropic-api-key }}
        github-token:  ${{ inputs.github-token }}

    - name: Apply decisions
      if: steps.gate.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO:     ${{ github.repository }}
        OUTPUT:   ${{ steps.harness.outputs.result }}
      run: |
        set -euo pipefail
        if [ -z "$OUTPUT" ]; then
          echo "::notice title=Error Triage::no decisions"
          exit 0
        fi
        # Strip code fences just in case.
        json="$(printf '%s' "$OUTPUT" | sed -E 's/^```(json)?$//; s/^```$//')"
        if ! jq empty <<<"$json" 2>/dev/null; then
          echo "::warning title=Error Triage::AI output not valid JSON"
          exit 0
        fi

        echo "$json" | jq -c '.[]' | while IFS= read -r row; do
          decision="$(jq -r '.decision'     <<<"$row")"
          fp="$(jq      -r '.fingerprint'   <<<"$row")"
          summary="$(jq -r '.summary // ""' <<<"$row")"
          prio="$(jq    -r '.priority // "p3"' <<<"$row")"
          dup_of="$(jq  -r '.duplicate_of // empty' <<<"$row")"

          case "$decision" in
            create)
              gh issue create --repo "$REPO" \
                --title "[Sentry] $summary (fp:$fp)" \
                --body  "Fingerprint: \`$fp\`\nFirst seen: ${row}\n\n_Triaged automatically; see SECURITY.md for sensitive errors._" \
                --label "from-sentry,ops-generated,priority:$prio"
              ;;
            duplicate)
              [ -z "$dup_of" ] && continue
              gh issue comment "$dup_of" --repo "$REPO" \
                --body "Recurred (Sentry fingerprint: \`$fp\`). +1 occurrence." || true
              ;;
            ignore)
              echo "::notice title=Error Triage::ignored fp=$fp"
              ;;
          esac
        done
