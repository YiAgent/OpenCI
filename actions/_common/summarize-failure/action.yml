# ─────────────────────────────────────────────────────────────────────────────
# _common/summarize-failure — one-line AI summary of a failed workflow run.
# ─────────────────────────────────────────────────────────────────────────────
# Pulls the workflow_run logs (zip via gh api), extracts the failed-job
# tail, and asks Claude for a single sentence. Output goes back as a
# composite output for the caller to splice into a PR comment.
# ─────────────────────────────────────────────────────────────────────────────
name: Summarize Failure
description: One-sentence AI summary of a failed workflow run.

inputs:
  run-id:        { required: true, description: github.event.workflow_run.id }
  github-token:
    required: true
    description: "GITHUB_TOKEN with actions:read"
  anthropic-api-key: { required: true, description: ANTHROPIC_API_KEY }

outputs:
  summary:
    description: One-line summary of why the run failed.
    value: ${{ steps.harness.outputs.result }}
  failed-jobs:
    description: Comma-separated names of failed jobs.
    value: ${{ steps.fetch.outputs.failed-jobs }}

  api-base-url:
    required: false
    default: ""
    description: Custom Anthropic-compatible base URL
  model:
    required: false
    default: ""
    description: Override the Claude model (defaults to claude-harness composite default)

runs:
  using: composite
  steps:
    - id: fetch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO:     ${{ github.repository }}
        RUN_ID:   ${{ inputs.run-id }}
      run: |
        set -euo pipefail
        # Failed job names.
        jobs="$(gh api -X GET "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
          --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(",")')"
        echo "failed-jobs=${jobs}" >> "$GITHUB_OUTPUT"

        # Tail of failure logs (best-effort; gh api log endpoint returns zip).
        tail_text=""
        if logs_url="$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/logs" --silent 2>/dev/null)"; then
          # gh api -F doesn't auto-extract; try the redirect-followed download.
          :
        fi
        # Simpler path: read latest annotations on the failed jobs.
        ann="$(gh api -X GET "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
          --jq '[.jobs[] | select(.conclusion == "failure") | .steps[]? | select(.conclusion == "failure") | .name] | unique | join(", ")')"
        ctx="$(jq -nc \
          --arg jobs "$jobs" \
          --arg failed_steps "$ann" \
          --arg run_id "$RUN_ID" \
          --arg repo "$REPO" \
          '{repo:$repo, run:$run_id, failed_jobs:$jobs, failed_steps:$failed_steps}')"
        {
          echo "context<<__OPENCI_EOF__"
          echo "$ctx"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - id: harness
      uses: ./.openci/actions/_common/claude-harness
      with:
        task:          ops/summarize-failure
        context:       ${{ steps.fetch.outputs.context }}
        max-turns:     "3"
        api-key:       ${{ inputs.anthropic-api-key }}
        api-base-url:  ${{ inputs.api-base-url }}
        model:         ${{ inputs.model || 'claude-sonnet-4-5-20250929' }}
        github-token:  ${{ inputs.github-token }}
