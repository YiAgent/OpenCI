name: Identify PR Agent
description: Detect whether a PR was opened by an AI agent (copilot / codex / openci).

inputs:
  pr-user-login: { required: true, description: PR author login }
  pr-head-ref:   { required: true, description: PR head ref }

outputs:
  agent-type:
    description: copilot | codex | openci | none
    value: ${{ steps.id.outputs.agent-type }}

runs:
  using: composite
  steps:
    - id: id
      shell: bash
      env:
        PR_USER_LOGIN: ${{ inputs.pr-user-login }}
        PR_HEAD_REF:   ${{ inputs.pr-head-ref }}
      run: bash "${{ github.action_path }}/identify.sh"
