# ─────────────────────────────────────────────────────────────────────────────
# _common/upsert-pr-comment — single-comment-per-PR via hidden marker.
# ─────────────────────────────────────────────────────────────────────────────
# Use a unique HTML-comment marker (e.g. `<!-- pr-summary-bot -->`) at the
# top of the body. The atom finds it among existing comments and updates
# in place; falls back to creating a fresh comment when missing. This keeps
# PR pages legible across many CI runs.
# ─────────────────────────────────────────────────────────────────────────────
name: Upsert PR Comment
description: Create or update a PR comment uniquely identified by an HTML marker.

inputs:
  pr-number:
    description: PR number.
    required: true
  marker:
    description: Hidden HTML comment used to dedupe (e.g. "<!-- pr-summary-bot -->").
    required: true
  body:
    description: Full comment markdown.
    required: true
  github-token:
    description: Token with pull-requests:write.
    required: true

outputs:
  comment-id:
    description: ID of the comment we wrote.
    value: ${{ steps.upsert.outputs.comment-id }}
  action:
    description: "created | updated"
    value: ${{ steps.upsert.outputs.action }}

runs:
  using: composite
  steps:
    - id: upsert
      shell: bash
      env:
        GH_TOKEN:  ${{ inputs.github-token }}
        REPO:      ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        MARKER:    ${{ inputs.marker }}
        BODY:      ${{ inputs.body }}
      run: bash "${{ github.action_path }}/upsert.sh"
