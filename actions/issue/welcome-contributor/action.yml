name: Community · Welcome Contributor
description: Friendly comment on first contribution (issue or PR).

inputs:
  number:        { required: true, description: Issue or PR number }
  is-pull-request: { required: false, default: "false", description: "true → PR, false → issue" }
  github-token:
    required: true
    description: "GITHUB_TOKEN with issues:write"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO:     ${{ github.repository }}
        NUM:      ${{ inputs.number }}
        IS_PR:    ${{ inputs.is-pull-request }}
      run: |
        set -euo pipefail
        if [ "$IS_PR" = "true" ]; then
          msg="Thanks for the PR! 🎉 First contribution? Take a quick look at \`CONTRIBUTING.md\` — especially the testing + Conventional Commits sections — to keep CI happy on the first try."
        else
          msg="Thanks for filing this issue! 👋 If you haven't already, please skim \`CONTRIBUTING.md\` — bug reports with reproduction steps get fixed much faster."
        fi
        gh issue comment "$NUM" --repo "$REPO" --body "$msg" || true
        echo "::notice title=Welcome::number=$NUM is_pr=$IS_PR"
