name: Issue · Validate Form
description: Extract structured field values from a GitHub Issue form body.

inputs:
  issue-body:
    required: true
    description: The issue body text.
  field:
    required: true
    description: Field heading to extract (e.g. "Area" or "Severity").

outputs:
  value:
    description: The extracted, trimmed field value (empty when absent).
    value: ${{ steps.extract.outputs.value }}

runs:
  using: composite
  steps:
    - id: extract
      shell: bash
      env:
        ISSUE_BODY: ${{ inputs.issue-body }}
        FIELD:      ${{ inputs.field }}
      run: |
        set -euo pipefail
        v="$(bash "${{ github.action_path }}/extract.sh")"
        {
          echo "value<<__OPENCI_EOF__"
          printf '%s\n' "$v"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"
