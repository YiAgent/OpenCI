# ─────────────────────────────────────────────────────────────────────────────
# issue/ai-triage — Claude-driven issue priority + label suggestions.
# ─────────────────────────────────────────────────────────────────────────────
# Wraps _common/claude-harness with task=issue/triage. The prompt
# (prompts/issue/triage.md) returns JSON; downstream `apply-triage` step
# parses it and calls `gh issue edit` with the chosen labels.
# ─────────────────────────────────────────────────────────────────────────────
name: Issue · AI Triage
description: Ask Claude to suggest labels / priority / next-action; apply them.

inputs:
  issue-number: { required: true,  description: Issue number }
  issue-title:  { required: true,  description: Issue title }
  issue-body:   { required: true,  description: Issue body }
  anthropic-api-key: { required: true, description: ANTHROPIC_API_KEY }
  github-token: { required: true,  description: GITHUB_TOKEN with issues:write }

runs:
  using: composite
  steps:
    - name: Build context
      id: ctx
      shell: bash
      env:
        REPO:        ${{ github.repository }}
        ISSUE_NUM:   ${{ inputs.issue-number }}
        ISSUE_TITLE: ${{ inputs.issue-title }}
        ISSUE_BODY:  ${{ inputs.issue-body }}
      run: |
        # jq -n --arg keeps consumer-supplied fields out of shell injection paths.
        ctx="$(jq -nc \
          --arg repo  "$REPO" \
          --arg num   "$ISSUE_NUM" \
          --arg title "$ISSUE_TITLE" \
          --arg body  "$ISSUE_BODY" \
          '{repo: $repo, issue: ($num | tonumber), title: $title, body: $body}')"
        {
          echo "context<<__OPENCI_EOF__"
          echo "$ctx"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Invoke claude-harness
      id: harness
      uses: ./actions/_common/claude-harness
      with:
        task:          issue/triage
        context:       ${{ steps.ctx.outputs.context }}
        api-key:       ${{ inputs.anthropic-api-key }}
        github-token:  ${{ inputs.github-token }}

    - name: Apply triage decision
      shell: bash
      env:
        GH_TOKEN:  ${{ inputs.github-token }}
        REPO:      ${{ github.repository }}
        ISSUE_NUM: ${{ inputs.issue-number }}
        RESULT:    ${{ steps.harness.outputs.result }}
      run: |
        set -euo pipefail
        # The prompt asks for strict JSON; tolerate fenced code blocks just in case.
        json="$(printf '%s' "$RESULT" | sed -E 's/^```(json)?$//; s/^```$//')"

        if ! echo "$json" | jq empty 2>/dev/null; then
          echo "::warning title=AI Triage::output was not valid JSON; skipping apply"
          exit 0
        fi

        priority="$(jq -r '.priority // empty' <<<"$json")"
        mapfile -t labels < <(jq -r '.labels[]? // empty' <<<"$json")

        to_apply=()
        for l in "${labels[@]}"; do to_apply+=("$l"); done
        if [ -n "$priority" ]; then to_apply+=("priority:${priority}"); fi

        if [ "${#to_apply[@]}" -eq 0 ]; then
          echo "::notice title=AI Triage::no labels to apply"
          exit 0
        fi

        joined="$(IFS=','; echo "${to_apply[*]}")"
        gh issue edit "$ISSUE_NUM" --repo "$REPO" --add-label "$joined" || {
          echo "::warning title=AI Triage::label apply failed (continuing)"
        }
        echo "::notice title=AI Triage::applied=${joined}"
