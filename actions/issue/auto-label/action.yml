name: Issue · Auto Label
description: Apply area:* / severity:* / security labels based on form fields.

inputs:
  issue-body:    { required: true, description: Raw issue body }
  issue-title:   { required: true, description: Issue title }
  issue-number:  { required: true, description: Issue number }
  github-token:
    required: true
    description: "GITHUB_TOKEN with issues:write"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        ISSUE_BODY:  ${{ inputs.issue-body }}
        ISSUE_TITLE: ${{ inputs.issue-title }}
        ISSUE_NUM:   ${{ inputs.issue-number }}
        GH_TOKEN:    ${{ inputs.github-token }}
        REPO:        ${{ github.repository }}
        EXTRACT_SH:  ${{ github.action_path }}/../validate-form/extract.sh
      run: bash "${{ github.action_path }}/label-from-form.sh"
