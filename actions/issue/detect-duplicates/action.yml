name: Issue · Detect Duplicates
description: Search existing issues for similar titles; comment + label if found.

inputs:
  issue-number: { required: true, description: Issue number }
  issue-title:  { required: true, description: Issue title }
  github-token: { required: true, description: GITHUB_TOKEN with issues:write }

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN:    ${{ inputs.github-token }}
        REPO:        ${{ github.repository }}
        ISSUE_NUM:   ${{ inputs.issue-number }}
        ISSUE_TITLE: ${{ inputs.issue-title }}
      run: |
        set -euo pipefail
        # Strip stop-words + the conventional-commit prefix so the search
        # matches on the meaningful tokens.
        query="$(printf '%s' "$ISSUE_TITLE" \
          | sed -E 's/^(bug|feat|feature|question|docs|chore|refactor|perf|ci|build|style):?[[:space:]]*//i' \
          | tr '[:upper:]' '[:lower:]' \
          | tr -c 'a-z0-9 ' ' ' \
          | tr -s ' ' \
          | awk '{
              n=0
              for (i=1; i<=NF; i++) {
                w = $i
                if (length(w) <= 2) continue
                if (w ~ /^(the|and|for|are|but|not|you|all|can|her|was|one|our|out|how|why|with|when|from|this|that|have|been|does|need|want|some|like|just|than|then|will|into|over|also|much|most|here|them|than|onto|made|make)$/) continue
                printf("%s ", w); n++
                if (n >= 6) break
              }
            }')"
        if [ -z "$query" ]; then
          echo "::notice title=Detect Duplicates::no searchable tokens; skipping"
          exit 0
        fi

        # Fetch up to 5 candidate issues with overlapping tokens, excluding self.
        candidates="$(gh search issues --repo "$REPO" --json number,title,state,url \
          --limit 5 \
          "in:title $query" 2>/dev/null || echo '[]')"
        candidates="$(jq -c --argjson self "$ISSUE_NUM" '[.[] | select(.number != $self)]' <<<"$candidates")"

        count="$(jq 'length' <<<"$candidates")"
        if [ "$count" = "0" ]; then
          echo "::notice title=Detect Duplicates::no candidates"
          exit 0
        fi

        body="$(jq -r '
          ["Possible duplicates found — please confirm before duplicating effort:"]
          + (map("- #\(.number): [\(.title)](\(.url))"))
          | join("\n")' <<<"$candidates")"

        gh issue comment "$ISSUE_NUM" --repo "$REPO" --body "$body" || true
        gh issue edit    "$ISSUE_NUM" --repo "$REPO" --add-label "possible-duplicate" || true
        echo "::notice title=Detect Duplicates::candidates=${count}"
