name: "Check Dockerfile"
description: |
  Lint a Dockerfile for best practices and common issues.

inputs:
  file:
    description: "Path to Dockerfile"
    required: false
    default: "Dockerfile"

outputs:
  issues:
    description: "Number of issues found"
    value: ${{ steps.lint.outputs.issues }}

runs:
  using: "composite"
  steps:
    - name: Lint Dockerfile
      id: lint
      shell: bash
      env:
        DOCKERFILE: ${{ inputs.file }}
      run: |
        set -euo pipefail
        ISSUES=0

        if [ ! -f "$DOCKERFILE" ]; then
          echo "::error::Dockerfile not found: $DOCKERFILE"
          exit 1
        fi

        # Check for latest tag in FROM
        if grep -n 'FROM.*:latest' "$DOCKERFILE"; then
          echo "::warning file=$DOCKERFILE::Avoid using :latest tag in FROM statements"
          ISSUES=$((ISSUES + 1))
        fi

        # Check for root user
        if ! grep -q 'USER' "$DOCKERFILE"; then
          echo "::warning file=$DOCKERfile::No USER instruction found — container runs as root"
          ISSUES=$((ISSUES + 1))
        fi

        # Check for HEALTHCHECK
        if ! grep -q 'HEALTHCHECK' "$DOCKERFILE"; then
          echo "::notice file=$DOCKERFILE::Consider adding a HEALTHCHECK instruction"
        fi

        # Check for multi-stage build efficiency
        FROM_COUNT=$(grep -c '^FROM' "$DOCKERFILE" || true)
        if [ "$FROM_COUNT" -gt 1 ]; then
          echo "::notice file=$DOCKERFILE::Multi-stage build detected ($FROM_COUNT stages)"
        fi

        echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"

    - name: Summary
      shell: bash
      run: |
        echo "## Dockerfile Check" >> "$GITHUB_STEP_SUMMARY"
        echo "- File: ${{ inputs.file }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Issues: ${{ steps.lint.outputs.issues }}" >> "$GITHUB_STEP_SUMMARY"
