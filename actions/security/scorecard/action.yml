# ─────────────────────────────────────────────────────────────────────────────
# security/scorecard — OpenSSF Scorecard upload.
# ─────────────────────────────────────────────────────────────────────────────
# Uses the verified ossf/scorecard-action SHA. Results go to the OpenSSF
# public dashboard at https://api.securityscorecards.dev/projects/...
# ─────────────────────────────────────────────────────────────────────────────
name: Security · OpenSSF Scorecard
description: Run OpenSSF Scorecard and upload to its public dashboard.

inputs:
  publish-results:
    description: Publish to securityscorecards.dev (requires public repo).
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Run Scorecard
      uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46  # v2.4.0
      with:
        results_file:    results.sarif
        results_format:  sarif
        publish_results: ${{ inputs.publish-results }}

    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169  # v3.28.0
      if: always()
      with:
        sarif_file: results.sarif
