# ─────────────────────────────────────────────────────────────────────────────
# security/generate-sbom — Trivy SBOM (SPDX-JSON) artifact.
# ─────────────────────────────────────────────────────────────────────────────
# Produces an SPDX-JSON SBOM. When image-ref is provided, scans the image;
# otherwise scans the checked-out filesystem.
# ─────────────────────────────────────────────────────────────────────────────
name: Security · Generate SBOM
description: Produce an SPDX SBOM and upload as artifact.

inputs:
  image-ref:
    description: Image reference. When empty, generates a filesystem SBOM of the repo.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Generate SBOM (image)
      if: inputs.image-ref != ''
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref:    ${{ inputs.image-ref }}
        format:       spdx-json
        output:       sbom.spdx.json
        exit-code:    "0"

    - name: Generate SBOM (filesystem)
      if: inputs.image-ref == ''
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        scan-type: fs
        scan-ref:  "."
        format:    spdx-json
        output:    sbom.spdx.json
        exit-code: "0"

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: sbom-spdx-json
        path: sbom.spdx.json
        if-no-files-found: warn
        retention-days: 90
