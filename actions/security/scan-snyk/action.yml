# ─────────────────────────────────────────────────────────────────────────────
# security/scan-snyk — Snyk scan with graceful-skip.
# ─────────────────────────────────────────────────────────────────────────────
name: Security · Scan Snyk
description: Snyk vulnerability scan; skip gracefully when SNYK_TOKEN is unset.

inputs:
  snyk-token:
    description: Snyk auth token. Empty → skip.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check token
      id: check
      shell: bash
      env:
        TOKEN: ${{ inputs.snyk-token }}
      run: |
        if [ -z "$TOKEN" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Snyk Skipped::SNYK_TOKEN not configured, graceful skip"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04
      if: steps.check.outputs.skip != 'true'
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
