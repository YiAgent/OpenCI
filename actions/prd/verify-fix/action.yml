# ─────────────────────────────────────────────────────────────────────────────
# prd/verify-fix — confirm Sentry errors referenced by `Fixes #N` actually disappeared.
# ─────────────────────────────────────────────────────────────────────────────
# Reads the PR body, extracts issue numbers from Closes/Fixes/Resolves
# lines, queries Sentry for each issue's tagged error, and updates the
# original GitHub issue with "confirmed fixed" or reopens it.
#
# This is advisory — it never blocks a deploy retroactively. Instead it
# leaves a trace on the related issue + posts a PR comment.
# ─────────────────────────────────────────────────────────────────────────────
name: PRD · Verify Fix
description: Verify that Sentry errors referenced by the deploy PR are gone.

inputs:
  pr-number:
    required: true
    description: PR that drove this prd deploy.
  github-token:
    required: true
  sentry-token:
    required: false
    default: ""
    description: Sentry auth token (graceful skip when empty).
  sentry-org:
    required: false
    default: ""
  sentry-project:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check sentry token
      id: gate
      shell: bash
      env:
        T: ${{ inputs.sentry-token }}
      run: |
        if [ -z "$T" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Verify Fix Skipped::sentry-token not configured"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Read PR body
      if: steps.gate.outputs.skip != 'true'
      id: body
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO:     ${{ github.repository }}
        PR:       ${{ inputs.pr-number }}
      run: |
        body="$(gh api "repos/${REPO}/pulls/${PR}" --jq '.body // ""')"
        {
          echo "body<<__OPENCI_EOF__"
          echo "$body"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Parse refs
      if: steps.gate.outputs.skip != 'true'
      id: refs
      shell: bash
      env:
        PR_BODY: ${{ steps.body.outputs.body }}
      run: bash "${{ github.action_path }}/parse-refs.sh"

    - name: Verify each ref
      if: steps.gate.outputs.skip != 'true' && steps.refs.outputs.refs != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO:     ${{ github.repository }}
        REFS:     ${{ steps.refs.outputs.refs }}
        TOKEN:    ${{ inputs.sentry-token }}
        ORG:      ${{ inputs.sentry-org }}
        PROJECT:  ${{ inputs.sentry-project }}
        PR:       ${{ inputs.pr-number }}
      run: |
        set -euo pipefail
        IFS=',' read -ra refs_arr <<<"$REFS"
        confirmed=()
        regressed=()
        for ref in "${refs_arr[@]}"; do
          # Sentry: issues tagged with `gh-issue:<ref>` (consumer convention).
          # We check whether ANY events landed in the past hour; if zero, the
          # fix is provisionally confirmed.
          end_ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if start_ts="$(date -u -v "-60M" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null)"; then :;
          else start_ts="$(date -u -d "-60 minutes" +%Y-%m-%dT%H:%M:%SZ)"; fi
          query="?query=tags%5Bgh-issue%5D%3A${ref}&statsPeriod=1h"
          resp="$(curl -sS --max-time 25 \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://sentry.io/api/0/projects/${ORG}/${PROJECT}/events/${query}" 2>/dev/null || echo '[]')"
          count="$(jq 'length' <<<"$resp" 2>/dev/null || echo 0)"
          if [ "$count" = "0" ]; then
            confirmed+=("$ref")
            gh issue comment "$ref" --repo "$REPO" \
              --body "✅ **Confirmed fixed.** No Sentry events in the hour following the PRD deploy of #${PR}."
          else
            regressed+=("$ref")
            gh issue comment "$ref" --repo "$REPO" \
              --body "⚠️ Still reproducing: ${count} Sentry events tagged \`gh-issue:${ref}\` in the hour after PRD deploy of #${PR}."
            gh issue reopen "$ref" --repo "$REPO" 2>/dev/null || true
          fi
        done
        joined_ok="$(IFS=','; echo "${confirmed[*]:-}")"
        joined_re="$(IFS=','; echo "${regressed[*]:-}")"
        msg="**Fix verification (PR #${PR}):** confirmed=${joined_ok:-none} regressed=${joined_re:-none}"
        gh pr comment "$PR" --repo "$REPO" --body "$msg" || true
        echo "::notice title=Verify Fix::${msg}"
