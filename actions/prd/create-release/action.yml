# ─────────────────────────────────────────────────────────────────────────────
# prd/create-release — gh release create with auto-generated notes.
# ─────────────────────────────────────────────────────────────────────────────
# Resolves the version from `inputs.version` first, then falls back to the
# git tag that triggered the run (`github.ref_name`).
# ─────────────────────────────────────────────────────────────────────────────
name: PRD · Create Release
description: Cut a GitHub release with auto-generated notes.

inputs:
  version:
    description: Tag/version, e.g. v1.2.3. Empty → use github.ref_name.
    required: false
    default: ""
  github-token:
    description: "GITHUB_TOKEN with `contents: write`."
    required: true
  use-ai-changelog:
    description: When "true" + ANTHROPIC_API_KEY is set, replace --generate-notes with an AI-written Keep a Changelog body.
    required: false
    default: "false"
  anthropic-api-key:
    description: ANTHROPIC_API_KEY (only required when use-ai-changelog=true).
    required: false
    default: ""

  api-base-url:
    required: false
    default: ""
    description: Custom Anthropic-compatible base URL
  model:
    required: false
    default: ""
    description: Override the Claude model (defaults to claude-harness composite default)

runs:
  using: composite
  steps:
    - name: Resolve version + previous tag
      id: ver
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION:  ${{ inputs.version }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        ver="${VERSION:-$REF_NAME}"
        if [ -z "$ver" ]; then
          echo "::error title=Create Release::No version supplied and ref_name is empty"
          exit 1
        fi
        prev="$(git tag --sort=-v:refname | grep -v "^${ver}$" | head -1 || true)"
        echo "version=$ver"   >> "$GITHUB_OUTPUT"
        echo "prev=$prev"     >> "$GITHUB_OUTPUT"

    - name: Skip if release already exists
      id: skip
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VER:      ${{ steps.ver.outputs.version }}
      run: |
        if gh release view "$VER" >/dev/null 2>&1; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Release Exists::version=$VER — skipping create"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build commit log (for AI changelog)
      if: steps.skip.outputs.skip != 'true' && inputs.use-ai-changelog == 'true' && inputs.anthropic-api-key != ''
      id: log
      shell: bash
      env:
        PREV: ${{ steps.ver.outputs.prev }}
        VER:  ${{ steps.ver.outputs.version }}
      run: |
        set -euo pipefail
        if [ -n "$PREV" ]; then
          range="${PREV}..HEAD"
        else
          range="HEAD"
        fi
        commits="$(git log --no-merges --pretty=format:'%H%x09%s%x09%an' "$range" | head -200)"
        ctx="$(jq -nc --arg v "$VER" --arg p "$PREV" --arg c "$commits" \
          '{version:$v, previous_tag:$p, commits:$c}')"
        {
          echo "context<<__OPENCI_EOF__"
          echo "$ctx"
          echo "__OPENCI_EOF__"
        } >> "$GITHUB_OUTPUT"

    - id: ai
      if: steps.skip.outputs.skip != 'true' && inputs.use-ai-changelog == 'true' && inputs.anthropic-api-key != ''
      uses: ./.openci/actions/_common/claude-harness
      with:
        task:          agents/ai-changelog
        context:       ${{ steps.log.outputs.context }}
        max-turns:     "5"
        api-key:       ${{ inputs.anthropic-api-key }}
        api-base-url:  ${{ inputs.api-base-url }}
        model:         ${{ inputs.model || 'claude-sonnet-4-5-20250929' }}
        github-token:  ${{ inputs.github-token }}

    # `result` is a transcript PATH under claude-code-action@v1.x; extract the
    # changelog text so release notes hold the body, not a path.
    - name: Extract changelog
      id: notes
      if: steps.skip.outputs.skip != 'true' && inputs.use-ai-changelog == 'true' && inputs.anthropic-api-key != ''
      uses: ./.openci/actions/_common/extract-text
      with:
        execution-file: ${{ steps.ai.outputs.execution-file }}

    - name: Create release
      if: steps.skip.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VER:      ${{ steps.ver.outputs.version }}
        AI_BODY:  ${{ steps.notes.outputs.text }}
      run: |
        set -euo pipefail
        if [ -n "$AI_BODY" ]; then
          gh release create "$VER" --verify-tag --title "$VER" --notes "$AI_BODY"
        else
          gh release create "$VER" --generate-notes --verify-tag --title "$VER"
        fi
        echo "::notice title=Release Created::version=$VER"
