# Production deploy notifier (delegates to integrations/slack-notify atom).
name: PRD · Notify Deployed
description: Post production deploy status to Slack.

inputs:
  status:       { required: true,  description: success | failure }
  app-name:     { required: true,  description: Application name }
  image-ref:    { required: true,  description: Image reference }
  webhook-url:  { required: false, description: Slack webhook URL, default: "" }
  run-url:      { required: false, description: GitHub run URL, default: "" }

runs:
  using: composite
  steps:
    - uses: ./actions/integrations/slack-notify
      with:
        webhook-url: ${{ inputs.webhook-url }}
        status:      ${{ inputs.status }}
        title:       "PRD · ${{ inputs.app-name }} · ${{ inputs.status }}"
        body:        "Image: `${{ inputs.image-ref }}`"
        link:        ${{ inputs.run-url }}
