name: "Setup Go Environment"
description: |
  Install Go toolchain and download dependencies.
  Reads version from .tool-versions (single source of truth).

inputs:
  go-version:
    description: "Go version override (default: read from .tool-versions)"
    required: false
    default: ""
  install-deps:
    description: "Run go mod download to install dependencies"
    required: false
    default: "true"
  working-directory:
    description: "Working directory for dependency installation"
    required: false
    default: "."

outputs:
  go-version:
    description: "Resolved Go version"
    value: ${{ steps.versions.outputs.go }}

runs:
  using: "composite"
  steps:
    - name: Read tool versions
      id: versions
      shell: bash
      run: |
        if [ -f .tool-versions ]; then
          GO="${{ inputs.go-version || '' }}"
          [ -z "$GO" ] && GO=$(grep '^golang=' .tool-versions | cut -d= -f2)
        else
          GO="${{ inputs.go-version || '1.23' }}"
        fi
        echo "go=$GO" >> "$GITHUB_OUTPUT"

    - name: Setup Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
      with:
        go-version: ${{ steps.versions.outputs.go }}

    - name: Install dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go mod download

    - name: Summary
      shell: bash
      run: |
        echo "## Setup Go" >> "$GITHUB_STEP_SUMMARY"
        echo "- Go: ${{ steps.versions.outputs.go }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Dependencies installed: ${{ inputs.install-deps }}" >> "$GITHUB_STEP_SUMMARY"
