# ─────────────────────────────────────────────────────────────────────────────
# OpenCI manifest.yml
# ─────────────────────────────────────────────────────────────────────────────
# This file is the SINGLE SOURCE OF TRUTH for third-party action SHAs used
# inside this repository.
#
# RULES (see docs/SPEC.md §3 and Appendix B):
#   1. `deps:` only contains VERIFIED 40-char commit SHAs.
#      Unverified or placeholder SHAs MUST live in manifest-pending.yml.
#   2. Every `uses:` reference in .github/workflows/**/*.yml or actions/**/*.yml
#      MUST match the SHA in this file. Inconsistencies are blocked by
#      .github/workflows/security.yml.
#   3. `@v1`, `@v1.2.3`, `@main`, `@master` references are forbidden — pin
#      everything to a 40-char commit SHA.
#   4. Actions listed in docs/SPEC.md Appendix B.2 (deprecated) MUST NOT be
#      used; verify-sha-consistency rejects them.
#   5. Adding a new dependency:
#         a. Put the SHA in manifest-pending.yml first (placeholder allowed).
#         b. Verify the SHA via the checklist in docs/SPEC.md §3.1.
#         c. Move the entry into this file and update workflow / action
#            references in the same PR.
# ─────────────────────────────────────────────────────────────────────────────
