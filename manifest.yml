# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow catalog (consumed via `uses: YiAgent/OpenCI/.github/workflows/<id>.yml@<ref>`)
# Public surface = 9 unprefixed reusables under .github/workflows/.
# Underscore-prefixed siblings are private implementation files.
# ─────────────────────────────────────────────────────────────────────────────
workflows:
  - id: claude-harness
    path: .github/workflows/agent.yml
    description: AI execution engine — single entrypoint for every Claude call.
    inputs:
      task:         { type: string, required: true }
      prompt-path:  { type: string, required: false, description: "Caller-provided prompt path; empty falls back to built-in." }
      context:      { type: string, required: false, description: "JSON-encoded prompt variables." }
      model:        { type: string, default: "claude-sonnet-4-5-20250929" }
      max-turns:    { type: number, default: 10 }
    outputs:
      result:     "AI output content"
      comment-id: "Sticky PR/Issue comment id used for follow-up updates"
    secrets:
      anthropic-api-key: { required: true }

  - id: pr
    path: .github/workflows/pr.yml
    description: PR quality gate (lint / test / scan / optional AI review).
    inputs:
      language:              { type: string, default: "" }
      enable-ai-review:      { type: boolean, default: true }
      enable-eval:           { type: boolean, default: false }
      enable-copilot-review: { type: boolean, default: false }
      coverage-threshold:    { type: number, default: 80 }
      pr-review-prompt-path: { type: string, default: "" }
    secrets:
      anthropic-api-key: { required: false }
      codecov-token:     { required: false }
      sonar-token:       { required: false }
      snyk-token:        { required: false }
      release-pat:       { required: false, description: "PAT for Copilot review (enable-copilot-review: true)." }

  - id: ci
    path: .github/workflows/ci.yml
    description: Merge-to-main build and smoke pipeline.
    inputs:
      language:           { type: string, default: "" }
      registry:           { type: string, default: "ghcr.io" }
      image-name:         { type: string, required: true }
      enable-ai-smoke:    { type: boolean, default: false }
      run-migration:      { type: boolean, default: false }
    outputs:
      image-digest: "sha256:xxx"
      deploy-time: "ISO 8601 build timestamp"
    secrets:
      registry-token:     { required: true }
      anthropic-api-key:  { required: false }

  - id: stg
    path: .github/workflows/deploy.yml
    description: Staging deploy.
    inputs:
      image-digest:   { type: string, required: true }
      k8s-namespace:  { type: string, default: "staging" }
      run-migration:  { type: boolean, default: false }
    outputs:
      deploy-time: "ISO 8601 timestamp forwarded as prd.stg-deploy-time"
    secrets:
      kubeconfig-stg:     { required: true }
      sentry-token:       { required: false }
      datadog-api-key:    { required: false }
      posthog-api-key:    { required: false }
      slack-webhook-url:  { required: false }

  - id: prd
    path: .github/workflows/deploy.yml
    description: Production release with pre-check window.
    inputs:
      image-digest:        { type: string, required: true }
      stg-image-digest:    { type: string, required: true }
      stg-deploy-time:     { type: string, required: true }
      observation-minutes: { type: number, default: 30 }
      k8s-namespace:       { type: string, default: "production" }
      run-migration:       { type: boolean, default: false }
    secrets:
      kubeconfig-prd:     { required: true }
      sentry-token:       { required: false }
      datadog-api-key:    { required: false }
      posthog-api-key:    { required: false }
      slack-webhook-url:  { required: false }

  - id: security-schedule
    path: .github/workflows/security.yml
    description: Weekly full security scan.
    inputs:
      image-ref: { type: string, required: false }
    secrets:
      snyk-token: { required: false }

  - id: issue
    path: .github/workflows/issue.yml
    description: >-
      Unified issue domain — deterministic ingest, context enrichment,
      agent action planning, and guarded execution. Routed by optional
      `inputs.mode` (`lifecycle`, `maintenance`, `ingest`).
    inputs:
      mode: { type: string, default: lifecycle }
    secrets:
      anthropic-api-key: { required: false }
      sentry-token:      { required: false }
      linear-token:      { required: false }
      slack-webhook-url: { required: false }
      mcp-dispatch-token: { required: false }

  - id: community
    path: .github/workflows/issue.yml
    description: New-contributor welcome plus PR/Issue cross-link checks.
    secrets: {}

  - id: stale
    path: .github/workflows/issue.yml
    description: Auto-mark and auto-close stale Issues/PRs.
    inputs:
      mode:             { type: string, default: maintenance }
      issue-stale-days: { type: number, default: 60 }
      issue-close-days: { type: number, default: 14 }
      pr-stale-days:    { type: number, default: 30 }
      pr-close-days:    { type: number, default: 7 }
    secrets: {}

  - id: docs
    path: .github/workflows/docs.yml
    description: >-
      Unified docs domain — link-check + optional build on PR; build +
      Pages publish on main push (and via dispatch / workflow_call).
    inputs:
      build-cmd: { type: string, required: false, default: "" }
      docs-dir:  { type: string, required: false, default: "docs" }
      site-dir:  { type: string, required: false, default: "site" }
    secrets: {}

  - id: health-report
    path: .github/workflows/agent.yml
    description: Scheduled health report (collect → synthesize → publish).
    secrets:
      anthropic-api-key:   { required: true }
      sentry-token:        { required: false }
      datadog-api-key:     { required: false }
      datadog-app-key:     { required: false }
      posthog-api-key:     { required: false }
      langsmith-api-key:   { required: false }
      axiom-token:         { required: false }
      slack-webhook-url:   { required: false }

  - id: dep-auto-merge
    path: .github/workflows/deps.yml
    description: Auto-merge Renovate patch-labelled dependency PRs.
    secrets: {}

  - id: flag-audit
    path: .github/workflows/security.yml
    description: Weekly feature-flag audit — scans codebase and files tech-debt issues.
    secrets:
      anthropic-api-key: { required: false }

  - id: pr-agent
    path: .github/workflows/pr.yml
    description: >-
      Unified PR-agent domain — sticky CI summary (workflow_run),
      @-mention agent feedback on failure, @docubot Q&A reply, and
      pull-request test scaffolding. Routed via event_name and
      optional `inputs.mode`.
    inputs:
      mode:            { type: string, required: false, default: "" }
      pr-number:       { type: string, required: false, default: "" }
      extra-workflows: { type: string, required: false, default: "" }
    secrets:
      anthropic-api-key: { required: false }

  - id: prd-observe
    path: .github/workflows/deploy.yml
    description: >-
      Unified post-deploy observability — 3σ canary watch (every 15 min),
      daily Terraform drift check, and Sentry fix verification (workflow_run
      after prd). Routed via cron / event_name and optional `inputs.mode`.
      All three jobs are advisory and never block deploys.
    inputs:
      mode:      { type: string, required: false, default: "" }
      infra-dir: { type: string, required: false, default: "infrastructure" }
    secrets:
      sentry-token: { required: false }

  - id: stg-agent-test
    path: .github/workflows/deploy.yml
    description: Autonomous L1–L4 agent tests triggered after staging deploy.
    inputs:
      health-url:   { type: string, required: false, default: "" }
      image-digest: { type: string, required: false, default: "" }
    secrets:
      anthropic-api-key: { required: false }

  - id: release
    path: .github/workflows/release.yml
    description: >-
      Unified release — marketplace tagging (GitHub Release + floating
      v<major>/v<minor>) and Docker image release with cosign keyless
      signing. Routed via `inputs.mode` (marketplace|docker|both).
    inputs:
      mode:       { type: string, required: false, default: "both" }
      image-name: { type: string, required: false, default: "" }
      registry:   { type: string, required: false, default: "ghcr.io" }
    secrets: {}
