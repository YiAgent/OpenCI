# ─────────────────────────────────────────────────────────────────────────────
# OpenCI — GitHub Actions Marketplace entry point
# ─────────────────────────────────────────────────────────────────────────────
# This is the Marketplace-facing action. It wraps _common/claude-harness as a
# single entrypoint for AI-powered tasks. For full pipelines and non-AI work,
# call the top-level reusable workflows directly:
#
#   .github/workflows/reusable/pr.yml          — PR quality gate
#   .github/workflows/reusable/ci.yml          — build + sign (push to main)
#   .github/workflows/reusable/deploy.yml         — staging deploy
#   .github/workflows/reusable/deploy.yml         — production deploy
#   .github/workflows/reusable/issue.yml       — issue domain (mode-routed)
#   .github/workflows/reusable/pr.yml    — PR-agent domain (mode-routed)
#   .github/workflows/reusable/deploy.yml — post-deploy observability (mode-routed)
#   .github/workflows/reusable/release.yml     — release domain (mode-routed)
#   .github/workflows/reusable/docs.yml        — docs build + Pages deploy
#   .github/workflows/reusable/agent.yml, flag-audit.yml, security-schedule.yml
#   .github/workflows/reusable/issue.yml, stale.yml, dep-auto-merge.yml
#   .github/workflows/reusable/agent.yml — sole AI entrypoint (workflow form)
# ─────────────────────────────────────────────────────────────────────────────
name: 'OpenCI'
description: 'AI-powered CI/CD toolkit — PR review, issue triage, smoke eval, observability, and more.'
author: 'YiWang24'

branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  task:
    description: |
      Task to run. Supported values:
        pr/review              — AI PR review (single PR comment)
        pr-agent/summarise     — sticky CI summary on a PR
        pr-agent/feedback      — @-mention agent on CI failure
        pr-agent/docubot       — answer @docubot mentions
        pr-agent/test-gen      — generate test scaffolds
        issue/auto-label       — auto label issues
        issue/dedupe           — detect duplicate issues
        issue/ai-triage        — AI triage open issues
        issue/sentry-triage    — Sentry → GitHub-issue triage
        issue/linear-branch    — Linear → branch from repository_dispatch
        ci/smoke-eval          — promptfoo / claude smoke eval
        stg/agent-test         — autonomous L1–L4 staging tests
        prd-observe/canary-watch     — 3σ post-deploy canary watch
        prd-observe/terraform-drift  — daily Terraform drift check
        prd-observe/verify-fix       — Sentry fix verification
        ops/error-triage             — alias of issue/sentry-triage
        ops/summarize-failure  — summarise a failed run
        ops/flag-audit         — weekly feature-flag audit
        observability/health-report  — daily AI-synthesised digest
        agents/ai-changelog          — auto Keep-a-Changelog body
        agents/docubot               — alias of pr-agent/docubot
    required: true
  prompt:
    description: Custom prompt text or slash command. Overrides built-in skill prompt.
    required: false
    default: ''
  prompt-path:
    description: Path to a custom prompt file (relative to caller repo).
    required: false
    default: ''
  context:
    description: JSON object with scalar fields. Keys become {{name}} placeholders in prompt rendering.
    required: false
    default: '{}'
  model:
    description: Claude model id.
    required: false
    default: 'claude-sonnet-4-5-20250929'
  max-turns:
    description: Maximum agent turns.
    required: false
    default: '10'
  anthropic-api-key:
    description: Anthropic API key.
    required: true
  github-token:
    description: GitHub token for MCP tool access and CI data queries.
    required: false
    default: ''
  api-base-url:
    description: Custom Anthropic-compatible base URL (e.g. self-hosted proxy).
    required: false
    default: ''

outputs:
  execution-file:
    description: Path to the Claude Code execution output file.
    value: ${{ steps.harness.outputs.execution-file }}
  branch-name:
    description: Branch created by Claude (when applicable).
    value: ${{ steps.harness.outputs.branch-name }}
  session-id:
    description: Claude Code session id (usable with --resume).
    value: ${{ steps.harness.outputs.session-id }}

runs:
  using: composite
  steps:
    - id: harness
      uses: ./actions/_common/claude-harness
      with:
        task: ${{ inputs.task }}
        prompt: ${{ inputs.prompt }}
        prompt-path: ${{ inputs.prompt-path }}
        context: ${{ inputs.context }}
        model: ${{ inputs.model }}
        max-turns: ${{ inputs.max-turns }}
        api-key: ${{ inputs.anthropic-api-key }}
        github-token: ${{ inputs.github-token }}
        api-base-url: ${{ inputs.api-base-url }}
