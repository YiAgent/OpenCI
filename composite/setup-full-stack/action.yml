name: "Setup Full Stack"
description: |
  Setup Node.js + Python + Redis for full-stack development.
  Chains setup-node, setup-python, and starts a Redis container.

inputs:
  install-deps:
    description: "Install project dependencies"
    required: false
    default: "true"
  node-version:
    description: "Node.js version override"
    required: false
    default: ""
  python-version:
    description: "Python version override"
    required: false
    default: ""
  redis-version:
    description: "Redis Docker image version"
    required: false
    default: "7-alpine"

outputs:
  node-version:
    description: "Resolved Node.js version"
    value: ${{ steps.node.outputs.node-version }}
  python-version:
    description: "Resolved Python version"
    value: ${{ steps.python.outputs.python-version }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      id: node
      uses: ./actions/setup-node
      with:
        node-version: ${{ inputs.node-version }}
        install-deps: ${{ inputs.install-deps }}

    - name: Setup Python
      id: python
      uses: ./actions/setup-python
      with:
        python-version: ${{ inputs.python-version }}
        install-deps: ${{ inputs.install-deps }}

    - name: Start Redis
      shell: bash
      run: |
        docker run -d --name redis -p 6379:6379 redis:${{ inputs.redis-version }}
        echo "## Full Stack Setup" >> "$GITHUB_STEP_SUMMARY"
        echo "- Node.js: ${{ steps.node.outputs.node-version }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Python: ${{ steps.python.outputs.python-version }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Redis: ${{ inputs.redis-version }}" >> "$GITHUB_STEP_SUMMARY"
