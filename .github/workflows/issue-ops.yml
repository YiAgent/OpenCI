# issue-ops.yml — thin event entry for the issue agent domain.
name: issue-ops

on:
  issues:
    types: [opened, reopened, edited, closed]
  issue_comment:
    types: [created]
  schedule:
    - cron: "0 2 * * *"
  repository_dispatch:
    types: [linear-issue-started, sentry-issue]
  workflow_dispatch:
    inputs:
      mode:
        required: false
        type: choice
        default: lifecycle
        options: [lifecycle, maintenance, ingest]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read

concurrency:
  group: issue-ops-${{ github.event.issue.number || github.event.client_payload.id || github.run_id }}
  cancel-in-progress: false

jobs:
  lifecycle:
    if: github.event_name == 'issues' || github.event_name == 'issue_comment'
    uses: YiAgent/OpenCI/.github/workflows/reusable/issue.yml@ebe8fca3260dce68d34d51b74703169e776bc72d
    with:
      mode: lifecycle
      runner: blacksmith-32vcpu-ubuntu-2404
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.API_BASE_URL }}
      sentry-token: ${{ secrets.SENTRY_TOKEN }}
      linear-token: ${{ secrets.LINEAR_TOKEN }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      mcp-dispatch-token: ${{ secrets.MCP_DISPATCH_TOKEN }}

  ingest:
    if: github.event_name == 'repository_dispatch'
    uses: YiAgent/OpenCI/.github/workflows/reusable/issue.yml@ebe8fca3260dce68d34d51b74703169e776bc72d
    with:
      mode: ingest
      runner: blacksmith-32vcpu-ubuntu-2404
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.API_BASE_URL }}
      sentry-token: ${{ secrets.SENTRY_TOKEN }}
      linear-token: ${{ secrets.LINEAR_TOKEN }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      mcp-dispatch-token: ${{ secrets.MCP_DISPATCH_TOKEN }}

  maintenance:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'maintenance')
    uses: YiAgent/OpenCI/.github/workflows/reusable/issue.yml@ebe8fca3260dce68d34d51b74703169e776bc72d
    with:
      mode: maintenance
      runner: blacksmith-32vcpu-ubuntu-2404
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.API_BASE_URL }}
      sentry-token: ${{ secrets.SENTRY_TOKEN }}
      linear-token: ${{ secrets.LINEAR_TOKEN }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      mcp-dispatch-token: ${{ secrets.MCP_DISPATCH_TOKEN }}

  manual:
    if: github.event_name == 'workflow_dispatch' && inputs.mode != 'maintenance'
    uses: YiAgent/OpenCI/.github/workflows/reusable/issue.yml@ebe8fca3260dce68d34d51b74703169e776bc72d
    with:
      mode: ${{ inputs.mode }}
      runner: blacksmith-32vcpu-ubuntu-2404
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.API_BASE_URL }}
      sentry-token: ${{ secrets.SENTRY_TOKEN }}
      linear-token: ${{ secrets.LINEAR_TOKEN }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      mcp-dispatch-token: ${{ secrets.MCP_DISPATCH_TOKEN }}
