# issue-ops.yml — thin event entry for the issue agent domain.
name: issue-ops

on:
  issues:
    types: [opened, reopened, edited, closed]
  issue_comment:
    types: [created]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        required: false
        type: choice
        default: lifecycle
        options: [lifecycle, maintenance]
      model:
        required: false
        type: string
        default: ""
        description: "AI model override (e.g. glm-4-flash). Leave empty to use vars.AI_MODEL or the reusable default."

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read

concurrency:
  group: issue-ops-${{ github.event.issue.number || github.event.client_payload.id || github.run_id }}
  cancel-in-progress: false

jobs:
  lifecycle:
    if: >-
      github.event_name == 'issues'
      || (github.event_name == 'issue_comment'
          && github.event.comment.user.login != 'github-actions[bot]'
          && github.event.comment.user.login != 'openci-agent[bot]')
    uses: YiAgent/OpenCI/.github/workflows/reusable-issue.yml@0babb42f2888d2d37cfaf81019eedb02deec91d5
    with:
      mode: lifecycle
      runner: blacksmith-2vcpu-ubuntu-2404
      model: ${{ vars.AI_MODEL || '' }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.ANTHROPIC_BASE_URL }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      mcp-dispatch-token: ${{ secrets.MCP_DISPATCH_TOKEN }}

  maintenance:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'maintenance')
    uses: YiAgent/OpenCI/.github/workflows/reusable-issue.yml@0babb42f2888d2d37cfaf81019eedb02deec91d5
    with:
      mode: maintenance
      runner: blacksmith-2vcpu-ubuntu-2404
      model: ${{ vars.AI_MODEL || '' }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.ANTHROPIC_BASE_URL }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      mcp-dispatch-token: ${{ secrets.MCP_DISPATCH_TOKEN }}

  manual:
    if: github.event_name == 'workflow_dispatch' && inputs.mode != 'maintenance'
    uses: YiAgent/OpenCI/.github/workflows/reusable-issue.yml@0babb42f2888d2d37cfaf81019eedb02deec91d5
    with:
      mode: ${{ inputs.mode }}
      runner: blacksmith-2vcpu-ubuntu-2404
      model: ${{ inputs.model || vars.AI_MODEL || '' }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.ANTHROPIC_BASE_URL }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      mcp-dispatch-token: ${{ secrets.MCP_DISPATCH_TOKEN }}
