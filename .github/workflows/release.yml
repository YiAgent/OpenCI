# release.yml — event entry for tagged releases.
# `git push origin v*` runs marketplace + docker release jobs by default.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mode:
        required: false
        type: string
        default: both

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: YiAgent/OpenCI/.github/workflows/reusable/release.yml@d280a64a392b7f1a3e906246286ca983e610f920
    with:
      mode: ${{ inputs.mode || 'both' }}
      image-name: ${{ vars.IMAGE_NAME || github.event.repository.name }}
      registry: ghcr.io
      runner: blacksmith-32vcpu-ubuntu-2404
