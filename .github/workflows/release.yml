# release.yml — event entry for tagged releases.
# `git push origin v*` runs marketplace + docker release jobs by default.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mode:
        required: false
        type: string
        default: both

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: YiAgent/OpenCI/.github/workflows/reusable-release.yml@9ece821ce8ba9b377ad95c68f25f67c7d2e6cc9c
    with:
      mode: ${{ inputs.mode || 'both' }}
      image-name: ${{ vars.IMAGE_NAME || github.event.repository.name }}
      registry: ghcr.io
      runner: blacksmith-2vcpu-ubuntu-2404
