# release.yml — event entry for tagged releases.
# `git push origin v*` runs marketplace + docker release jobs by default.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mode:
        required: false
        type: string
        default: both

permissions:
  contents: write
  packages: write
  id-token: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: YiAgent/OpenCI/.github/workflows/reusable-release.yml@a3231202c05a0d1dd9d6e867ae660004f8451c59
    secrets: inherit
    with:
      mode: ${{ inputs.mode || 'marketplace' }}
      image-name: ${{ vars.IMAGE_NAME || github.event.repository.name }}
      registry: ghcr.io
      runner: blacksmith-2vcpu-ubuntu-2404
