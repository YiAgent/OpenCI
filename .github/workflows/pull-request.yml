# pull-request.yml — event entry that fires the PR quality gate on every PR.
# OpenCI no longer ships standalone "pr-agent" task workflows — consumers
# write their own thin scheduled / event-driven workflows that call
# agent.yml directly with task + prompt-path + context (see EvolveCI
# repo for the canonical pattern). This shim only runs the deterministic
# PR checks via pr.yml.
name: pull-request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  issues: write
  pull-requests: write
  security-events: write
  id-token: write
  statuses: write
  packages: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/reusable/pr.yml
    with:
      enable-ai-review: true
      enable-eval:      true
      runner:           blacksmith-32vcpu-ubuntu-2404
    secrets: inherit
