# on-security.yml — direct event entries for the security domain.
# No facade — full sweep calls security-schedule.yml directly;
# flag-audit and verify-sha run as inline jobs.
name: on-security

on:
  schedule:
    - cron: "0 2 * * 1"        # Monday 02:00 UTC — full sweep
    - cron: "0 15 * * 1"       # Monday 23:00 BJT — flag-audit
  pull_request:
    paths:
      - "manifest.yml"
      - "actions/**/action.yml"
      - ".github/workflows/**.yml"
  push:
    branches: [main]
    paths:
      - "manifest.yml"
      - "actions/**/action.yml"
      - ".github/workflows/**.yml"
  workflow_dispatch:
    inputs:
      mode:
        required: false
        type: string
        default: full

permissions:
  contents: read
  security-events: write
  packages: read
  id-token: write
  issues: write
  actions: read

concurrency:
  group: on-security-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 1') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full') }}
    uses: ./.github/workflows/reusable/security-schedule.yml
    with:
      image-ref: ${{ vars.IMAGE_REF }}
    secrets: inherit

  flag-audit:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 15 * * 1') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'flag-audit') }}
    name: Flag Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: ./actions/_common/flag-audit
        with:
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}

  verify-sha:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'verify-sha') }}
    name: Verify SHA Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version
      - run: bash .github/scripts/verify-sha-consistency.sh
