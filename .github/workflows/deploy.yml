# deploy.yml — event entries for the deploy domain.
# Routes CI/release completions to stg.yml and prd.yml.
# Observability triggers live in observability.yml.
#
# image-digest plumbing:
#   - workflow_dispatch: caller passes inputs.image-digest (and stg-* for prd)
#   - workflow_run:      ci.yml / release.yml are expected to write the digest
#                        into vars.LAST_CI_IMAGE_DIGEST (etc.) before completing
#                        so downstream deploys can read it; until that wiring
#                        lands, workflow_run dispatches read the same vars.*
#                        with sensible empty fallbacks.
name: deploy

on:
  workflow_run:
    workflows: [ci, release]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        required: false
        type: string
        default: stg
      image-digest:
        description: "sha256:... digest of the image to deploy. Required for stg/prd."
        required: false
        type: string
        default: ""
      stg-image-digest:
        description: "Staging image digest (prd only — used for the safety gate)."
        required: false
        type: string
        default: ""
      stg-deploy-time:
        description: "Staging deploy timestamp ISO 8601 (prd only — observation window start)."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  packages: read
  id-token: write
  pull-requests: write
  deployments: write
  actions: write
  issues: write

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: false

jobs:
  stg:
    if: >-
      (github.event_name == 'workflow_run'
        && github.event.workflow_run.name == 'ci'
        && github.event.workflow_run.conclusion == 'success')
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'stg')
    uses: YiAgent/OpenCI/.github/workflows/reusable-stg.yml@cd1b427370ebacb56cc9c0b418d6d8985c9be539
    with:
      app-name:            ${{ vars.APP_NAME || github.event.repository.name }}
      image-name:          ${{ vars.IMAGE_NAME || github.event.repository.name }}
      # image-digest must reach the reusable so deploy steps build a real
      # registry/owner/name@sha256:... reference. dispatch supplies it via
      # inputs; workflow_run paths read vars.LAST_CI_IMAGE_DIGEST written
      # by the upstream ci.yml on success.
      image-digest:        ${{ inputs.image-digest || vars.LAST_CI_IMAGE_DIGEST || '' }}
      health-url:          ${{ vars.STG_HEALTH_URL }}
      runner:              blacksmith-2vcpu-ubuntu-2404
      deploy-type:         ${{ vars.DEPLOY_TYPE || 'docker' }}
      ssh-host:            ${{ vars.STG_SSH_HOST }}
      ssh-user:            ${{ vars.STG_SSH_USER || 'deploy' }}
      ssh-port:            ${{ vars.STG_SSH_PORT || '22' }}
      deploy-mode:         ${{ vars.DEPLOY_MODE || 'compose' }}
      compose-file:        ${{ vars.COMPOSE_FILE || 'docker-compose.yml' }}
      compose-project-dir: ${{ vars.COMPOSE_PROJECT_DIR || '~' }}
    # secrets:inherit name-mismatches kebab-case → UPPER_SNAKE; map explicit.
    # Forward every secret the reusable declares so SSH/k8s preflight passes.
    secrets:
      kubeconfig-stg:    ${{ secrets.KUBECONFIG_STG }}
      ssh-key-stg:       ${{ secrets.SSH_KEY_STG }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      sentry-token:      ${{ secrets.SENTRY_TOKEN }}
      datadog-api-key:   ${{ secrets.DD_API_KEY }}

  prd:
    if: >-
      (github.event_name == 'workflow_run'
        && github.event.workflow_run.name == 'release'
        && github.event.workflow_run.conclusion == 'success')
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'prd')
    uses: YiAgent/OpenCI/.github/workflows/reusable-prd.yml@cd1b427370ebacb56cc9c0b418d6d8985c9be539
    with:
      app-name:            ${{ vars.APP_NAME || github.event.repository.name }}
      image-name:          ${{ vars.IMAGE_NAME || github.event.repository.name }}
      # The 3 prd-specific safety-gate inputs MUST be set or the
      # observation-window check is skipped silently. Source order:
      #   1. workflow_dispatch input (manual override)
      #   2. vars.* recorded by the upstream stg deploy on success
      image-digest:        ${{ inputs.image-digest     || vars.LAST_RELEASE_IMAGE_DIGEST || '' }}
      stg-image-digest:    ${{ inputs.stg-image-digest || vars.LAST_STG_IMAGE_DIGEST     || '' }}
      stg-deploy-time:     ${{ inputs.stg-deploy-time  || vars.LAST_STG_DEPLOY_TIME      || '' }}
      health-url:          ${{ vars.PRD_HEALTH_URL }}
      runner:              blacksmith-2vcpu-ubuntu-2404
      deploy-type:         ${{ vars.DEPLOY_TYPE || 'docker' }}
      ssh-host:            ${{ vars.PRD_SSH_HOST }}
      ssh-user:            ${{ vars.PRD_SSH_USER || 'deploy' }}
      ssh-port:            ${{ vars.PRD_SSH_PORT || '22' }}
      deploy-mode:         ${{ vars.DEPLOY_MODE || 'compose' }}
      compose-file:        ${{ vars.COMPOSE_FILE || 'docker-compose.yml' }}
      compose-project-dir: ${{ vars.COMPOSE_PROJECT_DIR || '~' }}
    # secrets:inherit name-mismatches kebab-case → UPPER_SNAKE; map explicit.
    secrets:
      anthropic-api-key:  ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:       ${{ secrets.ANTHROPIC_BASE_URL }}
      kubeconfig-prd:     ${{ secrets.KUBECONFIG_PRD }}
      ssh-key-prd:        ${{ secrets.SSH_KEY_PRD }}
      slack-webhook-url:  ${{ secrets.SLACK_WEBHOOK_URL }}
      sentry-token:       ${{ secrets.SENTRY_TOKEN }}
      datadog-api-key:    ${{ secrets.DD_API_KEY }}

  # ──────────────────────────────────────────────────────────────────────
  # stg-agent-test — autonomous L1-L4 tests after stg deploy.
  # ──────────────────────────────────────────────────────────────────────
  stg-agent-test:
    if: >-
      github.event_name == 'workflow_run'
        && github.event.workflow_run.name == 'ci'
        && github.event.workflow_run.conclusion == 'success'
    needs: stg
    name: Staging Agent Test L${{ matrix.level }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        level: [1, 2, 3, 4]
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - id: gate
        env:
          K: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$K" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Agent Test Skipped::ANTHROPIC_API_KEY missing"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: ./actions/stg/agent-test
        with:
          level:             ${{ matrix.level }}
          health-url:        ${{ vars.STG_HEALTH_URL }}
          image-digest:      ${{ vars.STG_IMAGE_DIGEST || 'unknown' }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-test-L${{ matrix.level }}
          path: triage/agent-test/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # poll — fire repository_dispatch when observation window passes.
  # ──────────────────────────────────────────────────────────────────────
  poll:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'poll' }}
    name: Poll PRD Dispatch
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - id: poll
        uses: ./actions/_common/poll-prd-dispatch
        with:
          github-token: ${{ github.token }}
      - if: steps.poll.outputs.fired-count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO:     ${{ github.repository }}
          FIRED:    ${{ steps.poll.outputs.fired }}
        run: |
          set -euo pipefail
          echo "$FIRED" | jq -c '.[]' | while IFS= read -r entry; do
            payload="$(jq -nc --argjson e "$entry" '{
              event_type: "observe-window-complete",
              client_payload: {
                "image-digest":     $e.image_digest,
                "stg-image-digest": $e.stg_image_digest,
                "stg-deploy-time":  $e.stg_deploy_time,
                "image-name":       $e.image_name,
                "app-name":         $e.app_name
              }
            }')"
            gh api -X POST "repos/${REPO}/dispatches" --input - <<<"$payload"
            echo "::notice title=PRD Dispatched::digest=$(jq -r '.image_digest' <<<"$entry")"
          done
