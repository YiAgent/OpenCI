# ─────────────────────────────────────────────────────────────────────────────
# deploy.yml — unified deployment domain (reusable workflow).
# ─────────────────────────────────────────────────────────────────────────────
# Public entry point for the deploy domain. Routes by `mode` to the
# appropriate underscore-prefixed implementation workflow:
#
#   mode=deploy    + environment=staging    -> _stg.yml
#   mode=deploy    + environment=production -> _prd.yml
#   mode=observe   + observe-mode=*         -> _prd-observe.yml
#   mode=stg-test                           -> _stg-agent-test.yml
#   mode=poll                               -> _poll-prd-dispatch.yml
#
# External consumers ONLY call this file. The _*.yml implementations are
# private; underscore prefix marks them as not part of the public API.
#
# Reusable invocation:
#   uses: YiAgent/OpenCI/.github/workflows/deploy.yml@v3
#   with:
#     mode: deploy
#     environment: staging
#     image-digest: sha256:abc...
#     image-name: my-app
#     health-url: https://stg.example.com/healthz
#   secrets:
#     anthropic-api-key:    secrets.ANTHROPIC_API_KEY
#     anthropic-base-url:   secrets.ANTHROPIC_BASE_URL
#     kubeconfig-stg:       secrets.KUBECONFIG_STG
#     kubeconfig-prd:       secrets.KUBECONFIG_PRD
#     slack-webhook-url:    secrets.SLACK_WEBHOOK_URL
#
# Security: all consumer-supplied values flow as inputs/secrets into the
# implementation workflows; no shell interpolation in this facade.
# ─────────────────────────────────────────────────────────────────────────────
name: deploy

on:
  workflow_call:
    inputs:
      mode:
        description: deploy | observe | stg-test | poll
        required: false
        type: string
        default: deploy
      environment:
        description: staging | production (used when mode=deploy)
        required: false
        type: string
        default: staging
      observe-mode:
        description: canary-watch | terraform-drift | verify-fix (used when mode=observe)
        required: false
        type: string
        default: canary-watch
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; pin a tag in production).
        required: false
        type: string
        default: main
      model:
        description: Override the AI model name. Defaults to the Anthropic Claude model when empty.
        required: false
        type: string
        default: ''
      image-digest:
        required: false
        type: string
        default: ''
      stg-image-digest:
        required: false
        type: string
        default: ''
      stg-deploy-time:
        required: false
        type: string
        default: ''
      image-name:
        required: false
        type: string
        default: ''
      registry:
        required: false
        type: string
        default: ghcr.io
      app-name:
        required: false
        type: string
        default: ''
      health-url:
        required: false
        type: string
        default: ''
      observation-minutes:
        required: false
        type: number
        default: 30
      k8s-namespace:
        required: false
        type: string
        default: default
      run-migration:
        required: false
        type: boolean
        default: false
      infra-dir:
        description: Terraform infrastructure directory (used when observe-mode=terraform-drift)
        required: false
        type: string
        default: infrastructure
    secrets:
      anthropic-api-key:    { required: false }
      api-base-url:         { required: false }
      kubeconfig-stg:       { required: false }
      kubeconfig-prd:       { required: false }
      slack-webhook-url:    { required: false }
      sentry-token:         { required: false }
      datadog-api-key:      { required: false }
      datadog-app-key:      { required: false }
      posthog-api-key:      { required: false }
      langsmith-api-key:    { required: false }
      axiom-token:          { required: false }

permissions: {}

jobs:
  stg:
    if: ${{ inputs.mode == 'deploy' && inputs.environment == 'staging' }}
    uses: ./.github/workflows/_stg.yml
    with:
      openci-ref:     ${{ inputs.openci-ref }}
      image-digest:   ${{ inputs.image-digest }}
      image-name:     ${{ inputs.image-name }}
      registry:       ${{ inputs.registry }}
      app-name:       ${{ inputs.app-name }}
      health-url:     ${{ inputs.health-url }}
      k8s-namespace:  ${{ inputs.k8s-namespace }}
      run-migration:  ${{ inputs.run-migration }}
    secrets:
      kubeconfig-stg:    ${{ secrets.kubeconfig-stg }}
      slack-webhook-url: ${{ secrets.slack-webhook-url }}
      sentry-token:      ${{ secrets.sentry-token }}
      datadog-api-key:   ${{ secrets.datadog-api-key }}
      posthog-api-key:   ${{ secrets.posthog-api-key }}
      langsmith-api-key: ${{ secrets.langsmith-api-key }}
      axiom-token:       ${{ secrets.axiom-token }}

  prd:
    if: ${{ inputs.mode == 'deploy' && inputs.environment == 'production' }}
    uses: ./.github/workflows/_prd.yml
    with:
      openci-ref:           ${{ inputs.openci-ref }}
      model:                ${{ inputs.model }}
      image-digest:         ${{ inputs.image-digest }}
      stg-image-digest:     ${{ inputs.stg-image-digest }}
      stg-deploy-time:      ${{ inputs.stg-deploy-time }}
      image-name:           ${{ inputs.image-name }}
      registry:             ${{ inputs.registry }}
      app-name:             ${{ inputs.app-name }}
      health-url:           ${{ inputs.health-url }}
      observation-minutes:  ${{ inputs.observation-minutes }}
      k8s-namespace:        ${{ inputs.k8s-namespace }}
      run-migration:        ${{ inputs.run-migration }}
    secrets:
      anthropic-api-key: ${{ secrets.anthropic-api-key }}
      api-base-url:      ${{ secrets.api-base-url }}
      kubeconfig-prd:    ${{ secrets.kubeconfig-prd }}
      slack-webhook-url: ${{ secrets.slack-webhook-url }}
      sentry-token:      ${{ secrets.sentry-token }}
      datadog-api-key:   ${{ secrets.datadog-api-key }}
      posthog-api-key:   ${{ secrets.posthog-api-key }}
      langsmith-api-key: ${{ secrets.langsmith-api-key }}
      axiom-token:       ${{ secrets.axiom-token }}

  observe:
    if: ${{ inputs.mode == 'observe' }}
    uses: ./.github/workflows/_prd-observe.yml
    with:
      openci-ref: ${{ inputs.openci-ref }}
      mode:       ${{ inputs.observe-mode }}
      infra-dir:  ${{ inputs.infra-dir }}
    secrets:
      sentry-token: ${{ secrets.sentry-token }}

  stg-test:
    if: ${{ inputs.mode == 'stg-test' }}
    name: Staging Agent Test L${{ matrix.level }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        level: [1, 2, 3, 4]
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - id: gate
        env:
          K: ${{ secrets.anthropic-api-key }}
        run: |
          if [ -z "$K" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Agent Test Skipped::ANTHROPIC_API_KEY missing"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: ./.openci/actions/stg/agent-test
        with:
          level:             ${{ matrix.level }}
          health-url:        ${{ inputs.health-url }}
          image-digest:      ${{ inputs.image-digest || 'unknown' }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-test-L${{ matrix.level }}
          path: triage/agent-test/
          retention-days: 14

  poll:
    if: ${{ inputs.mode == 'poll' }}
    name: Poll + Dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - id: poll
        uses: ./.openci/actions/_common/poll-prd-dispatch
        with:
          github-token: ${{ github.token }}
      - name: Fire repository_dispatch for each due entry
        if: steps.poll.outputs.fired-count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO:     ${{ github.repository }}
          FIRED:    ${{ steps.poll.outputs.fired }}
        run: |
          set -euo pipefail
          echo "$FIRED" | jq -c '.[]' | while IFS= read -r entry; do
            payload="$(jq -nc --argjson e "$entry" '{
              event_type: "observe-window-complete",
              client_payload: {
                "image-digest":     $e.image_digest,
                "stg-image-digest": $e.stg_image_digest,
                "stg-deploy-time":  $e.stg_deploy_time,
                "image-name":       $e.image_name,
                "app-name":         $e.app_name
              }
            }')"
            gh api -X POST "repos/${REPO}/dispatches" --input - <<<"$payload"
            echo "::notice title=PRD Dispatched::digest=$(jq -r '.image_digest' <<<"$entry")"
          done
