# ─────────────────────────────────────────────────────────────────────────────
# dep-auto-merge.yml — flip Renovate patch PRs to auto-merge.
# ─────────────────────────────────────────────────────────────────────────────
# Renovate already labels patch updates with `patch`. We just enable
# GitHub's native auto-merge so the PR squashes itself when all required
# checks pass — including verify-sha-consistency, which catches any
# manifest drift introduced by the dep bump itself.
#
# We never auto-merge:
#   • major / minor (Renovate doesn't add `patch` label there)
#   • PRs without `patch` label (= human-curated)
#
# Reusable: consumers call this from a thin wrapper on
#   pull_request_target: [opened, labeled, synchronize, reopened].
#   No inputs or secrets required — uses the caller's github.token.
#
# Security: we only call `gh pr merge --auto` (gated on branch protection
# rules); PR fields are not interpolated into shell commands.
# ─────────────────────────────────────────────────────────────────────────────
name: reusable-deps

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label to use for all jobs in this workflow. Defaults to ubuntu-latest for open-source compatibility.
        required: false
        type: string
        default: ubuntu-latest

permissions: {}

concurrency:
  group: dep-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    permissions: {}
    name: Enable Auto-Merge
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3
    if: |
      github.event.pull_request.user.login == 'renovate[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'patch')
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - name: gh pr merge --auto
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
          echo "::notice title=Auto-Merge Enabled::PR #$PR_NUMBER will merge once required checks pass"
