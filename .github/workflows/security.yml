# ─────────────────────────────────────────────────────────────────────────────
# security.yml — unified security domain (reusable workflow).
# ─────────────────────────────────────────────────────────────────────────────
# Public entry point for the security domain. Routes by mode input:
#   mode=full        -> _security-schedule.yml (CodeQL, Snyk, image, SBOM, scorecard)
#   mode=flag-audit  -> _flag-audit.yml         (Claude-driven feature-flag audit)
#   mode=verify-sha  -> _verify-sha-consistency.yml (manifest SHA drift check)
#
# The verify-sha mode is also called from reusable/ci.yml as a job, so
# every push-to-main and every PR exercises the same script. The script
# itself lives at .github/scripts/verify-sha-consistency.sh.
# ─────────────────────────────────────────────────────────────────────────────
name: security

on:
  workflow_call:
    inputs:
      mode:
        description: full | flag-audit | verify-sha
        required: false
        type: string
        default: full
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; pin a tag in production).
        required: false
        type: string
        default: main
      model:
        description: Override the AI model name (used by flag-audit). Defaults to the Anthropic Claude model when empty.
        required: false
        type: string
        default: ''
      image-ref:
        description: Optional image to scan (registry/owner/name@sha256). Used by mode=full.
        required: false
        type: string
        default: ''
    secrets:
      anthropic-api-key: { required: false }
      api-base-url:      { required: false }
      snyk-token:        { required: false }

permissions: {}

jobs:
  full:
    if: ${{ inputs.mode == 'full' }}
    uses: ./.github/workflows/_security-schedule.yml
    with:
      openci-ref: ${{ inputs.openci-ref }}
      image-ref:  ${{ inputs.image-ref }}
    secrets:
      snyk-token: ${{ secrets.snyk-token }}

  flag-audit:
    if: ${{ inputs.mode == 'flag-audit' || inputs.mode == 'full' }}
    name: Flag Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/flag-audit
        with:
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}

  verify-sha:
    if: ${{ inputs.mode == 'verify-sha' }}
    name: Verify SHA Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version
      - name: Run verify-sha-consistency.sh
        shell: bash
        run: bash .github/scripts/verify-sha-consistency.sh
