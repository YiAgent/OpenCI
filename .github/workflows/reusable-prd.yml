# ─────────────────────────────────────────────────────────────────────────────
# prd.yml — Production deploy with environment gate (SPEC §5.5).
# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • workflow_call          — explicit caller orchestration
#   • workflow_dispatch      — manual emergency
#   • push tags v*           — semantic version tag releases
#   • repository_dispatch    — observe-window-complete (P1-12 chain)
#
# Critical sequence:
#   preflight → pre-check (composite: verify-version-align + observe-window)
#             → deploy-k8s [environment: production] → run-migration?
#             → smoke-test → create-release + notify-deployed
#             ↳ on smoke failure → auto-rollback (P1-14)
#
# `environment: production` is the human gate. Reviewers are configured in
# repo Settings → Environments — this workflow does not bake in a specific
# reviewer set.
#
# Security: no PR-form fields are read here; all consumer inputs are via
# the workflow_call contract or repo-controlled tags / vars.
# ─────────────────────────────────────────────────────────────────────────────
name: prd

on:
  workflow_call:
    inputs:
      model:
        description: Override the AI model name. Defaults to the Anthropic Claude model when empty.
        required: false
        type: string
        default: ""
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; use a tag like v2 in production).
        required: false
        type: string
        default: main
      runner:
        description: Runner label to use for all jobs. Defaults to ubuntu-latest for open-source compatibility.
        required: false
        type: string
        default: ubuntu-latest
      image-digest:
        type: string
        required: false
      stg-image-digest:
        type: string
        required: false
      stg-deploy-time:
        type: string
        required: false
      image-name:
        type: string
        required: false
      registry:
        type: string
        required: false
        default: ghcr.io
      app-name:
        type: string
        required: false
      health-url:
        type: string
        required: false
      observation-minutes:
        type: number
        required: false
        default: 30
      k8s-namespace:
        type: string
        required: false
        default: production
      run-migration:
        type: boolean
        required: false
        default: false
      deploy-type:
        description: "Deployment mechanism: docker (default) or k8s."
        type: string
        required: false
        default: docker
      ssh-host:
        description: Target server hostname or IP (docker deploy).
        type: string
        required: false
        default: ""
      ssh-user:
        description: SSH user (docker deploy).
        type: string
        required: false
        default: deploy
      ssh-port:
        description: SSH port (docker deploy).
        type: string
        required: false
        default: "22"
      deploy-mode:
        description: "Docker deploy mode: compose (default) or run."
        type: string
        required: false
        default: compose
      compose-file:
        description: Path to docker-compose.yml on target server.
        type: string
        required: false
        default: docker-compose.yml
      compose-project-dir:
        description: Working directory on the server.
        type: string
        required: false
        default: "~"
      docker-run-args:
        description: Extra args for docker run (run mode only).
        type: string
        required: false
        default: ""
    secrets:
      anthropic-api-key:
        description: Anthropic-compatible API key — used by AI changelog in create-release.
        required: false
      api-base-url:
        description: Custom Anthropic-compatible base URL. Leave unset to use the default Anthropic endpoint.
        required: false
      kubeconfig-prd:
        required: false
      ssh-key-prd:
        required: false
      slack-webhook-url:
        required: false
      sentry-token:
        required: false
      datadog-api-key:
        required: false
      posthog-api-key:
        required: false
      langsmith-api-key:
        required: false
      axiom-token:
        required: false
permissions: {}

concurrency:
  group: deploy-prd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    permissions: {}
    name: Preflight
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 2
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - name: Probe secrets
        env:
          DEPLOY_TYPE:       ${{ inputs.deploy-type }}
          KUBECONFIG_PRD:    ${{ secrets.kubeconfig-prd }}
          SSH_KEY_PRD:       ${{ secrets.ssh-key-prd }}
          SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
        run: |
          if [ "$DEPLOY_TYPE" = "k8s" ]; then
            bash .openci/.github/scripts/preflight-secrets.sh \
              --required "KUBECONFIG_PRD" \
              --optional "SLACK_WEBHOOK_URL"
          else
            bash .openci/.github/scripts/preflight-secrets.sh \
              --required "SSH_KEY_PRD" \
              --optional "SLACK_WEBHOOK_URL"
          fi
      - uses: ./.openci/actions/deploy/preflight
        with:
          environment:  production
          health-url:   ${{ inputs.health-url }}

  pre-check:
    permissions: {}
    name: Pre-Check
    needs: preflight
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/prd/pre-check
        with:
          image-digest:        ${{ inputs.image-digest }}
          stg-image-digest:    ${{ inputs.stg-image-digest }}
          stg-deploy-time:     ${{ inputs.stg-deploy-time }}
          observation-minutes: ${{ inputs.observation-minutes }}
          # Sentry error-rate gate (optional, graceful-skip when token unset).
          sentry-token:        ${{ secrets.sentry-token }}
          sentry-org:          ${{ vars.SENTRY_ORG }}
          sentry-project:      ${{ vars.SENTRY_PROJECT }}

  deploy-k8s:
    permissions: {}
    name: Deploy K8s (production)
    if: inputs.deploy-type == 'k8s'
    needs: pre-check
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    environment:
      name: production
    outputs:
      deploy-time:       ${{ steps.deploy.outputs.deploy-time }}
      previous-revision: ${{ steps.deploy.outputs.previous-revision }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - id: deploy
        uses: ./.openci/actions/prd/deploy-k8s
        with:
          app-name:      ${{ inputs.app-name }}
          image-ref:     ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          k8s-namespace: ${{ inputs.k8s-namespace }}
          kubeconfig:    ${{ secrets.kubeconfig-prd }}

  deploy-docker:
    permissions: {}
    name: Deploy Docker (production)
    if: inputs.deploy-type != 'k8s'
    needs: pre-check
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    environment:
      name: production
    outputs:
      deploy-time:    ${{ steps.deploy.outputs.deploy-time }}
      previous-image: ${{ steps.deploy.outputs.previous-image }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF:     ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - id: deploy
        uses: ./.openci/actions/deploy/docker
        with:
          app-name:            ${{ inputs.app-name }}
          image-ref:           ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          ssh-host:            ${{ inputs.ssh-host }}
          ssh-user:            ${{ inputs.ssh-user }}
          ssh-port:            ${{ inputs.ssh-port }}
          ssh-key:             ${{ secrets.ssh-key-prd }}
          deploy-mode:         ${{ inputs.deploy-mode }}
          compose-file:        ${{ inputs.compose-file }}
          compose-project-dir: ${{ inputs.compose-project-dir }}
          docker-run-args:     ${{ inputs.docker-run-args }}

  run-migration:
    permissions: {}
    name: Run Migration (production)
    needs: [deploy-k8s, deploy-docker]
    if: >-
      inputs.run-migration == true &&
      (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/run-migration
        with:
          environment:   production
          migration-cmd: ${{ vars.MIGRATION_APPLY_CMD || 'false' }}

  smoke-test:
    permissions: {}
    name: Smoke Test (production)
    needs: [deploy-k8s, deploy-docker, run-migration]
    if: >-
      always() &&
      (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success') &&
      (needs.run-migration.result == 'success' || needs.run-migration.result == 'skipped')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/prd/smoke-test
        with:
          health-url: ${{ inputs.health-url }}

  auto-rollback:
    permissions: {}
    name: Auto Rollback (K8s)
    needs: [deploy-k8s, smoke-test]
    if: >-
      always() &&
      needs.smoke-test.result == 'failure' &&
      needs.deploy-k8s.result == 'success'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - name: Configure kubectl
        env:
          KCONF: ${{ secrets.kubeconfig-prd }}
        run: |
          set -euo pipefail
          path="${RUNNER_TEMP:-/tmp}/kubeconfig"
          echo "$KCONF" | base64 -d > "$path"
          chmod 600 "$path"
          echo "::add-mask::$(tr -d '\n' < "$path")"
          echo "KUBECONFIG=$path" >> "$GITHUB_ENV"
      - uses: ./.openci/actions/prd/auto-rollback
        with:
          app-name:          ${{ inputs.app-name }}
          k8s-namespace:     ${{ inputs.k8s-namespace }}
          previous-revision: ${{ needs.deploy-k8s.outputs.previous-revision }}
          failed-image:      ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          github-token:      ${{ github.token }}

  auto-rollback-docker:
    permissions: {}
    name: Auto Rollback (Docker)
    needs: [deploy-docker, smoke-test]
    if: >-
      always() &&
      needs.smoke-test.result == 'failure' &&
      needs.deploy-docker.result == 'success'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF:     ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/deploy/auto-rollback-docker
        with:
          app-name:            ${{ inputs.app-name }}
          previous-image:      ${{ needs.deploy-docker.outputs.previous-image }}
          failed-image:        ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          ssh-host:            ${{ inputs.ssh-host }}
          ssh-user:            ${{ inputs.ssh-user }}
          ssh-port:            ${{ inputs.ssh-port }}
          ssh-key:             ${{ secrets.ssh-key-prd }}
          deploy-mode:         ${{ inputs.deploy-mode }}
          compose-file:        ${{ inputs.compose-file }}
          compose-project-dir: ${{ inputs.compose-project-dir }}
          docker-run-args:     ${{ inputs.docker-run-args }}
          github-token:        ${{ github.token }}
          environment:         production

  create-release:
    permissions: {}
    name: Create Release
    needs: smoke-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/prd/create-release
        with:
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}

  notify-observability:
    permissions: {}
    name: Notify Observability
    needs: [deploy-k8s, deploy-docker, smoke-test]
    if: always() && (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/integrations/notify-deploy
        with:
          environment: prd
          version:     ${{ inputs.image-digest }}
          git-sha:     ${{ github.sha }}
          app-name:    ${{ inputs.app-name }}
          enable-sentry:     ${{ vars.ENABLE_SENTRY    || 'false' }}
          enable-datadog:    ${{ vars.ENABLE_DATADOG   || 'false' }}
          enable-posthog:    ${{ vars.ENABLE_POSTHOG   || 'false' }}
          enable-langsmith:  ${{ vars.ENABLE_LANGSMITH || 'false' }}
          enable-axiom:      ${{ vars.ENABLE_AXIOM     || 'false' }}
          sentry-token:      ${{ secrets.sentry-token }}
          sentry-org:        ${{ vars.SENTRY_ORG }}
          sentry-project:    ${{ vars.SENTRY_PROJECT }}
          datadog-api-key:   ${{ secrets.datadog-api-key }}
          datadog-site:      ${{ vars.DATADOG_SITE     || 'datadoghq.com' }}
          posthog-api-key:   ${{ secrets.posthog-api-key }}
          posthog-host:      ${{ vars.POSTHOG_HOST     || 'app.posthog.com' }}
          langsmith-api-key: ${{ secrets.langsmith-api-key }}
          langsmith-project: ${{ vars.LANGSMITH_PROJECT }}
          axiom-token:       ${{ secrets.axiom-token }}
          axiom-dataset:     ${{ vars.AXIOM_DATASET }}

  notify-deployed:
    permissions: {}
    name: Notify Deployed
    needs: [deploy-k8s, deploy-docker, smoke-test]
    if: always()
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/notify-deployed
        with:
          environment: production
          status:      ${{ (needs.smoke-test.result == 'success' && (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success')) && 'success' || 'failure' }}
          app-name:    ${{ inputs.app-name }}
          image-ref:   ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          webhook-url: ${{ secrets.slack-webhook-url }}
          run-url:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
