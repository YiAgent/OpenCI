# issue.yml — agent-driven issue orchestrator.
#
# Pipeline:
#   Stage 1: ingest       deterministic issue management + normalized payload
#   Stage 2: enrich       merged shared/domain agent workspace
#   Stage 3: agent        Claude returns issue-action-plan/v1
#   Stage 4: execute      guarded allowlisted mutations + audit trail
name: issue

on:
  workflow_call:
    inputs:
      openci-ref:
        description: OpenCI ref to vendor for ./.openci references.
        required: false
        type: string
        default: main
      runner:
        description: Runner label to use for all jobs. Defaults to ubuntu-latest for open-source compatibility.
        required: false
        type: string
        default: ubuntu-latest
      mode:
        description: lifecycle | maintenance | ingest
        required: false
        type: string
        default: lifecycle
      model:
        description: Override the AI model name.
        required: false
        type: string
        default: ""
      issue-stale-days:
        type: number
        required: false
        default: 60
      issue-close-days:
        type: number
        required: false
        default: 14
      pr-stale-days:
        type: number
        required: false
        default: 30
      pr-close-days:
        type: number
        required: false
        default: 7
      lock-after-days:
        type: number
        required: false
        default: 30
    secrets:
      anthropic-api-key:
        required: false
      api-base-url:
        required: false
      sentry-token:
        required: false
      linear-token:
        required: false
      slack-webhook-url:
        required: false
      mcp-dispatch-token:
        required: false

permissions: {}

concurrency:
  group: >-
    issue-${{
      github.event.issue.number
      || github.event.client_payload.id
      || github.event.schedule
      || github.run_id
    }}
  cancel-in-progress: ${{ github.event_name == 'issues' }}

jobs:
  maintenance:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write
    name: Stage 1 · Maintenance
    if: inputs.mode == 'maintenance' || inputs.mode == 'stale'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f
        with:
          repo-token: ${{ github.token }}
          days-before-issue-stale: ${{ inputs.issue-stale-days }}
          days-before-issue-close: ${{ inputs.issue-close-days }}
          days-before-pr-stale: ${{ inputs.pr-stale-days }}
          days-before-pr-close: ${{ inputs.pr-close-days }}
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,help-wanted,priority:p0,priority:p1
          exempt-pr-labels: pinned,security,wip
          stale-issue-message: This issue has been inactive for a while and is marked stale. Comment to keep it open.
          close-issue-message: Closing as stale. Reopen if still relevant.
          stale-pr-message: This pull request has been inactive for a while and is marked stale. Comment to keep it open.
          close-pr-message: Closing as stale. Reopen if still relevant.
      - uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7
        with:
          issue-inactive-days: ${{ inputs.lock-after-days }}
          pr-inactive-days: ${{ inputs.lock-after-days }}
      - name: Process due issue follow-ups
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const now = Date.now();
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: 'open',
              labels: 'followup:scheduled',
              per_page: 100,
            });

            for (const issue of issues.filter((item) => !item.pull_request)) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                ...context.repo,
                issue_number: issue.number,
                per_page: 100,
              });
              const records = comments
                .map((comment) => {
                  const match = (comment.body || '').match(/<!-- openci-followup:(.*?) -->/);
                  if (!match) return null;
                  try {
                    return {comment, payload: JSON.parse(match[1])};
                  } catch {
                    return null;
                  }
                })
                .filter(Boolean)
                .sort((a, b) => new Date(b.comment.created_at) - new Date(a.comment.created_at));
              const next = records[0];
              if (!next || !next.payload.due_at || Date.parse(next.payload.due_at) > now) continue;

              const dueMarker = `<!-- openci-followup-due:${next.payload.due_at} -->`;
              if (comments.some((comment) => (comment.body || '').includes(dueMarker))) continue;

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: [
                  dueMarker,
                  `OpenCI follow-up is due: ${next.payload.due_at}`,
                  '',
                  next.payload.reason || 'No follow-up reason was provided.',
                ].join('\n'),
              });
              try {
                await github.rest.issues.removeLabel({...context.repo, issue_number: issue.number, name: 'followup:scheduled'});
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.issues.addLabels({...context.repo, issue_number: issue.number, labels: ['needs-followup']});
            }

  ingest:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write
    name: Stage 1 · Ingest
    if: inputs.mode != 'maintenance' && inputs.mode != 'stale'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    outputs:
      ingest-json: ${{ steps.pack.outputs.ingest-json }}
      issue-number: ${{ steps.pack.outputs.issue-number }}
      plan-subject: ${{ steps.pack.outputs.plan-subject }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - name: Checkout caller repository
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Checkout OpenCI for defaults
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false

      - name: Parse issue form
        id: issue-parser
        if: github.event_name == 'issues' || github.event_name == 'issue_comment'
        continue-on-error: true
        uses: stefanbuck/github-issue-parser@cb6e97157cbf851e3a393ff8d57c93a484cc323f

      - name: Apply area labels from issue form
        id: label-area
        if: github.event_name == 'issues' && github.event.action != 'closed'
        continue-on-error: true
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: area
          config-path: .openci/.github/advanced-issue-labeler.yml
          token: ${{ github.token }}

      - name: Apply severity labels from issue form
        id: label-severity
        if: github.event_name == 'issues' && github.event.action != 'closed'
        continue-on-error: true
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: severity
          config-path: .openci/.github/advanced-issue-labeler.yml
          token: ${{ github.token }}

      - name: Collect duplicate candidates
        id: dedupe
        if: github.event_name == 'issues' && github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: bash ./.openci/actions/issue/collect-duplicates/collect-duplicates.sh

      - name: Pack ingest payload
        id: pack
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          MODE: ${{ inputs.mode }}
          REPO: ${{ github.repository }}
          ISSUE_JSON: ${{ toJson(github.event.issue) }}
          COMMENT_JSON: ${{ toJson(github.event.comment) }}
          CLIENT_PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          FORM_JSON: ${{ steps.issue-parser.outputs.jsonString }}
          AREA_LABELS: ${{ steps.label-area.outputs.labels }}
          SEVERITY_LABELS: ${{ steps.label-severity.outputs.labels }}
          DUPLICATES_JSON: ${{ steps.dedupe.outputs.candidates }}
        run: bash ./.openci/actions/issue/pack-ingest/pack-ingest.sh

      - name: Upload ingest payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: issue-ingest-${{ github.run_id }}
          path: agent-workspace/runtime/ingest.json
          if-no-files-found: error

  enrich:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write
    name: Stage 2 · Enrich
    needs: ingest
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    outputs:
      workspace-artifact: ${{ steps.meta.outputs.workspace-artifact }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - name: Checkout caller repository
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Checkout OpenCI for defaults
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - name: Download ingest payload
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: issue-ingest-${{ github.run_id }}
          path: agent-workspace/runtime

      - name: Build merged agent workspace
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.ingest.outputs.issue-number }}
          HAS_LINEAR_TOKEN: ${{ secrets.linear-token != '' }}
          HAS_SENTRY_TOKEN: ${{ secrets.sentry-token != '' }}
        run: bash ./.openci/actions/issue/build-workspace/build-workspace.sh

      - name: Record workspace artifact name
        id: meta
        run: echo "workspace-artifact=issue-agent-workspace-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Upload merged agent workspace
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: issue-agent-workspace-${{ github.run_id }}
          path: agent-workspace
          if-no-files-found: error

  agent:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write
    name: Stage 3 · Agent Plan
    needs: [ingest, enrich]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    outputs:
      action-plan: ${{ steps.extract.outputs.action-plan }}
      reasoning: ${{ steps.extract.outputs.reasoning }}
      plan-hash: ${{ steps.extract.outputs.plan-hash }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - name: Checkout caller repository
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Checkout OpenCI for harness
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - name: Download merged agent workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ needs.enrich.outputs.workspace-artifact }}
          path: agent-workspace

      - name: Skip when ANTHROPIC_API_KEY missing
        id: gate
        uses: ./.openci/actions/_common/api-key-gate
        with:
          api-key: ${{ secrets.anthropic-api-key }}

      - name: Run issue agent
        id: harness
        if: steps.gate.outputs.skip != 'true'
        uses: ./.openci/actions/_common/claude-harness
        with:
          task: issue/orchestrate
          prompt-path: agent-workspace/prompt.md
          context: "{}"
          api-key: ${{ secrets.anthropic-api-key }}
          api-base-url: ${{ secrets.api-base-url }}
          model: ${{ inputs.model || 'claude-sonnet-4-5-20250929' }}
          max-turns: "8"
          github-token: ${{ github.token }}
          use-sticky-comment: "false"
          show-full-output: "true"
          extra-disallowed-tools: "Bash(gh issue edit),Bash(gh issue close),Bash(gh issue reopen),Bash(gh api repos/*/git/refs)"

      - name: Extract action plan
        id: extract
        uses: ./.openci/actions/issue/extract-plan
        with:
          skipped: ${{ steps.gate.outputs.skip }}
          execution-file: ${{ steps.harness.outputs.execution-file }}

  execute:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write
    name: Stage 4 · Guarded Execute
    needs: [ingest, enrich, agent]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - name: Download merged agent workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ needs.enrich.outputs.workspace-artifact }}
          path: agent-workspace
      - name: Checkout OpenCI for execute action
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - name: Execute guarded action plan
        uses: ./.openci/actions/issue/execute-plan
        with:
          action-plan: ${{ needs.agent.outputs.action-plan }}
          plan-hash: ${{ needs.agent.outputs.plan-hash }}
          issue-number: ${{ needs.ingest.outputs.issue-number }}
          reasoning: ${{ needs.agent.outputs.reasoning }}
          author-association: ${{ github.event.comment.author_association || github.event.issue.author_association || '' }}
          default-branch: ${{ github.event.repository.default_branch || 'main' }}
          linear-token: ${{ secrets.linear-token }}
          notify-webhook-url: ${{ secrets.slack-webhook-url }}
          mcp-dispatch-token: ${{ secrets.mcp-dispatch-token || github.token }}
          workspace-path: agent-workspace
