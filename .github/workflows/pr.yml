# ─────────────────────────────────────────────────────────────────────────────
# pr.yml — PR quality gate (reusable workflow, SPEC §5.2).
# ─────────────────────────────────────────────────────────────────────────────
# Each job is one composite or one atom (SPEC GC2: job ≙ composite). Jobs
# fan out from `preflight + detect-language` and converge at the merge
# button via the union of required checks (consumer enables in branch
# protection).
#
# Required (block merge): lint, test, scan-deps, validate-pr-title,
#                          validate-pr-desc, build-check.
# Advisory (don't block):  coverage, scan-secrets, scan-sonarcloud,
#                          ai-review, eval-prompt, copilot-review.
#
# Security: every consumer-supplied PR field is forwarded via env: to its
# composite, never interpolated into shell. The scripts in actions/pr/*
# read those env vars and treat them as untrusted input.
# ─────────────────────────────────────────────────────────────────────────────
name: pr

on:
  workflow_call:
    inputs:
      model:
        description: Override the AI model name. Defaults to the Anthropic Claude model when empty.
        required: false
        type: string
        default: ""
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; use a tag like v2 in production).
        required: false
        type: string
        default: main
      language:
        type: string
        required: false
        default: ""
      enable-ai-review:
        type: boolean
        required: false
        default: true
      enable-eval:
        type: boolean
        required: false
        default: false
      coverage-threshold:
        type: number
        required: false
        default: 80
      pr-review-prompt-path:
        type: string
        required: false
        default: ""
      enable-copilot-review:
        description: "Request a Copilot review on every opened / ready-for-review PR."
        type: boolean
        required: false
        default: false
    secrets:
      api-base-url:
        description: Custom Anthropic-compatible base URL. Leave unset to use the default Anthropic endpoint.
        required: false
      anthropic-api-key:
        required: false
      codecov-token:
        required: false
      sonar-token:
        required: false
      snyk-token:
        required: false
      release-pat:
        description: "PAT used to request Copilot review (required when enable-copilot-review: true)."
        required: false

permissions: {}

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Probe secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
          CODECOV_TOKEN:     ${{ secrets.codecov-token }}
          SONAR_TOKEN:       ${{ secrets.sonar-token }}
          SNYK_TOKEN:        ${{ secrets.snyk-token }}
        run: |
          bash .github/scripts/preflight-secrets.sh \
            --required "" \
            --optional "ANTHROPIC_API_KEY,CODECOV_TOKEN,SONAR_TOKEN,SNYK_TOKEN"

  detect-language:
    name: Detect Language
    needs: preflight
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      language:        ${{ steps.detect.outputs.language }}
      package-manager: ${{ steps.detect.outputs.package-manager }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Detect (or honour caller override)
        id: detect
        shell: bash
        env:
          OVERRIDE: ${{ inputs.language }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "language=$OVERRIDE"        >> "$GITHUB_OUTPUT"
            echo "package-manager=unknown"   >> "$GITHUB_OUTPUT"
            echo "::notice title=Language Override::language=$OVERRIDE"
          else
            bash actions/_common/detect-language/detect.sh "$GITHUB_WORKSPACE"
          fi

  auto-label:
    name: Auto Label
    needs: preflight
    if: github.event.pull_request != null
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/auto-label

  auto-assign-fallback:
    name: Auto Assign (fallback)
    needs: preflight
    # Only when CODEOWNERS hasn't already populated reviewers. GitHub
    # expression syntax has no `length()`, so check first element instead.
    if: github.event.pull_request != null && github.event.pull_request.requested_reviewers[0] == null
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/auto-assign-fallback

  validate-pr-title:
    name: Validate PR Title
    needs: preflight
    if: github.event.pull_request != null
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: ./.openci/actions/pr/validate-pr-title

  validate-pr-desc:
    name: Validate PR Description
    needs: preflight
    if: github.event.pull_request != null
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/validate-pr-description

  scan-deps:
    name: Scan Dependencies
    needs: preflight
    if: github.event.pull_request != null
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: ./.openci/actions/pr/scan-deps

  scan-secrets:
    name: Scan Secrets
    needs: preflight
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { fetch-depth: 0, persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/scan-secrets

  scan-sonarcloud:
    name: Scan SonarCloud
    needs: preflight
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { fetch-depth: 0, persist-credentials: false }
      - uses: ./.openci/actions/pr/scan-sonarcloud
        with:
          sonar-token: ${{ secrets.sonar-token }}

  lint:
    name: Lint
    needs: detect-language
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/lint-code
        with:
          language:        ${{ needs.detect-language.outputs.language }}
          package-manager: ${{ needs.detect-language.outputs.package-manager }}

  test:
    name: Test
    needs: detect-language
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      coverage-file: ${{ steps.run.outputs.coverage-file }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - id: run
        uses: ./.openci/actions/pr/test-unit
        with:
          language:        ${{ needs.detect-language.outputs.language }}
          package-manager: ${{ needs.detect-language.outputs.package-manager }}

  coverage:
    name: Coverage
    needs: test
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: coverage-report
          path: .
      - uses: ./.openci/actions/pr/check-coverage
        with:
          coverage-file:      ${{ needs.test.outputs.coverage-file || 'coverage/lcov.info' }}
          coverage-threshold: ${{ inputs.coverage-threshold }}
          mode:               pr
          codecov-token:      ${{ secrets.codecov-token }}

  build-check:
    name: Build Check
    needs: detect-language
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      # `hashFiles` is not allowed in job-level `if:`; gate at step level.
      - id: probe
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Build Check Skipped::no Dockerfile in repo root"
          fi
      - if: steps.probe.outputs.exists == 'true'
        uses: ./.openci/actions/pr/build-check

  ai-review:
    name: AI Review
    needs: [lint, test]
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    if: inputs.enable-ai-review == true
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/review-ai
        with:
          prompt-path:       ${{ inputs.pr-review-prompt-path }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}

  eval-prompt:
    name: Eval Prompts
    needs: ai-review
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 10
    if: always() && inputs.enable-eval == true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { fetch-depth: 0, persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea1e  # v3.0.2
        id: paths
        with:
          filters: |
            skills:
              - 'skills/**'
      - uses: ./.openci/actions/pr/eval-prompt
        with:
          should-run:        ${{ steps.paths.outputs.skills }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}

  copilot-review:
    name: Copilot Review
    needs: preflight
    if: inputs.enable-copilot-review == true && github.event.pull_request != null
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/agent-review
        with:
          pr-number:   ${{ github.event.pull_request.number }}
          release-pat: ${{ secrets.release-pat }}

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 2 · Enrich — build agent workspace from Gate results + live PR data.
  # Runs only when all required Stage 1 checks succeed (Gate semantics via
  # needs). If any required job fails, enrich (and thus agent) does not run.
  # ───────────────────────────────────────────────────────────────────────────
  enrich:
    name: Stage 2 · Enrich
    needs: [lint, test, validate-pr-title, scan-deps, scan-secrets]
    if: >-
      always() &&
      github.event.pull_request != null &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.validate-pr-title.result == 'success' &&
      needs.scan-deps.result == 'success'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workspace-artifact: pr-agent-workspace-${{ github.run_id }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/pr/enrich
        with:
          gate-lint-result:           ${{ needs.lint.result }}
          gate-test-result:           ${{ needs.test.result }}
          gate-coverage-result:       ${{ needs.coverage.result || 'skipped' }}
          gate-secrets-result:        ${{ needs.scan-secrets.result }}
          gate-validate-title-result: ${{ needs.validate-pr-title.result }}
          gate-scan-deps-result:      ${{ needs.scan-deps.result }}

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 3 · Agent — structured PR review via claude-harness.
  # Produces pr-action-plan/v1 JSON for Stage 4 to consume.
  # ───────────────────────────────────────────────────────────────────────────
  agent:
    name: Stage 3 · Agent Plan
    needs: enrich
    if: inputs.enable-ai-review == true
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    outputs:
      plan:        ${{ steps.extract.outputs.plan }}
      skip-reason: ${{ steps.extract.outputs.skip-reason }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for harness
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: pr-agent-workspace-${{ github.run_id }}
          path: agent-workspace

      - name: Skip when ANTHROPIC_API_KEY missing
        id: gate
        env:
          K: ${{ secrets.anthropic-api-key }}
        run: |
          if [ -z "$K" ]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "::notice title=PR Agent Skipped::ANTHROPIC_API_KEY not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run PR review agent
        id: harness
        if: steps.gate.outputs.skip != 'true'
        uses: ./.openci/actions/_common/claude-harness
        with:
          task:               pr/review-agent
          prompt-path:        agent-workspace/prompt.md
          context:            "{}"
          api-key:            ${{ secrets.anthropic-api-key }}
          api-base-url:       ${{ secrets.api-base-url }}
          model:              ${{ inputs.model || 'claude-sonnet-4-5-20250929' }}
          max-turns:          "8"
          github-token:       ${{ github.token }}
          use-sticky-comment: "false"

      - name: Extract action plan
        id: extract
        env:
          SKIPPED:        ${{ steps.gate.outputs.skip }}
          EXECUTION_FILE: ${{ steps.harness.outputs.execution-file }}
        run: |
          set -euo pipefail
          SKIP_PLAN='{"version":"pr-action-plan/v1","summary":"Agent skipped.","risk":"low","risk_reason":"ANTHROPIC_API_KEY not configured.","reviewer_focus":[],"actions":[],"skip_reason":"missing-anthropic-api-key"}'
          FAIL_PLAN='{"version":"pr-action-plan/v1","summary":"Agent output was not parseable.","risk":"low","risk_reason":"Could not extract pr-action-plan/v1 from execution output.","reviewer_focus":[],"actions":[{"id":"escalate-unparseable","skill":"escalate","params":{"reason":"Agent output was not parseable.","labels":["needs-human"]},"confidence":"high"}],"skip_reason":null}'

          if [ "$SKIPPED" = "true" ]; then
            plan="$SKIP_PLAN"
          elif [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
            raw="$(cat "$EXECUTION_FILE")"
            plan="$(printf '%s' "$raw" | jq -r '
              if type == "object" and .version == "pr-action-plan/v1" then .
              else
                [.. | strings | select(test("\"version\"[[:space:]]*:[[:space:]]*\"pr-action-plan/v1\""))] | last // empty
              end
            ' 2>/dev/null || true)"
            if [ -z "$plan" ]; then
              plan="$FAIL_PLAN"
            fi
          else
            plan="$FAIL_PLAN"
          fi

          plan="$(jq -c . <<<"$plan")"
          skip_reason="$(jq -r '.skip_reason // ""' <<<"$plan")"
          {
            echo "plan<<EOF"
            echo "$plan"
            echo "EOF"
            echo "skip-reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 4 · Execute — post sticky comment and run allowlisted actions.
  # ───────────────────────────────────────────────────────────────────────────
  execute:
    name: Stage 4 · Execute
    needs: [enrich, agent]
    if: always() && needs.agent.result == 'success'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: pr-agent-workspace-${{ github.run_id }}
          path: agent-workspace

      - name: Check actor trust
        id: trust
        env:
          ASSOC: ${{ github.event.pull_request.author_association || '' }}
        run: |
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) echo "trusted=true"  >> "$GITHUB_OUTPUT" ;;
            *)                         echo "trusted=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Post summary and execute plan
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        env:
          ACTION_PLAN: ${{ needs.agent.outputs.plan }}
          TRUSTED:     ${{ steps.trust.outputs.trusted }}
          RUN_ID:      ${{ github.run_id }}
        with:
          script: |
            const plan = JSON.parse(process.env.ACTION_PLAN || '{"version":"pr-action-plan/v1","actions":[]}');
            if (plan.version !== 'pr-action-plan/v1') {
              core.setFailed(`Unsupported plan version: ${plan.version}`); return;
            }

            const ALLOWED = new Set([
              'add_label', 'remove_label', 'add_reviewer',
              'request_changes', 'block_merge',
              'escalate', 'assign_issue',
            ]);
            const HIGH_RISK = new Set(['request_changes', 'block_merge', 'escalate']);
            const trusted = process.env.TRUSTED === 'true';
            const pr = context.payload.pull_request?.number;
            if (!pr) { core.warning('No pull_request in context; skipping execute.'); return; }

            // ── Build and upsert sticky summary comment ──────────────────────
            const riskIcon = { high: '🔴', medium: '🟡', low: '🟢' };
            const focusLines = (plan.reviewer_focus || []).map(f => `- ${f}`).join('\n');
            const body = [
              '## 🤖 OpenCI PR Analysis',
              '',
              plan.summary || '',
              '',
              `**Risk** ${riskIcon[plan.risk] ?? '⚪'} \`${plan.risk}\` — ${plan.risk_reason || ''}`,
              '',
              focusLines ? `**Reviewer Focus**\n${focusLines}` : '',
              '',
              `<!-- openci-pr-run:${process.env.RUN_ID} -->`,
            ].filter(l => l !== undefined).join('\n');

            const existing = (await github.paginate(github.rest.issues.listComments, {
              ...context.repo, issue_number: pr, per_page: 100,
            })).find(c => (c.body || '').includes('<!-- openci-pr-run:'));

            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
            }

            // ── Execute allowlisted actions ───────────────────────────────────
            if (plan.skip_reason) {
              core.notice(`Agent skip_reason: ${plan.skip_reason}. No actions executed.`);
              return;
            }

            for (const action of plan.actions ?? []) {
              if (!ALLOWED.has(action.skill)) {
                core.notice(`Skipped unknown skill: ${action.skill}`); continue;
              }
              if (action.confidence !== 'high') {
                core.notice(`Skipped low-confidence: ${action.skill} (${action.confidence})`); continue;
              }
              if (!trusted && HIGH_RISK.has(action.skill)) {
                core.notice(`Skipped high-risk for non-trusted actor: ${action.skill}`); continue;
              }

              const p = action.params || {};
              switch (action.skill) {
                case 'add_label':
                  if ((p.labels || []).length) {
                    await github.rest.issues.addLabels({ ...context.repo, issue_number: pr, labels: p.labels });
                  }
                  break;
                case 'remove_label':
                  for (const name of (p.labels || [])) {
                    try { await github.rest.issues.removeLabel({ ...context.repo, issue_number: pr, name }); }
                    catch (e) { if (e.status !== 404) throw e; }
                  }
                  break;
                case 'add_reviewer':
                  await github.rest.pulls.requestReviewers({
                    ...context.repo, pull_number: pr,
                    reviewers: p.reviewers || [],
                    team_reviewers: p.team_reviewers || [],
                  });
                  break;
                case 'block_merge':
                  await github.rest.issues.addLabels({ ...context.repo, issue_number: pr, labels: ['do-not-merge'] });
                  if (p.reason) {
                    await github.rest.issues.createComment({ ...context.repo, issue_number: pr,
                      body: `🚫 **Block merge**: ${p.reason}\n\n<!-- openci-block-merge -->` });
                  }
                  break;
                case 'request_changes':
                  if (p.body) {
                    await github.rest.pulls.createReview({
                      ...context.repo, pull_number: pr, body: p.body, event: 'REQUEST_CHANGES',
                    });
                  }
                  break;
                case 'assign_issue':
                  await github.rest.issues.addAssignees({
                    ...context.repo, issue_number: pr, assignees: p.assignees || [],
                  });
                  break;
                case 'escalate': {
                  const labels = (p.labels && p.labels.length) ? p.labels : ['needs-human'];
                  await github.rest.issues.addLabels({ ...context.repo, issue_number: pr, labels });
                  break;
                }
              }
              core.info(`Executed: ${action.skill}`);
            }
