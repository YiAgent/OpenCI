# ─────────────────────────────────────────────────────────────────────────────
# issue-branch-from-linear.yml — repository_dispatch handler for Linear webhooks.
# ─────────────────────────────────────────────────────────────────────────────
# A consumer-deployed bridge function (see examples/linear-webhook-bridge/)
# verifies Linear's webhook signature and forwards the issue payload as a
# `repository_dispatch` of type `linear-issue-started`.
#
# This workflow:
#   1. Reads `client_payload` (id / title / labels / linear_uuid).
#   2. Creates a branch via integrations/linear-bridge.
#   3. Posts a Linear comment back via integrations/linear-comment.
#
# Security: client_payload is signed by the bridge function. The atoms
# below pass the values through env: only — never interpolated into shell.
# ─────────────────────────────────────────────────────────────────────────────
name: issue-branch-from-linear

on:
  repository_dispatch:
    types: [linear-issue-started]

permissions: {}

concurrency:
  group: linear-bridge-${{ github.event.client_payload.id }}
  cancel-in-progress: false

jobs:
  bridge:
    name: Create branch + comment back
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }

      - id: br
        uses: ./actions/integrations/linear-bridge
        with:
          linear-id:     ${{ github.event.client_payload.id }}
          linear-title:  ${{ github.event.client_payload.title }}
          linear-labels: ${{ github.event.client_payload.labels }}
          base-branch:   ${{ github.event.client_payload.base_branch || 'main' }}
          github-token:  ${{ github.token }}

      - name: Comment back
        if: github.event.client_payload.uuid != '' && secrets.LINEAR_TOKEN != ''
        uses: ./actions/integrations/linear-comment
        with:
          linear-token: ${{ secrets.LINEAR_TOKEN }}
          issue-id:     ${{ github.event.client_payload.uuid }}
          body:         ${{ steps.br.outputs.already-existed == 'true' && format('Branch already exists: {0}', steps.br.outputs.branch-url) || format('Branch created: {0}', steps.br.outputs.branch-url) }}
