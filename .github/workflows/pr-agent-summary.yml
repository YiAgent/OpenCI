name: "PR: Agent Summary"

on:
  workflow_run:
    workflows:
      - "PR: Verify"
      - "PR: Security"
      - "PR: Quality"
    types: [completed]

permissions: {}

concurrency:
  group: pr-summary-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  aggregate:
    name: "Aggregate PR Summary"
    if: github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Gather workflow results
        id: gather
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "workflow=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "conclusion=$WORKFLOW_CONCLUSION" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Build summary
        id: summary
        env:
          WORKFLOW: ${{ steps.gather.outputs.workflow }}
          CONCLUSION: ${{ steps.gather.outputs.conclusion }}
          HEAD_SHA: ${{ steps.gather.outputs.head_sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 scripts/python/pr_summary.py \
            --workflow "$WORKFLOW" \
            --conclusion "$CONCLUSION" \
            --head-sha "$HEAD_SHA" \
            --repo "$REPO" \
            --run-id "$RUN_ID"

      - name: Post summary comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BODY: ${{ steps.summary.outputs.body }}
          PR_NUMBER: ${{ steps.summary.outputs.pr_number }}
        run: |
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "0" ]; then
            echo "::notice::No PR number found, skipping comment"
            exit 0
          fi
          python3 actions/post-comment/scripts/upsert_comment.py \
            --repo "$GITHUB_REPOSITORY" \
            --pr "$PR_NUMBER" \
            --body "$BODY" \
            --marker "<!-- pr-agent-summary -->"
