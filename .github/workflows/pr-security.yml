name: "PR: Security"

on:
  workflow_run:
    workflows: ["PR: Gate"]
    types: [completed]

permissions: {}

concurrency:
  group: pr-security-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gate-check:
    name: "Gate Check"
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    outputs:
      gate-ok: ${{ steps.parse.outputs.gate_ok }}
      should-run: ${{ steps.parse.outputs.should_run }}
      pr-number: ${{ steps.parse.outputs.pr_number }}
      head-sha: ${{ steps.parse.outputs.head_sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: gate-context
          path: gate-context/
          run-id: ${{ github.event.workflow_run.id }}
      - name: Parse gate context
        id: parse
        run: python3 scripts/python/gate_consume.py gate-context/gate-context.json ""

  secret-scan:
    name: "Secret Scan (TruffleHog)"
    needs: [gate-check]
    if: needs.gate-check.outputs.gate-ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.gate-check.outputs.head-sha }}
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-scan:
    name: "Dependency Scan"
    needs: [gate-check]
    if: needs.gate-check.outputs.gate-ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.gate-check.outputs.head-sha }}
      - name: Check for vulnerable dependencies
        run: |
          echo "## Dependency Scan" >> "$GITHUB_STEP_SUMMARY"
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "- Python: checking pip-audit" >> "$GITHUB_STEP_SUMMARY"
            pip install pip-audit 2>/dev/null || true
            pip-audit 2>/dev/null && echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY" || echo "- Status: issues found" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f package.json ]; then
            echo "- Node: checking npm audit" >> "$GITHUB_STEP_SUMMARY"
            npm audit --audit-level=high 2>/dev/null && echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY" || echo "- Status: issues found" >> "$GITHUB_STEP_SUMMARY"
          fi

  sast-scan:
    name: "SAST Scan (Semgrep)"
    needs: [gate-check]
    if: needs.gate-check.outputs.gate-ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.gate-check.outputs.head-sha }}
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
        env:
          SEMGREP_RULES: p/default

  dockerfile-scan:
    name: "Dockerfile Scan"
    needs: [gate-check]
    if: needs.gate-check.outputs.gate-ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.gate-check.outputs.head-sha }}
      - name: Scan Dockerfiles
        run: |
          echo "## Dockerfile Scan" >> "$GITHUB_STEP_SUMMARY"
          find . -name "Dockerfile*" -type f | while read -r df; do
            echo "### $df" >> "$GITHUB_STEP_SUMMARY"
            if grep -q "FROM.*:latest" "$df"; then
              echo "::warning file=$df::Using :latest tag"
              echo "- Warning: uses :latest tag" >> "$GITHUB_STEP_SUMMARY"
            fi
            if grep -q "USER root" "$df" || ! grep -q "USER" "$df"; then
              echo "::warning file=$df::Running as root"
              echo "- Warning: runs as root" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  license-scan:
    name: "License Scan"
    needs: [gate-check]
    if: needs.gate-check.outputs.gate-ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.gate-check.outputs.head-sha }}
      - name: Check licenses
        run: |
          echo "## License Scan" >> "$GITHUB_STEP_SUMMARY"
          if [ -f LICENSE ] || [ -f LICENSE.md ]; then
            echo "- LICENSE file: present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::No LICENSE file found"
            echo "- LICENSE file: missing" >> "$GITHUB_STEP_SUMMARY"
          fi

  iac-scan:
    name: "IaC Scan"
    needs: [gate-check]
    if: needs.gate-check.outputs.gate-ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ needs.gate-check.outputs.head-sha }}
      - name: Scan Terraform
        if: hashFiles('**/*.tf') != ''
        run: |
          echo "## IaC Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Terraform files found" >> "$GITHUB_STEP_SUMMARY"

  security-result:
    name: "Security Result"
    needs: [gate-check, secret-scan, dependency-scan, sast-scan, dockerfile-scan, license-scan, iac-scan]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Aggregate results
        env:
          SECRET: ${{ needs.secret-scan.result }}
          DEP: ${{ needs.dependency-scan.result }}
          SAST: ${{ needs.sast-scan.result }}
          DOCKER: ${{ needs.dockerfile-scan.result }}
          LICENSE: ${{ needs.license-scan.result }}
          IAC: ${{ needs.iac-scan.result }}
        run: |
          echo "## Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secret scan: $SECRET" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dependency scan: $DEP" >> "$GITHUB_STEP_SUMMARY"
          echo "- SAST scan: $SAST" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dockerfile scan: $DOCKER" >> "$GITHUB_STEP_SUMMARY"
          echo "- License scan: $LICENSE" >> "$GITHUB_STEP_SUMMARY"
          echo "- IaC scan: $IAC" >> "$GITHUB_STEP_SUMMARY"
