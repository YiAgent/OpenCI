# on-main-bump-sha.yml — Auto-bump the YiAgent/OpenCI self-reference SHA after
# every merge to main. Opens a follow-up PR when the SHA needs updating so the
# manifest never drifts out of sync.
#
# Why: the pinned SHA must point to a commit that contains
# .github/workflows/reusable/. After structural reorganizations (or simply
# as main moves forward) the SHA can become stale. This workflow detects
# that condition and creates a one-commit PR to fix it automatically.
#
# The commit is pushed via git-push with RELEASE_PAT (a classic PAT with
# the `workflow` OAuth scope). github.token cannot push .github/workflows/
# files — it requires a non-existent "workflows" permission. RELEASE_PAT
# bypasses this restriction, keeping all SHA references in sync.
name: Auto-bump self SHA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-self-sha-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump YiAgent/OpenCI SHA if stale
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }

      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          fetch-depth: 0
          # persist-credentials so bump-self-sha.sh can git-fetch.
          # The push itself overrides the remote URL to use RELEASE_PAT
          # (which has the `workflow` scope for .github/workflows/ pushes).

      # Break the infinite-loop: if THIS push was produced by a previous
      # run of this workflow (bot-authored bump commit or bump PR merge),
      # do nothing. We read from git rather than from GitHub context to
      # avoid injection risks.
      - name: Guard — skip bot-authored bump commits
        id: guard
        run: |
          msg=$(git log -1 --format='%s')
          author=$(git log -1 --format='%ae')
          skip=false
          if echo "$msg" | grep -qE '^chore\(manifest\): bump YiAgent/OpenCI SHA'; then
            skip=true
            echo "::notice::Skipping — squash-merged bump commit detected"
          elif echo "$msg" | grep -q 'chore/bump-self-sha-'; then
            skip=true
            echo "::notice::Skipping — merge commit from bump branch detected"
          elif [ "$author" = "github-actions[bot]@users.noreply.github.com" ]; then
            skip=true
            echo "::notice::Skipping — HEAD commit authored by github-actions[bot]"
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - name: Install yq
        if: steps.guard.outputs.skip != 'true'
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Check if SHA needs bumping
        id: check
        if: steps.guard.outputs.skip != 'true'
        run: |
          current_sha="$(yq -r '.deps["YiAgent/OpenCI"] // ""' manifest.yml)"
          head_sha="$(git rev-parse HEAD)"

          if [ -z "$current_sha" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::YiAgent/OpenCI not in manifest.yml — skipping"
            exit 0
          fi

          # Only skip when the pinned SHA is already HEAD — bump-self-sha.sh
          # handles walking back to a valid ancestor when HEAD itself lacks
          # .github/workflows/, so we don't need to replicate that check here.
          if [ "$current_sha" = "$head_sha" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SHA $current_sha is already at HEAD — nothing to do"
            exit 0
          fi

          {
            echo "skip=false"
            echo "current_sha=$current_sha"
            echo "new_sha=$head_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Run bump-self-sha.sh
        if: steps.guard.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: bash scripts/bump-self-sha.sh

      # ── Push via git-push with RELEASE_PAT ─────────────────────────────────
      # github.token cannot push .github/workflows/ changes (requires the
      # non-existent "workflows" permission). RELEASE_PAT is a classic PAT
      # with the `workflow` OAuth scope — it CAN push workflow files. We
      # override the git remote URL to use RELEASE_PAT for the push only.
      - name: Push branch with changes
        id: push-branch
        if: steps.guard.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        env:
          NEW_SHA: ${{ steps.check.outputs.new_sha }}
          OLD_SHA: ${{ steps.check.outputs.current_sha }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail

          branch="chore/bump-self-sha-${NEW_SHA:0:8}"
          short_new="${NEW_SHA:0:8}"
          commit_msg="chore(manifest): bump YiAgent/OpenCI SHA to ${short_new}"
          commit_body="Automated update from on-main-bump-sha workflow. old=${OLD_SHA} new=${NEW_SHA}"

          # Collect changed files.
          changed=$(git diff --name-only HEAD -- manifest.yml .github/workflows/ actions/ 2>/dev/null || true)
          if [ -z "$changed" ]; then
            echo "::notice::No files changed — nothing to commit"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

          # Configure git identity for the bot commit.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage, commit, and push to a new branch.
          git checkout -b "${branch}"
          git add manifest.yml .github/workflows/ actions/
          git commit -m "${commit_msg}" -m "${commit_body}"

          # Use RELEASE_PAT for the push — github.token cannot push
          # .github/workflows/ files (requires "workflows" permission
          # which doesn't exist in workflow syntax).
          git remote set-url origin \
            "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "${branch}"
          echo "::notice::Pushed branch ${branch}"

      - name: Manage PRs — close old, clean orphans, open new
        if: steps.guard.outputs.skip != 'true' && steps.push-branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_SHA: ${{ steps.check.outputs.new_sha }}
          OLD_SHA: ${{ steps.check.outputs.current_sha }}
          BRANCH: ${{ steps.push-branch.outputs.branch }}
        run: |
          set -euo pipefail

          branch="${BRANCH}"
          short_old="${OLD_SHA:0:8}"
          short_new="${NEW_SHA:0:8}"

          # 1) Close older auto-bump PRs and delete their branches.
          gh pr list \
            --state open \
            --base main \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("chore/bump-self-sha-"))
                       | select(.headRefName != "'"${branch}"'")
                       | .number' \
            | while read -r old_num; do
                echo "::notice::Closing superseded bump PR #${old_num}"
                gh pr close "${old_num}" \
                  --comment "Superseded by \`${branch}\` (bump to ${short_new})." \
                  --delete-branch
              done

          # 2) Delete orphan auto-bump branches that never got a PR (API-based).
          gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads" \
            --jq '.[].ref' \
            | grep 'refs/heads/chore/bump-self-sha-' \
            | while read -r ref_path; do
                ref_name="${ref_path#refs/heads/}"
                [ "${ref_name}" = "${branch}" ] && continue
                echo "::notice::Deleting orphan bump branch ${ref_name}"
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${ref_name}" --silent || true
              done

          # 3) Open (or reuse) the PR for the new branch.
          # shellcheck disable=SC2016
          printf 'Automated SHA bump: `%s` to `%s`\n\nThe YiAgent/OpenCI self-reference SHA in manifest.yml was stale. Updated to the latest main HEAD so all reusable workflow calls resolve correctly.\n\n> Generated by the on-main-bump-sha workflow.' \
            "${short_old}" "${short_new}" > /tmp/pr-body.md

          existing="$(gh pr list --state open --head "${branch}" --base main \
            --json number --jq '.[0].number // ""')"
          if [ -n "${existing}" ]; then
            echo "::notice::PR #${existing} already exists for ${branch}; skipping create"
            pr_number="${existing}"
          else
            pr_url="$(gh pr create \
              --title "chore(manifest): bump YiAgent/OpenCI SHA to ${short_new}" \
              --body-file /tmp/pr-body.md \
              --base main \
              --head "${branch}")"
            pr_number="${pr_url##*/}"
            echo "::notice::Created PR #${pr_number}"
          fi

          # 4) Auto-merge the bump PR. The bump commit only changes SHAs
          #    (manifest.yml + workflow files) — it was already tested as
          #    part of the triggering merge. The guard condition prevents
          #    infinite loops when this merge triggers the workflow again.
          #    Uses direct squash-merge because auto-merge (--auto) requires
          #    branch protection rules on main, which aren't configured.
          if [ -n "${pr_number}" ]; then
            gh pr merge "${pr_number}" --squash --delete-branch \
              --subject "chore(manifest): bump YiAgent/OpenCI SHA to ${short_new} (#${pr_number})" \
              || echo "::warning::Failed to auto-merge PR #${pr_number} — manual merge required."
          fi
