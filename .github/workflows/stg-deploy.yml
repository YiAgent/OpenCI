name: "STG: Deploy"

on:
  workflow_call:
    inputs:
      skip-e2e:
        description: "Skip E2E tests after deploy"
        type: boolean
        default: false
    outputs:
      backend-url:
        description: "Backend staging URL"
        value: ${{ jobs.deploy-backend.outputs.deployment-url }}
      frontend-url:
        description: "Frontend staging URL"
        value: ${{ jobs.deploy-frontend.outputs.deployment-url }}

permissions: {}

concurrency:
  group: deploy-stg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2
      - name: Filter changes
        id: filter
        run: |
          git diff --name-only HEAD~1..HEAD > /tmp/changes.txt
          if grep -qE "app/|src/|lib/|cmd/|internal/|*.go|*.py|*.rs|requirements|pyproject" /tmp/changes.txt; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE "frontend/|client/|pages/|components/|*.tsx|*.ts|*.jsx|*.js|package.json" /tmp/changes.txt; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: "Verify"
    needs: [detect-changes]
    uses: ./.github/workflows/reusable-verify.yml
    with:
      use-real-secrets: true
      coverage-threshold: 30
    secrets: inherit
    permissions:
      contents: read

  build-backend:
    name: "Build Backend"
    needs: [detect-changes, verify]
    if: needs.detect-changes.outputs.backend == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: image
      registry: ghcr.io
    permissions:
      contents: read
      packages: write

  build-frontend:
    name: "Build Frontend"
    needs: [detect-changes, verify]
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: frontend
    permissions:
      contents: read

  deploy-backend:
    name: "Deploy Backend (STG)"
    needs: [build-backend]
    if: needs.build-backend.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: staging
      target: ecs
      image-tag: ${{ needs.build-backend.outputs.image-tag }}
    permissions:
      contents: read
      id-token: write

  deploy-frontend:
    name: "Deploy Frontend (STG)"
    needs: [build-frontend]
    if: needs.build-frontend.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: staging
      target: vercel
    permissions:
      contents: read
      id-token: write

  integration-tests:
    name: "Integration Tests"
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run integration tests
        env:
          BACKEND_URL: ${{ needs.deploy-backend.outputs.deployment-url }}
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment-url }}
        run: |
          echo "## Integration Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: $BACKEND_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: $FRONTEND_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  e2e-stg:
    name: "E2E (STG)"
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success') && inputs.skip-e2e == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run E2E tests
        env:
          BASE_URL: ${{ needs.deploy-frontend.outputs.deployment-url || needs.deploy-backend.outputs.deployment-url }}
        run: |
          echo "## E2E Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base URL: $BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  annotate-deployments:
    name: "Annotate Deployments"
    needs: [deploy-backend, deploy-frontend, integration-tests]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Emit deployment annotations
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: python3 scripts/python/deploy_annotate.py staging "${{ github.sha }}"
