name: "PR: Verify"

on:
  workflow_run:
    workflows: ["PR: Gate"]
    types: [completed]

permissions: {}

concurrency:
  group: pr-verify-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gate-check:
    name: "Gate Check"
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    outputs:
      gate-ok: ${{ steps.parse.outputs.gate_ok }}
      should-run: ${{ steps.parse.outputs.should_run }}
      pr-number: ${{ steps.parse.outputs.pr_number }}
      head-sha: ${{ steps.parse.outputs.head_sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: gate-context
          path: gate-context/
          run-id: ${{ github.event.workflow_run.id }}
      - name: Parse gate context
        id: parse
        run: python3 scripts/python/gate_consume.py gate-context/gate-context.json ""

  verify:
    name: "Verify"
    needs: [gate-check]
    if: needs.gate-check.outputs.gate-ok == 'true'
    uses: ./.github/workflows/reusable-verify.yml
    with:
      autofix: true
      use-real-secrets: false
      coverage-threshold: 30
    permissions:
      contents: read

  ci-result:
    name: "CI Result"
    needs: [gate-check, verify]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Check results
        env:
          GATE_OK: ${{ needs.gate-check.outputs.gate-ok }}
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: |
          echo "## PR Verify Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Gate: $GATE_OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verify: $VERIFY_RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$VERIFY_RESULT" = "failure" ]; then
            echo "::error::Verify failed"
            exit 1
          fi
