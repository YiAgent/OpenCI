# ─────────────────────────────────────────────────────────────────────────────
# issue.yml — unified issue domain workflow.
# ─────────────────────────────────────────────────────────────────────────────
# Single entry point for everything that touches GitHub issues:
#
#   ┌─ trigger ─────────────────────┬─ active jobs ─────────────────────────┐
#   │ issues:[opened/reopened/edit] │ auto-label · detect-duplicates ·       │
#   │                               │ ai-triage · auto-assign                │
#   │ issue_comment:[created]       │ slash-command                          │
#   │ repository_dispatch           │ linear-branch (linear-issue-started)   │
#   │ schedule (cron)               │ sentry-triage (hourly)                 │
#   │ workflow_dispatch             │ sentry-triage (manual)                 │
#   │ workflow_call                 │ any of the above (input.mode router)   │
#   └───────────────────────────────┴────────────────────────────────────────┘
#
# Each job is gated by `if: github.event_name == ...` (or `inputs.mode`)
# so the run UI shows only the relevant fan-out for any given event.
#
# Reusable invocation:
#   uses: YiWang24/OpenCI/.github/workflows/issue.yml@v2
#   with:
#     mode: ai-triage   # auto-label | dedupe | ai-triage | auto-assign |
#                       # command | linear-branch | sentry-triage
#   secrets:
#     anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}  # optional
#     sentry-token:      ${{ secrets.SENTRY_TOKEN }}       # optional
#     linear-token:      ${{ secrets.LINEAR_TOKEN }}       # optional
#
# Security: untrusted issue/comment fields are forwarded to composite atoms
# via `with:` inputs only. Atoms internally re-bind them through env: vars
# and never interpolate into shell — preventing workflow injection.
# ─────────────────────────────────────────────────────────────────────────────
name: issue

on:
  workflow_call:
    inputs:
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; use a tag like v2 in production).
        required: false
        type: string
        default: main
      mode:
        description: Force a specific job set when invoked from another workflow
        required: false
        type: string
        default: ""
      model:
        description: Override the AI model name. Defaults to the Anthropic Claude model when empty.
        required: false
        type: string
        default: ""
      issue-stale-days:
        type: number
        required: false
        default: 60
      issue-close-days:
        type: number
        required: false
        default: 14
      pr-stale-days:
        type: number
        required: false
        default: 30
      pr-close-days:
        type: number
        required: false
        default: 7
      lock-after-days:
        type: number
        required: false
        default: 30
    secrets:
      anthropic-api-key:
        required: false
      api-base-url:
        description: Custom Anthropic-compatible base URL. Leave unset to use the default Anthropic endpoint. When set, anthropic-api-key is sent to that endpoint.
        required: false
      sentry-token:
        required: false
      linear-token:
        required: false

permissions: {}

# Per-issue concurrency for issue/comment events; per-cron for schedule;
# per-linear-id for repository_dispatch. Falls back to run_id.
concurrency:
  group: >-
    issue-${{
      github.event.issue.number
      || github.event.client_payload.id
      || github.event.schedule
      || github.run_id
    }}
  cancel-in-progress: ${{ github.event_name == 'issues' }}

jobs:
  # ── issues:[opened|reopened|edited] ─────────────────────────────────────
  auto-label:
    name: Auto Label
    if: >-
      github.event_name == 'issues'
      || (github.event_name == 'workflow_call' && inputs.mode == 'auto-label')
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'auto-label')
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 3
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/issue/auto-label
        with:
          issue-body:   ${{ github.event.issue.body }}
          issue-title:  ${{ github.event.issue.title }}
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ github.token }}

  detect-duplicates:
    name: Detect Duplicates
    if: >-
      github.event_name == 'issues'
      || (github.event_name == 'workflow_call' && inputs.mode == 'dedupe')
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'dedupe')
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/issue/detect-duplicates
        with:
          issue-number: ${{ github.event.issue.number }}
          issue-title:  ${{ github.event.issue.title }}
          github-token: ${{ github.token }}

  ai-triage:
    name: AI Triage
    if: >-
      github.event_name == 'issues'
      || (github.event_name == 'workflow_call' && inputs.mode == 'ai-triage')
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'ai-triage')
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - name: Skip when ANTHROPIC_API_KEY missing
        id: gate
        env:
          K: ${{ secrets.anthropic-api-key }}
        run: |
          if [ -z "$K" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=AI Triage Skipped::ANTHROPIC_API_KEY not configured"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.openci/actions/issue/ai-triage
        if: steps.gate.outputs.skip != 'true'
        with:
          issue-number:      ${{ github.event.issue.number }}
          issue-title:       ${{ github.event.issue.title }}
          issue-body:        ${{ github.event.issue.body }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}
          github-token:      ${{ github.token }}

  auto-assign:
    name: Auto Assign
    needs: auto-label
    if: >-
      github.event_name == 'issues'
      || (github.event_name == 'workflow_call' && inputs.mode == 'auto-assign')
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'auto-assign')
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 3
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/issue/auto-assign
        with:
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ github.token }}

  # ── issue_comment:[created] ──────────────────────────────────────────────
  slash-command:
    name: Slash Command
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/'))
      || (github.event_name == 'workflow_call' && inputs.mode == 'command')
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false

      - id: parse
        uses: ./.openci/actions/issue/parse-command
        with:
          comment-body:        ${{ github.event.comment.body }}
          author-association:  ${{ github.event.comment.author_association }}

      - if: steps.parse.outputs.command != 'none'
        uses: ./.openci/actions/issue/execute-command
        with:
          command:      ${{ steps.parse.outputs.command }}
          args:         ${{ steps.parse.outputs.args }}
          authorized:   ${{ steps.parse.outputs.authorized }}
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ github.token }}

  # ── repository_dispatch:[linear-issue-started] ───────────────────────────
  linear-branch:
    name: Linear → Branch
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'linear-issue-started')
      || (github.event_name == 'workflow_call' && inputs.mode == 'linear-branch')
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false

      - id: br
        uses: ./.openci/actions/integrations/linear-bridge
        with:
          linear-id:     ${{ github.event.client_payload.id }}
          linear-title:  ${{ github.event.client_payload.title }}
          linear-labels: ${{ github.event.client_payload.labels }}
          base-branch:   ${{ github.event.client_payload.base_branch || 'main' }}
          github-token:  ${{ github.token }}

      - name: Gate Linear comment-back on token presence
        id: linear-gate
        env:
          T: ${{ secrets.linear-token }}
        run: |
          if [ -z "$T" ] || [ -z "${{ github.event.client_payload.uuid }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Linear Comment Skipped::no token or uuid"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment back to Linear
        if: steps.linear-gate.outputs.skip != 'true'
        uses: ./.openci/actions/integrations/linear-comment
        with:
          linear-token: ${{ secrets.linear-token }}
          issue-id:     ${{ github.event.client_payload.uuid }}
          body: "${{ steps.br.outputs.already-existed == 'true' && format('Branch already exists: {0}', steps.br.outputs.branch-url) || format('Branch created: {0}', steps.br.outputs.branch-url) }}"

  # ── schedule (hourly) / workflow_dispatch ────────────────────────────────
  sentry-triage:
    name: Sentry Error Triage
    if: >-
      github.event_name == 'schedule'
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'sentry-triage')
      || (github.event_name == 'workflow_call'     && inputs.mode == 'sentry-triage')
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/error-triage
        with:
          sentry-token:      ${{ secrets.sentry-token }}
          sentry-org:        ${{ vars.SENTRY_ORG }}
          sentry-project:    ${{ vars.SENTRY_PROJECT }}
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}

  # ──────────────────────────────────────────────────────────────────────
  # stale — daily stale-mark / close / lock sweep. One job, sequential
  # composite calls (cheaper than 5 parallel jobs that each set up).
  # ──────────────────────────────────────────────────────────────────────
  stale:
    if: ${{ inputs.mode == 'stale' }}
    name: Stale Sweep
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/community/stale-mark
        with:
          resource:     issues
          stale-days:   ${{ inputs.issue-stale-days }}
          github-token: ${{ github.token }}
      - uses: ./.openci/actions/community/stale-close
        with:
          resource:     issues
          close-days:   ${{ inputs.issue-close-days }}
          github-token: ${{ github.token }}
      - uses: ./.openci/actions/community/stale-mark
        with:
          resource:      pulls
          stale-days:    ${{ inputs.pr-stale-days }}
          exempt-labels: "pinned,security,wip"
          github-token:  ${{ github.token }}
      - uses: ./.openci/actions/community/stale-close
        with:
          resource:     pulls
          close-days:   ${{ inputs.pr-close-days }}
          github-token: ${{ github.token }}
      - uses: ./.openci/actions/community/lock-resolved
        with:
          days-since-close: ${{ inputs.lock-after-days }}
          github-token:     ${{ github.token }}

  # ──────────────────────────────────────────────────────────────────────
  # welcome — first-time-contributor welcome (issues + pull_request_target).
  # ──────────────────────────────────────────────────────────────────────
  welcome-issue:
    name: Welcome (Issue)
    if: ${{ inputs.mode == 'welcome' && github.event_name == 'issues' && github.event.issue.author_association == 'FIRST_TIME_CONTRIBUTOR' }}
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 3
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/issue/welcome-contributor
        with:
          number:          ${{ github.event.issue.number }}
          is-pull-request: "false"
          github-token:    ${{ github.token }}

  welcome-pr:
    name: Welcome (PR)
    if: ${{ inputs.mode == 'welcome' && github.event_name == 'pull_request_target' && github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' }}
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ inputs.openci-ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/issue/welcome-contributor
        with:
          number:          ${{ github.event.pull_request.number }}
          is-pull-request: "true"
          github-token:    ${{ github.token }}
