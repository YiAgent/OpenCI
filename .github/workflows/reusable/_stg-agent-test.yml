# ─────────────────────────────────────────────────────────────────────────────
# stg-agent-test.yml — autonomous L1-L4 tests after stg deploy (reusable).
# ─────────────────────────────────────────────────────────────────────────────
# Triggered by stg.yml completion. Runs all 4 levels in parallel; each
# level's findings land as an artifact for downstream review.
# ─────────────────────────────────────────────────────────────────────────────
name: stg-agent-test

on:
  workflow_call:
    inputs:
      model:
        description: Override the AI model name. Defaults to the Anthropic Claude model when empty.
        required: false
        type: string
        default: ""
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; use a tag like v2 in production).
        required: false
        type: string
        default: main
      health-url:
        description: "Staging health endpoint URL (falls back to STG_HEALTH_URL repo var)."
        type: string
        required: false
        default: ""
      image-digest:
        description: "Docker image digest for this staging deploy."
        type: string
        required: false
        default: ""
    secrets:
      api-base-url:
        description: Custom Anthropic-compatible base URL. Leave unset to use the default Anthropic endpoint.
        required: false
      anthropic-api-key:
        required: false

permissions: {}

concurrency:
  group: stg-agent-test-${{ github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  test:
    name: Agent Test (L${{ matrix.level }})
    if: github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        level: [1, 2, 3, 4]
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - name: Skip when ANTHROPIC_API_KEY missing
        id: gate
        env:
          K: ${{ secrets.anthropic-api-key }}
        run: |
          if [ -z "$K" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Agent Test Skipped::ANTHROPIC_API_KEY missing"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: ./.openci/actions/stg/agent-test
        with:
          level:             ${{ matrix.level }}
          health-url:        ${{ inputs.health-url || github.event.inputs.health-url || vars.STG_HEALTH_URL }}
          image-digest:      ${{ inputs.image-digest || github.event.inputs.image-digest || vars.STG_IMAGE_DIGEST || 'unknown' }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: agent-test-L${{ matrix.level }}
          path: triage/agent-test/
          retention-days: 14
