# ─────────────────────────────────────────────────────────────────────────────
# docs.yml — unified documentation workflow.
# ─────────────────────────────────────────────────────────────────────────────
# Combines doc PR validation and Pages publish into one workflow:
#
#   ┌─ trigger ────────────────────────────┬─ active jobs ────────────────────┐
#   │ pull_request paths docs/** + *.md    │ build (link check + opt. build)  │
#   │ push main paths docs/** + *.md       │ build → deploy                   │
#   │ workflow_dispatch / workflow_call    │ build → deploy (always)          │
#   └──────────────────────────────────────┴──────────────────────────────────┘
#
# Reusable invocation:
#   uses: YiWang24/OpenCI/.github/workflows/docs.yml@v2
#   with:
#     build-cmd: "mkdocs build --strict"   # optional
#     docs-dir:  docs                      # default
#     site-dir:  site                      # default
#
# When `build-cmd` is empty:
#   - `build` job only runs the link check
#   - `deploy` job copies docs/ contents as the Pages artifact
# Security: only inputs (consumer-controlled) are interpolated; no
# untrusted github.event payloads reach run: blocks.
# ─────────────────────────────────────────────────────────────────────────────
name: docs

on:
  workflow_call:
    inputs:
      openci-ref:
        description: OpenCI ref (consistency with the catalog; not used by docs build/deploy directly).
        required: false
        type: string
        default: main
      build-cmd:
        type: string
        required: false
        default: ""
      docs-dir:
        type: string
        required: false
        default: docs
      site-dir:
        type: string
        required: false
        default: site

permissions: {}

# PR builds isolate per-PR; main/dispatch share the pages group.
concurrency:
  group: >-
    docs-${{
      github.event.pull_request.number
      || github.ref
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build Docs
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      site-dir: ${{ steps.build.outputs.site-dir }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }

      - id: build
        name: Build (consumer-supplied or skeleton copy)
        shell: bash
        env:
          CMD:      ${{ inputs.build-cmd }}
          SITE_DIR: ${{ inputs.site-dir || 'site' }}
        run: |
          set -euo pipefail
          if [ -z "$CMD" ]; then
            echo "::notice title=Docs Build Skeleton::no build-cmd; copying raw markdown"
            mkdir -p "$SITE_DIR"
            cp -R docs/. "$SITE_DIR/" 2>/dev/null || true
          else
            echo "::notice title=Docs Build::cmd=${CMD}"
            bash -c "$CMD"
          fi
          echo "site-dir=$SITE_DIR" >> "$GITHUB_OUTPUT"

      - name: Markdown link check
        shell: bash
        env:
          DOCS_DIR: ${{ inputs.docs-dir || 'docs' }}
        run: |
          set -euo pipefail
          cat > /tmp/mlc-config.json <<'JSON'
          {
            "ignorePatterns": [
              { "pattern": "^http://does-not-exist" },
              { "pattern": "^http://localhost" }
            ],
            "timeout": "10s",
            "retryOn429": true,
            "retryCount": 2,
            "fallbackRetryDelay": "30s"
          }
          JSON
          # markdown-link-check has no native glob support and processes
          # one file per invocation; iterate via find. Pinning via npm
          # registry version is sufficient — no GitHub Actions side.
          if [ ! -d "$DOCS_DIR" ]; then
            echo "::notice title=Docs Link Check Skipped::no '$DOCS_DIR' directory in caller repo"
            exit 0
          fi
          fail=0
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            out="$(npx --yes markdown-link-check@3.13.6 "$f" --config /tmp/mlc-config.json 2>&1)" || true
            echo "$out"
            # Only flag a real failure when at least one ERROR line appears
            # (markdown-link-check sometimes returns non-zero on harmless
            # things like 'No hyperlinks found' on certain runner images).
            if printf '%s\n' "$out" | grep -qE '^\s*\[✖\]'; then
              fail=1
              echo "::error file=$f::dead links detected"
            fi
            echo "::endgroup::"
          done < <(find "$DOCS_DIR" -type f -name '*.md' -print0)
          exit "$fail"

  deploy:
    name: Deploy to Pages
    needs: build
    # Only deploy on main push, manual dispatch, or when called via workflow_call.
    if: github.event_name != 'pull_request'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 10
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ${{ needs.build.outputs.site-dir }}
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
        id: deployment
