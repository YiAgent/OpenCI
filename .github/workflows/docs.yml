# docs.yml — event entry for the documentation quality + agentic sync pipeline.
name: docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # every Monday at 09:00 UTC
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs:
    uses: YiAgent/OpenCI/.github/workflows/reusable/docs.yml@be43e4efd2f14f2a3da7d5264356a9e6774c8ef1
    with:
      build-cmd:    ${{ vars.DOCS_BUILD_CMD || '' }}
      docs-path:    ${{ vars.DOCS_DIR || 'docs' }}
      site-dir:     ${{ vars.DOCS_SITE_DIR || 'site' }}
      enable-agent: true
      runner:       blacksmith-32vcpu-ubuntu-2404
      model:        ${{ vars.AI_MODEL || '' }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}
    permissions:
      contents:      write
      pull-requests: write
      issues:        write
      pages:         write
      id-token:      write
