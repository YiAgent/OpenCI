# ─────────────────────────────────────────────────────────────────────────────
# docs-deploy.yml — publish docs to GitHub Pages on main push.
# ─────────────────────────────────────────────────────────────────────────────
name: docs-deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
  workflow_dispatch:
  workflow_call:
    inputs:
      build-cmd:
        type: string
        required: false
        default: ""
      site-dir:
        type: string
        required: false
        default: site

permissions: {}

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      site-dir: ${{ steps.build.outputs.site-dir }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - id: build
        shell: bash
        env:
          CMD:      ${{ inputs.build-cmd }}
          SITE_DIR: ${{ inputs.site-dir || 'site' }}
        run: |
          set -euo pipefail
          if [ -z "$CMD" ]; then
            echo "::notice title=Docs Build Skeleton::no build-cmd; copying raw markdown as Pages artifact"
            mkdir -p "$SITE_DIR"
            cp -R docs/. "$SITE_DIR/" 2>/dev/null || true
          else
            echo "::notice title=Docs Build::cmd=${CMD}"
            bash -c "$CMD"
          fi
          echo "site-dir=$SITE_DIR" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ${{ needs.build.outputs.site-dir }}
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
        id: deployment
