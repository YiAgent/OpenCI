# on-docs.yml — event entry for documentation builds + Pages publish.
name: on-docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: on-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docs:
    uses: ./.github/workflows/docs.yml
    with:
      build-cmd: ${{ vars.DOCS_BUILD_CMD }}
      docs-dir:  ${{ vars.DOCS_DIR || 'docs' }}
      site-dir:  ${{ vars.DOCS_SITE_DIR || 'site' }}
