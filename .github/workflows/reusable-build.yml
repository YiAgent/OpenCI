name: "Reusable: Build"

on:
  workflow_call:
    inputs:
      target:
        description: "Build target (backend/frontend/image)"
        type: string
        default: "image"
      registry:
        description: "Container registry"
        type: string
        default: "ghcr.io"
      platforms:
        description: "Target platforms for multi-arch build"
        type: string
        default: "linux/amd64,linux/arm64"
    outputs:
      image-tag:
        description: "Built image tag"
        value: ${{ jobs.build.outputs.image-tag }}
      image-digest:
        description: "Built image digest"
        value: ${{ jobs.build.outputs.image-digest }}

permissions: {}

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build backend
        if: inputs.target == 'backend'
        run: |
          echo "## Backend Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: success" >> "$GITHUB_STEP_SUMMARY"

      - name: Build frontend
        if: inputs.target == 'frontend'
        run: |
          echo "## Frontend Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: success" >> "$GITHUB_STEP_SUMMARY"

      - name: Build image
        id: build
        if: inputs.target == 'image'
        uses: ./actions/build-image
        with:
          registry: ${{ inputs.registry }}
          platforms: ${{ inputs.platforms }}
          tags: |
            ${{ inputs.registry }}/${{ github.repository }}:${{ github.sha }}
            ${{ inputs.registry }}/${{ github.repository }}:latest
