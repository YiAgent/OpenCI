name: "Self Test"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test-setup-node:
    name: "Test: setup-node"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: ./actions/setup-node
        with:
          install-deps: "false"
      - name: Verify
        run: |
          echo "## setup-node test" >> "$GITHUB_STEP_SUMMARY"
          NODE_VERSION=$(node --version)
          echo "- Node: $NODE_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  test-setup-python:
    name: "Test: setup-python"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: ./actions/setup-python
        with:
          install-deps: "false"
      - name: Verify
        run: |
          echo "## setup-python test" >> "$GITHUB_STEP_SUMMARY"
          PYTHON_VERSION=$(python3 --version)
          echo "- Python: $PYTHON_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  test-setup-go:
    name: "Test: setup-go"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: ./actions/setup-go
        with:
          install-deps: "false"
      - name: Verify
        run: |
          echo "## setup-go test" >> "$GITHUB_STEP_SUMMARY"
          GO_VERSION=$(go version)
          echo "- Go: $GO_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  test-post-comment:
    name: "Test: post-comment"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: ./actions/post-comment
        with:
          body: "Self-test comment from `self-test.yml`"
          marker: "<!-- self-test -->"
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify
        run: |
          echo "## post-comment test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  test-gate-consume:
    name: "Test: gate-consume"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Create mock gate context
        run: |
          mkdir -p gate-context
          cat > gate-context/gate-context.json << 'EOF'
          {
            "gate_version": "1.0",
            "pr_number": 1,
            "head_sha": "abc123",
            "gate_result": "success",
            "changes": {"backend": true, "frontend": false},
            "secrets_ok": true,
            "runner_env": {"python": "3.12", "node": "22"},
            "timestamp": "2026-01-01T00:00:00Z"
          }
          EOF
      - uses: ./actions/gate-consume
        id: gate
        with:
          area: backend
      - name: Verify
        run: |
          echo "## gate-consume test" >> "$GITHUB_STEP_SUMMARY"
          echo "- gate-ok: ${{ steps.gate.outputs.gate-ok }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- should-run: ${{ steps.gate.outputs.should-run }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.gate.outputs.gate-ok }}" != "true" ]; then
            echo "::error::gate-consume failed"
            exit 1
          fi
          if [ "${{ steps.gate.outputs.should-run }}" != "true" ]; then
            echo "::error::gate-consume should-run mismatch"
            exit 1
          fi
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  test-check-secrets:
    name: "Test: check-secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: ./actions/check-secrets
        with:
          required-secrets: "GITHUB_TOKEN"
          optional-secrets: "NONEXISTENT_SECRET"
      - name: Verify
        run: |
          echo "## check-secrets test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  test-check-dockerfile:
    name: "Test: check-dockerfile"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Create test Dockerfile
        run: |
          cat > /tmp/Dockerfile.test << 'EOF'
          FROM python:3.12-slim
          RUN apt-get update
          COPY . /app
          WORKDIR /app
          CMD ["python", "app.py"]
          EOF
      - uses: ./actions/check-dockerfile
        with:
          file: /tmp/Dockerfile.test
      - name: Verify
        run: |
          echo "## check-dockerfile test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed (warnings expected)" >> "$GITHUB_STEP_SUMMARY"

  test-run-lint:
    name: "Test: run-lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: ./actions/setup-python
        with:
          install-deps: "false"
      - uses: ./actions/run-lint
        with:
          tool: ruff
          level: warning
          reviewdog-reporter: github-check
      - name: Verify
        run: |
          echo "## run-lint test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"

  test-notify-slack:
    name: "Test: notify-slack (dry-run)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Verify action structure
        run: |
          echo "## notify-slack test" >> "$GITHUB_STEP_SUMMARY"
          if [ -f actions/notify-slack/action.yml ]; then
            echo "- action.yml: exists" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Missing notify-slack/action.yml"
            exit 1
          fi
