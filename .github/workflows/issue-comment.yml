# ─────────────────────────────────────────────────────────────────────────────
# issue-comment.yml — slash-command handler.
# ─────────────────────────────────────────────────────────────────────────────
# `if:` filters out comments without a leading `/` to avoid spinning up
# runners on chit-chat. parse-command then validates the command set and
# author association; execute-command applies the change.
#
# Security: comment body is fully controlled by the commenter. We only
# pass it through env vars to scripts that allow-list commands; the
# scripts never `eval` user input.
# ─────────────────────────────────────────────────────────────────────────────
name: issue-comment

on:
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: issue-comment-${{ github.event.issue.number }}-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  command:
    name: Slash Command
    if: contains(github.event.comment.body, '/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }

      - id: parse
        uses: ./actions/issue/parse-command
        with:
          comment-body:        ${{ github.event.comment.body }}
          author-association:  ${{ github.event.comment.author_association }}

      - if: steps.parse.outputs.command != 'none'
        uses: ./actions/issue/execute-command
        with:
          command:      ${{ steps.parse.outputs.command }}
          args:         ${{ steps.parse.outputs.args }}
          authorized:   ${{ steps.parse.outputs.authorized }}
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ github.token }}
