# ─────────────────────────────────────────────────────────────────────────────
# release-docker.yml — tag-driven Docker image release with cosign keyless.
# ─────────────────────────────────────────────────────────────────────────────
# Triggers on git tags `v*` or manual dispatch. Pushes:
#   ghcr.io/<owner>/<image>:<semver>           — `1.2.3`
#   ghcr.io/<owner>/<image>:<major>.<minor>    — `1.2`
#   ghcr.io/<owner>/<image>:sha-<short-sha>    — immutable per-commit
#
# Cosign keyless OIDC signs the resulting digest. `id-token: write` is
# required for the OIDC flow.
# ─────────────────────────────────────────────────────────────────────────────
name: release-docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build (defaults to current ref)
        required: false
        default: ""
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
      registry:
        type: string
        required: false
        default: ghcr.io

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ inputs.registry || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ${{ inputs.registry || 'ghcr.io' }}/${{ github.repository_owner }}/${{ inputs.image-name || github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-

      - id: push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc6bb6  # v6.18.0
        with:
          push:       "true"
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          provenance: "true"
          sbom:       "true"
          cache-from: "type=gha"
          cache-to:   "type=gha,mode=max"

      - name: Sign image (Cosign keyless)
        uses: ./actions/ci/sign-image
        with:
          image-ref: ${{ inputs.registry || 'ghcr.io' }}/${{ github.repository_owner }}/${{ inputs.image-name || github.event.repository.name }}@${{ steps.push.outputs.digest }}
