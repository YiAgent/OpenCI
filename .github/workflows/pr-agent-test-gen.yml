# ─────────────────────────────────────────────────────────────────────────────
# pr-agent-test-gen.yml — file scaffolded tests as artifacts for review.
# ─────────────────────────────────────────────────────────────────────────────
# The agent never pushes to the PR; output is uploaded as an artifact and
# scanned by gitleaks. A separate human-driven path (consumer's choice)
# decides whether to commit them. SPEC §P4-32: "Agent only-read,
# Reporter only-write".
#
# Reusable: consumers call this from a thin wrapper on
#   pull_request: [opened, synchronize].
#   Secret: anthropic-api-key (optional; skipped gracefully when unset).
# ─────────────────────────────────────────────────────────────────────────────
name: pr-agent-test-gen

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr-number: { required: true, description: "PR to scaffold tests for" }
  workflow_call:
    inputs:
      pr-number:
        type: string
        required: false
        default: ""
        description: "PR number (falls back to github.event.pull_request.number)"
    secrets:
      anthropic-api-key:
        required: false

permissions: {}

concurrency:
  group: pr-agent-test-gen-${{ github.event.pull_request.number || github.event.inputs.pr-number }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Skip when ANTHROPIC_API_KEY missing
        id: gate
        env:
          K: ${{ secrets.anthropic-api-key }}
        run: |
          if [ -z "$K" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Test Gen Skipped::ANTHROPIC_API_KEY missing"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: ./actions/pr/agent-test-gen
        with:
          pr-number:         ${{ github.event.pull_request.number || github.event.inputs.pr-number || inputs.pr-number }}
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
