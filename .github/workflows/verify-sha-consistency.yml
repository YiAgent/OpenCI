# ─────────────────────────────────────────────────────────────────────────────
# verify-sha-consistency.yml — enforce manifest.yml SHA single source of truth.
#
# Invariants enforced (see docs/SPEC.md §3 + Appendix C):
#   1. Every uses: in workflows / actions matches the SHA in manifest.yml.
#   2. No @v* / @main / @master / non-40-char references.
#   3. No references to actions still in manifest-pending.yml.
#   4. No references to actions deprecated in SPEC Appendix B.2.
#
# Security note: this workflow does not consume any untrusted PR input — it
# only reads files at the merge commit and runs deterministic shell scripts.
# ─────────────────────────────────────────────────────────────────────────────
name: verify-sha-consistency

on:
  pull_request:
    paths:
      - "manifest.yml"
      - "manifest-pending.yml"
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
      - ".github/scripts/verify-sha-consistency.sh"
      - "actions/**/*.yml"
      - "actions/**/*.yaml"
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: verify-sha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify SHA Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Run verify-sha-consistency.sh
        shell: bash
        run: bash .github/scripts/verify-sha-consistency.sh
