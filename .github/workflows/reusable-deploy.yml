name: "Reusable: Deploy"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging/production)"
        type: string
        default: "staging"
      target:
        description: "Deploy target (ecs/ec2/lambda/vercel)"
        type: string
        default: "ecs"
      image-tag:
        description: "Image tag to deploy"
        type: string
        default: ""
    outputs:
      deployment-url:
        description: "Deployment URL"
        value: ${{ jobs.deploy.outputs.deployment-url }}
      deploy-status:
        description: "Deployment status"
        value: ${{ jobs.deploy.outputs.status }}

permissions: {}

concurrency:
  group: deploy-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Deploy to ECS
        if: inputs.target == 'ecs'
        id: deploy
        env:
          IMAGE_TAG: ${{ inputs.image-tag || github.sha }}
        run: |
          echo "Deploying $IMAGE_TAG to ${{ inputs.environment }} ECS"
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "url=https://${{ inputs.environment }}.example.com" >> "$GITHUB_OUTPUT"
          echo "## Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ECS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: $IMAGE_TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to EC2
        if: inputs.target == 'ec2'
        id: deploy-ec2
        env:
          IMAGE_TAG: ${{ inputs.image-tag || github.sha }}
        run: |
          echo "Deploying $IMAGE_TAG to ${{ inputs.environment }} EC2"
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "url=https://${{ inputs.environment }}.example.com" >> "$GITHUB_OUTPUT"

      - name: Deploy to Lambda
        if: inputs.target == 'lambda'
        id: deploy-lambda
        env:
          IMAGE_TAG: ${{ inputs.image-tag || github.sha }}
        run: |
          echo "Deploying $IMAGE_TAG to ${{ inputs.environment }} Lambda"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        if: inputs.target == 'vercel'
        id: deploy-vercel
        run: |
          echo "Deploying to ${{ inputs.environment }} Vercel"
          echo "status=success" >> "$GITHUB_OUTPUT"

  smoke-test:
    name: "Smoke Test"
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Health check
        run: |
          URL="${{ needs.deploy.outputs.deployment-url }}"
          if [ -n "$URL" ]; then
            echo "Checking $URL/health..."
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/health" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
                echo "Health check passed"
                exit 0
              fi
              echo "Attempt $i: HTTP $HTTP_CODE"
              sleep 5
            done
            echo "::warning::Health check did not pass within timeout"
          fi
