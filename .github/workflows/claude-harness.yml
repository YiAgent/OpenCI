# ─────────────────────────────────────────────────────────────────────────────
# claude-harness.yml — reusable workflow form of the AI single-entry contract.
# ─────────────────────────────────────────────────────────────────────────────
# DESIGN GOAL: OpenCI is the single pre-configured entrypoint into Claude.
# Callers only need to supply task + prompt/prompt-path + api-key.
# All MCP servers, CI permissions, tool whitelists, and Slack env are
# pre-configured here so every downstream service shares the same setup.
#
# Inputs / secrets / outputs MUST stay byte-identical to the composite — a
# caller can swap one for the other without changing wiring.
# ─────────────────────────────────────────────────────────────────────────────
name: claude-harness

on:
  workflow_call:
    inputs:
      task:
        type: string
        required: true
      prompt:
        description: "Direct prompt text or slash command (e.g. /heartbeat). Takes precedence over prompt-path."
        type: string
        required: false
        default: ""
      prompt-path:
        description: "Path to prompt file (relative to caller repo). Falls back to built-in prompts/<task>.md."
        type: string
        required: false
        default: ""
      context:
        type: string
        required: false
        default: "{}"
      model:
        type: string
        required: false
        default: "claude-sonnet-4-5-20250929"
      max-turns:
        type: number
        required: false
        default: 10
      api-provider:
        description: "API provider: anthropic (default). Reserved for future multi-provider support."
        type: string
        required: false
        default: "anthropic"
      timeout-minutes:
        description: "Job timeout in minutes."
        type: number
        required: false
        default: 15
    secrets:
      api-key:
        description: "Anthropic API key."
        required: true
      api-base-url:
        description: "Custom Anthropic API base URL (optional)."
        required: false
      github-token:
        description: "GitHub token for MCP tool access and CI data queries. Defaults to GITHUB_TOKEN."
        required: false
      slack-webhook:
        description: "Slack webhook URL available to Claude as SLACK_WEBHOOK_URL env var."
        required: false
    outputs:
      result:
        description: AI output text.
        value: ${{ jobs.ai-task.outputs.result }}
      comment-id:
        description: Sticky PR/Issue comment id.
        value: ${{ jobs.ai-task.outputs.comment-id }}

permissions: {}

concurrency:
  group: claude-harness-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Check required secrets
        env:
          API_KEY: ${{ secrets.api-key }}
        run: bash .github/scripts/preflight-secrets.sh --required "API_KEY" --optional ""

  ai-task:
    name: AI Task
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write        # Claude can git commit memory updates
      pull-requests: write   # Sticky comments on PRs
      issues: write          # Claude can create/update GitHub Issues
      actions: read          # Claude can query workflow runs & job logs (CI triage)
      id-token: write
    outputs:
      result:     ${{ steps.harness.outputs.result }}
      comment-id: ${{ steps.harness.outputs.comment-id }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          token: ${{ secrets.github-token || github.token }}

      - name: Run claude-harness composite
        id: harness
        uses: ./actions/_common/claude-harness
        with:
          task:           ${{ inputs.task }}
          prompt:         ${{ inputs.prompt }}
          prompt-path:    ${{ inputs.prompt-path }}
          context:        ${{ inputs.context }}
          model:          ${{ inputs.model }}
          max-turns:      ${{ inputs.max-turns }}
          api-key:        ${{ secrets.api-key }}
          api-base-url:   ${{ secrets.api-base-url }}
          github-token:   ${{ secrets.github-token || github.token }}
          slack-webhook:  ${{ secrets.slack-webhook }}
