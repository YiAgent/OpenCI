# on-deps.yml — event entry that flips Renovate patch PRs to auto-merge.
name: on-deps

on:
  pull_request_target:
    types: [opened, labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
concurrency:
  group: on-deps-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  deps:
    uses: ./.github/workflows/reusable/deps.yml
