# on-ci.yml — event entry that fires the CI pipeline on every merge to main.
# Forwards all inputs/secrets to ci.yml. External users should
# write their own on-ci.yml against `uses: YiAgent/OpenCI/.github/workflows/ci.yml@v3`.
name: on-ci

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  actions: read
  security-events: write
  pull-requests: write
concurrency:
  group: on-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      openci-ref:      ${{ github.sha }}
      registry:        ghcr.io
      image-name:      ${{ vars.IMAGE_NAME || github.event.repository.name }}
      enable-ai-smoke: true
    secrets: inherit

  harness-test:
    name: Harness Tests (BATS)
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Install bats
        run: |
          set -euo pipefail
          if ! command -v bats >/dev/null 2>&1; then
            sudo apt-get install -y bats
          fi
      - name: Run BATS test suite
        run: bats tests/ --recursive
