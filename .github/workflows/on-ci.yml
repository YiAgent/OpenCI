# on-ci.yml — event entry that fires the CI pipeline on every merge to main.
# Forwards all inputs/secrets to reusable/ci.yml. External users should
# write their own on-ci.yml against `uses: YiAgent/OpenCI/.github/workflows/ci.yml@v3`.
name: on-ci

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  actions: read
  security-events: write
  pull-requests: write
concurrency:
  group: on-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      registry:        ghcr.io
      image-name:      ${{ vars.IMAGE_NAME || github.event.repository.name }}
      enable-ai-smoke: true
    secrets: inherit
