# ─────────────────────────────────────────────────────────────────────────────
# stg.yml — Staging deploy (reusable workflow, SPEC §5.4).
# ─────────────────────────────────────────────────────────────────────────────
# Two deploy paths, select via deploy-type input:
#   docker (default) — SSH + docker compose/run on a remote host.
#   k8s              — kubectl set image on a Kubernetes cluster.
#
# Serial chain (stg failures should stop fast and notify):
#   preflight → deploy-docker|deploy-k8s → run-migration? → smoke-test → notify-deployed
#
# Image is consumed BY DIGEST. The caller is responsible for not pointing at
# a tag — the deploy atom does NOT do tag→digest resolution to avoid hidden
# tag-shift races.
#
# Concurrency: same-ref deploys serialize but never cancel; we never want
# to abandon a half-applied deployment.
#
# Security: no consumer-supplied PR field is used in shell here. The
# health-url, app-name, etc. are repo-controlled inputs.
# ─────────────────────────────────────────────────────────────────────────────
name: stg

on:
  workflow_call:
    inputs:
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; use a tag like v2 in production).
        required: false
        type: string
        default: main
      runner:
        description: Runner label to use for all jobs. Defaults to ubuntu-latest for open-source compatibility.
        required: false
        type: string
        default: ubuntu-latest
      image-digest:
        description: Container image digest (required for deploy).
        type: string
        required: true
      image-name:
        type: string
        required: false
      registry:
        type: string
        required: false
        default: ghcr.io
      app-name:
        type: string
        required: false
      health-url:
        type: string
        required: false
      k8s-namespace:
        type: string
        required: false
        default: staging
      run-migration:
        type: boolean
        required: false
        default: false
      deploy-type:
        description: "Deployment mechanism: docker (default) or k8s."
        type: string
        required: false
        default: docker
      ssh-host:
        description: Target server hostname or IP (docker deploy).
        type: string
        required: false
        default: ""
      ssh-user:
        description: SSH user on the target server (docker deploy).
        type: string
        required: false
        default: deploy
      ssh-port:
        description: SSH port (docker deploy).
        type: string
        required: false
        default: "22"
      deploy-mode:
        description: "Docker deploy mode: compose (default) or run."
        type: string
        required: false
        default: compose
      compose-file:
        description: Path to docker-compose.yml on the target server.
        type: string
        required: false
        default: docker-compose.yml
      compose-project-dir:
        description: Working directory on the server that contains docker-compose.yml.
        type: string
        required: false
        default: "~"
      docker-run-args:
        description: Extra args appended to `docker run` (run mode only).
        type: string
        required: false
        default: ""
    secrets:
      kubeconfig-stg:
        required: false
      ssh-key-stg:
        required: false
      slack-webhook-url:
        required: false
      sentry-token:
        required: false
      datadog-api-key:
        required: false
      posthog-api-key:
        required: false
      langsmith-api-key:
        required: false
      axiom-token:
        required: false
    outputs:
      deploy-time:
        description: ISO 8601 deploy timestamp.
        value: ${{ jobs.deploy-k8s.outputs.deploy-time || jobs.deploy-docker.outputs.deploy-time }}

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: deploy-stg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 2
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - name: Probe secrets
        env:
          DEPLOY_TYPE:       ${{ inputs.deploy-type }}
          KUBECONFIG_STG:    ${{ secrets.kubeconfig-stg }}
          SSH_KEY_STG:       ${{ secrets.ssh-key-stg }}
          SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
        run: |
          if [ "$DEPLOY_TYPE" = "k8s" ]; then
            bash .github/scripts/preflight-secrets.sh \
              --required "KUBECONFIG_STG" \
              --optional "SLACK_WEBHOOK_URL"
          else
            bash .github/scripts/preflight-secrets.sh \
              --required "SSH_KEY_STG" \
              --optional "SLACK_WEBHOOK_URL"
          fi
      - uses: ./.openci/actions/deploy/preflight
        with:
          environment:  staging
          health-url:   ${{ inputs.health-url }}

  coverage-gate:
    name: Coverage Gate
    needs: preflight
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    # Optional: when no coverage artifact is available, skip silently. When
    # an artifact exists, compute % and block stg deploy on shortfall.
    if: ${{ vars.STG_COVERAGE_THRESHOLD != '' }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: coverage-report
          path: .
        continue-on-error: true
      - uses: ./.openci/actions/pr/check-coverage
        with:
          coverage-file:      ${{ vars.STG_COVERAGE_FILE || 'coverage/lcov.info' }}
          coverage-threshold: ${{ vars.STG_COVERAGE_THRESHOLD || '60' }}
          mode:               stg

  perf-baseline:
    name: Perf Baseline
    needs: preflight
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    # Soft-gate: never blocks the deploy. Flip enforce-perf to "true" via
    # repo var once you have a stable baseline (SPEC §aicert #23).
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/stg/perf-baseline
        with:
          perf-dir:                  ${{ vars.PERF_DIR              || 'tests/perf' }}
          enforce-perf:              ${{ vars.ENFORCE_PERF          || 'false' }}
          regress-threshold-percent: ${{ vars.PERF_REGRESS_THRESHOLD || '30' }}
          health-url:                ${{ vars.STG_HEALTH_URL        || '' }}

  deploy-k8s:
    name: Deploy K8s
    if: inputs.deploy-type == 'k8s'
    needs: [preflight, coverage-gate, perf-baseline]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    outputs:
      deploy-time: ${{ steps.deploy.outputs.deploy-time }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - id: deploy
        uses: ./.openci/actions/stg/deploy-k8s
        with:
          app-name:      ${{ inputs.app-name }}
          image-ref:     ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          k8s-namespace: ${{ inputs.k8s-namespace }}
          kubeconfig:    ${{ secrets.kubeconfig-stg }}

  deploy-docker:
    name: Deploy Docker
    if: inputs.deploy-type != 'k8s'
    needs: [preflight, coverage-gate, perf-baseline]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    outputs:
      deploy-time:    ${{ steps.deploy.outputs.deploy-time }}
      previous-image: ${{ steps.deploy.outputs.previous-image }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF:     ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - id: deploy
        uses: ./.openci/actions/deploy/docker
        with:
          app-name:            ${{ inputs.app-name }}
          image-ref:           ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          ssh-host:            ${{ inputs.ssh-host }}
          ssh-user:            ${{ inputs.ssh-user }}
          ssh-port:            ${{ inputs.ssh-port }}
          ssh-key:             ${{ secrets.ssh-key-stg }}
          deploy-mode:         ${{ inputs.deploy-mode }}
          compose-file:        ${{ inputs.compose-file }}
          compose-project-dir: ${{ inputs.compose-project-dir }}
          docker-run-args:     ${{ inputs.docker-run-args }}

  run-migration:
    name: Run Migration
    needs: [deploy-k8s, deploy-docker]
    if: >-
      inputs.run-migration == true &&
      (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/run-migration
        with:
          environment:   staging
          migration-cmd: ${{ vars.MIGRATION_APPLY_CMD || 'false' }}

  smoke-test:
    name: Smoke Test
    needs: [deploy-k8s, deploy-docker, run-migration]
    if: >-
      always() &&
      (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success') &&
      (needs.run-migration.result == 'success' || needs.run-migration.result == 'skipped')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/stg/smoke-test
        with:
          health-url: ${{ inputs.health-url }}

  auto-rollback-docker:
    name: Auto Rollback (Docker)
    needs: [deploy-docker, smoke-test]
    if: >-
      always() &&
      needs.smoke-test.result == 'failure' &&
      needs.deploy-docker.result == 'success'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF:     ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/deploy/auto-rollback-docker
        with:
          app-name:            ${{ inputs.app-name }}
          previous-image:      ${{ needs.deploy-docker.outputs.previous-image }}
          failed-image:        ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          ssh-host:            ${{ inputs.ssh-host }}
          ssh-user:            ${{ inputs.ssh-user }}
          ssh-port:            ${{ inputs.ssh-port }}
          ssh-key:             ${{ secrets.ssh-key-stg }}
          deploy-mode:         ${{ inputs.deploy-mode }}
          compose-file:        ${{ inputs.compose-file }}
          compose-project-dir: ${{ inputs.compose-project-dir }}
          docker-run-args:     ${{ inputs.docker-run-args }}
          github-token:        ${{ github.token }}
          environment:         staging

  notify-observability:
    name: Notify Observability
    needs: [deploy-k8s, deploy-docker, smoke-test]
    # Always emit deploy markers when the deploy itself succeeded — even if
    # smoke-test then failed. The deploy *did* happen, downstream tools need
    # to know about it for accurate metric overlay.
    if: always() && (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/integrations/notify-deploy
        with:
          environment: stg
          version:     ${{ inputs.image-digest }}
          git-sha:     ${{ github.sha }}
          app-name:    ${{ inputs.app-name }}
          enable-sentry:     ${{ vars.ENABLE_SENTRY    || 'false' }}
          enable-datadog:    ${{ vars.ENABLE_DATADOG   || 'false' }}
          enable-posthog:    ${{ vars.ENABLE_POSTHOG   || 'false' }}
          enable-langsmith:  ${{ vars.ENABLE_LANGSMITH || 'false' }}
          enable-axiom:      ${{ vars.ENABLE_AXIOM     || 'false' }}
          sentry-token:      ${{ secrets.sentry-token }}
          sentry-org:        ${{ vars.SENTRY_ORG }}
          sentry-project:    ${{ vars.SENTRY_PROJECT }}
          datadog-api-key:   ${{ secrets.datadog-api-key }}
          datadog-site:      ${{ vars.DATADOG_SITE     || 'datadoghq.com' }}
          posthog-api-key:   ${{ secrets.posthog-api-key }}
          posthog-host:      ${{ vars.POSTHOG_HOST     || 'app.posthog.com' }}
          langsmith-api-key: ${{ secrets.langsmith-api-key }}
          langsmith-project: ${{ vars.LANGSMITH_PROJECT }}
          axiom-token:       ${{ secrets.axiom-token }}
          axiom-dataset:     ${{ vars.AXIOM_DATASET }}

  schedule-prd-dispatch:
    name: Schedule PRD Dispatch
    needs: [deploy-k8s, deploy-docker, smoke-test]
    if: needs.smoke-test.result == 'success' && vars.PRD_OBSERVATION_MINUTES != ''
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/schedule-prd-dispatch
        with:
          image-digest:        ${{ inputs.image-digest }}
          # In a real consumer the stg image digest is the same as the
          # one passed in (we don't rebuild between ci.yml and stg.yml).
          stg-image-digest:    ${{ inputs.image-digest }}
          stg-deploy-time:     ${{ needs.deploy-k8s.outputs.deploy-time || needs.deploy-docker.outputs.deploy-time }}
          image-name:          ${{ inputs.image-name }}
          app-name:            ${{ inputs.app-name }}
          observation-minutes: ${{ vars.PRD_OBSERVATION_MINUTES || '30' }}
          github-token:        ${{ github.token }}

  notify-deployed:
    name: Notify Deployed
    needs: [deploy-k8s, deploy-docker, smoke-test]
    if: always()
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/notify-deployed
        with:
          environment: staging
          status:      ${{ (needs.smoke-test.result == 'success' && (needs.deploy-k8s.result == 'success' || needs.deploy-docker.result == 'success')) && 'success' || 'failure' }}
          app-name:    ${{ inputs.app-name }}
          image-ref:   ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ inputs.image-digest }}
          webhook-url: ${{ secrets.slack-webhook-url }}
          run-url:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
