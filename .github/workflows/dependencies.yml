# dependencies.yml — event entry that flips Renovate patch PRs to auto-merge.
name: dependencies

on:
  pull_request_target:
    types: [opened, labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
concurrency:
  group: dependencies-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  deps:
    uses: YiAgent/OpenCI/.github/workflows/deps.yml@82512decf54fb293d228645c833dbebe15a0e420
    with:
      runner: blacksmith-2vcpu-ubuntu-2404
