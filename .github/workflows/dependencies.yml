# dependencies.yml — event entry that flips Renovate patch PRs to auto-merge.
name: dependencies

on:
  pull_request_target:
    types: [opened, labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
concurrency:
  group: dependencies-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  deps:
    uses: ./.github/workflows/reusable/deps.yml
    with:
      runner: blacksmith-32vcpu-ubuntu-2404
