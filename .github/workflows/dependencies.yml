# dependencies.yml — event entry that flips Renovate patch PRs to auto-merge.
name: dependencies

on:
  pull_request_target:
    types: [opened, labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
concurrency:
  group: dependencies-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  deps:
    uses: YiAgent/OpenCI/.github/workflows/reusable/deps.yml@be43e4efd2f14f2a3da7d5264356a9e6774c8ef1
    with:
      runner: blacksmith-2vcpu-ubuntu-2404
