# dependencies.yml — event entry that flips Renovate patch PRs to auto-merge.
name: dependencies

on:
  pull_request_target:
    types: [opened, labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
concurrency:
  group: dependencies-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  deps:
    uses: YiAgent/OpenCI/.github/workflows/reusable-deps.yml@91fd642295071618053e08eb6492888c1d499ce6
    with:
      runner: blacksmith-2vcpu-ubuntu-2404
