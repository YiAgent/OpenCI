# ─────────────────────────────────────────────────────────────────────────────
# agent-triage.yml — scheduled Sentry → GitHub-issue triage.
# ─────────────────────────────────────────────────────────────────────────────
# Default cron: every hour. Skips gracefully when SENTRY_TOKEN or
# ANTHROPIC_API_KEY is unset.
#
# Reusable: consumers call this from a thin wrapper with their own cron
#   schedule. Secrets: anthropic-api-key + sentry-token (both optional).
#   Repo vars consumed: SENTRY_ORG, SENTRY_PROJECT.
# ─────────────────────────────────────────────────────────────────────────────
name: agent-triage

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  workflow_call:
    secrets:
      anthropic-api-key:
        required: false
      sentry-token:
        required: false

permissions: {}

concurrency:
  group: agent-triage
  cancel-in-progress: false

jobs:
  triage:
    name: Error Triage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: ./actions/_common/error-triage
        with:
          sentry-token:      ${{ secrets.sentry-token || secrets.SENTRY_TOKEN }}
          sentry-org:        ${{ vars.SENTRY_ORG }}
          sentry-project:    ${{ vars.SENTRY_PROJECT }}
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.anthropic-api-key || secrets.ANTHROPIC_API_KEY }}
