# ─────────────────────────────────────────────────────────────────────────────
# prd-verify-fix.yml — confirm Sentry fixes after a prd deploy.
# ─────────────────────────────────────────────────────────────────────────────
# Listens for prd.yml completion. When success, find the PR that drove
# the deploy (commit message → linked PR), parse `Fixes #N`, run
# verify-fix atom for each.
# ─────────────────────────────────────────────────────────────────────────────
name: prd-verify-fix

on:
  workflow_run:
    workflows: [prd]
    types: [completed]

permissions: {}

concurrency:
  group: prd-verify-fix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Fix
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }

      - name: Find associated PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO:     ${{ github.repository }}
          SHA:      ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          pr_num="$(gh api -X GET "repos/${REPO}/commits/${SHA}/pulls" --jq '.[0].number // empty')"
          if [ -z "$pr_num" ]; then
            echo "::notice title=Verify Fix::no PR associated with $SHA — skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true"     >> "$GITHUB_OUTPUT"
            echo "number=$pr_num"  >> "$GITHUB_OUTPUT"
          fi

      - name: Wait 15 minutes for fix to settle
        if: steps.pr.outputs.found == 'true'
        run: sleep 900

      - name: Verify fix per ref
        if: steps.pr.outputs.found == 'true'
        uses: ./actions/prd/verify-fix
        with:
          pr-number:      ${{ steps.pr.outputs.number }}
          github-token:   ${{ github.token }}
          sentry-token:   ${{ secrets.SENTRY_TOKEN }}
          sentry-org:     ${{ vars.SENTRY_ORG }}
          sentry-project: ${{ vars.SENTRY_PROJECT }}
