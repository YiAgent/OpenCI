# ─────────────────────────────────────────────────────────────────────────────
# pr-summary.yml — aggregate workflow_run results into ONE sticky PR comment.
# ─────────────────────────────────────────────────────────────────────────────
# Listens to completed PR / CI runs, finds the related PR, fetches the
# latest run for each in-scope workflow, and writes a single sticky comment
# tagged `<!-- pr-summary-bot -->`. Subsequent triggers update that comment
# in place (see actions/_common/upsert-pr-comment).
#
# Concurrency cancels older summary runs as soon as a newer event fires —
# the latest summary always wins, so we never race-write conflicting
# comment bodies.
#
# Security: only repo-internal data is consumed (workflow run results +
# our own commit metadata). PR number comes from the workflow_run payload
# and is forwarded via env-vars only.
# ─────────────────────────────────────────────────────────────────────────────
name: pr-summary

on:
  workflow_run:
    workflows:
      - pr
      - ci
    types: [completed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to summarise (manual debug)
        required: true

permissions: {}

concurrency:
  group: pr-summary-${{ github.event.workflow_run.pull_requests[0].number || github.event.inputs.pr-number || github.run_id }}
  cancel-in-progress: true

jobs:
  summarise:
    name: Summarise PR Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      checks: read
      pull-requests: write
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.pull_requests[0] != null
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }

      - name: Resolve PR number
        id: pr
        env:
          DISPATCH_PR: ${{ github.event.inputs.pr-number }}
          RUN_PR:      ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          pr="${DISPATCH_PR:-$RUN_PR}"
          if [ -z "$pr" ]; then
            echo "::error title=PR Summary::Could not resolve PR number"
            exit 1
          fi
          echo "number=$pr" >> "$GITHUB_OUTPUT"

      - name: Build summary markdown
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          REPO:     ${{ github.repository }}
          PR:       ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          # Workflows we care about. Add new ones here as the catalogue grows.
          workflows=(pr ci pr-summary verify-sha-consistency)

          head_sha="$(gh api -X GET "repos/${REPO}/pulls/${PR}" --jq '.head.sha')"

          rows=""
          worst="success"
          for wf in "${workflows[@]}"; do
            row="$(gh api -X GET "repos/${REPO}/actions/workflows/${wf}.yml/runs" \
              -f head_sha="$head_sha" -f per_page=1 \
              --jq '.workflow_runs[0] | {status, conclusion, html_url, id}' 2>/dev/null || true)"

            if [ -z "$row" ] || [ "$row" = "null" ]; then
              rows="${rows}| \`${wf}\` | _no run_ | — |"$'\n'
              continue
            fi

            status="$(jq -r '.status'     <<<"$row")"
            concl="$(jq  -r '.conclusion // empty' <<<"$row")"
            url="$(jq    -r '.html_url'   <<<"$row")"

            case "$concl" in
              success)   icon="✅" ;;
              failure|timed_out|cancelled) icon="❌"; worst="failure" ;;
              "")        icon="⏳"; [ "$worst" = success ] && worst="pending" ;;
              *)         icon="❓"; [ "$worst" = success ] && worst="pending" ;;
            esac
            rows="${rows}| \`${wf}\` | ${icon} ${concl:-${status}} | [run](${url}) |"$'\n'
          done

          summary_emoji="✅"
          [ "$worst" = "failure" ] && summary_emoji="❌"
          [ "$worst" = "pending" ] && summary_emoji="⏳"

          body=$(cat <<EOF
<!-- pr-summary-bot -->
## ${summary_emoji} CI Summary

| Workflow | Status | Run |
| --- | --- | --- |
${rows}

_Updated automatically by openCI \`pr-summary\` for commit \`${head_sha:0:7}\`._
EOF
)
          {
            echo "body<<__OPENCI_EOF__"
            echo "$body"
            echo "__OPENCI_EOF__"
          } >> "$GITHUB_OUTPUT"

      - uses: ./actions/_common/upsert-pr-comment
        with:
          pr-number:    ${{ steps.pr.outputs.number }}
          marker:       "<!-- pr-summary-bot -->"
          body:         ${{ steps.build.outputs.body }}
          github-token: ${{ github.token }}
