# ─────────────────────────────────────────────────────────────────────────────
# flag-audit.yml — weekly feature-flag audit (reusable workflow).
# ─────────────────────────────────────────────────────────────────────────────
# Cron: Monday 23:00 Beijing = UTC 15:00. Walks the codebase for flag
# references, hands a summary to Claude, files a tech-debt issue.
#
# Consumers: call via workflow_call, or schedule independently.
# ─────────────────────────────────────────────────────────────────────────────
name: flag-audit

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:
    inputs:
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; use a tag like v2 in production).
        required: false
        type: string
        default: main
  workflow_call:
    inputs:
      model:
        description: Override the AI model name (e.g. `glm-5.1` for Zhipu via api-base-url).
        required: false
        type: string
        default: ""
      openci-ref:
        description: OpenCI ref to vendor for ./.openci/* references (default main; use a tag like v2 in production).
        required: false
        type: string
        default: main
    secrets:
      api-base-url:
        description: Custom Anthropic-compatible base URL (GLM, OpenRouter, self-hosted proxy).
        required: false
      anthropic-api-key:
        required: false

permissions: {}

concurrency:
  group: flag-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Flag Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - name: Resolve OpenCI workflow ref
        id: openci-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          OPENCI_REF_INPUT: ${{ inputs.openci-ref }}
        run: |
          # Prefer explicit caller input; otherwise parse from workflow_ref
          # ('owner/repo/.github/workflows/file.yml@refs/heads/<branch>'),
          # which only works when caller pinned a real OpenCI ref directly.
          if [ -n "${OPENCI_REF_INPUT:-}" ]; then
            REF="$OPENCI_REF_INPUT"
          else
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Checkout OpenCI for local actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: YiAgent/OpenCI
          ref: ${{ steps.openci-ref.outputs.ref }}
          path: .openci
          persist-credentials: false
      - uses: ./.openci/actions/_common/flag-audit
        with:
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
          api-base-url:      ${{ secrets.api-base-url }}
          model:             ${{ inputs.model }}
