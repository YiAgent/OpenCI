# ─────────────────────────────────────────────────────────────────────────────
# prd-terraform-drift.yml — advisory drift check (reusable workflow).
# ─────────────────────────────────────────────────────────────────────────────
# Daily cron + manual dispatch. Detects when prod resources diverge from
# committed terraform state. Advisory only — never blocks deploys.
# ─────────────────────────────────────────────────────────────────────────────
name: prd-terraform-drift

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  workflow_call:
    inputs:
      infra-dir:
        description: "Path to the Terraform infrastructure directory."
        type: string
        required: false
        default: "infrastructure"

permissions: {}

concurrency:
  group: prd-terraform-drift
  cancel-in-progress: false

jobs:
  drift:
    name: Terraform Drift
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      id-token: write
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: ./actions/prd/terraform-drift
        with:
          infra-dir:    ${{ inputs.infra-dir || vars.TERRAFORM_DIR || 'infrastructure' }}
          github-token: ${{ github.token }}
