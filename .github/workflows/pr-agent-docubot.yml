# ─────────────────────────────────────────────────────────────────────────────
# pr-agent-docubot.yml — answer @docubot mentions on issues + PRs.
# ─────────────────────────────────────────────────────────────────────────────
# Triggered by issue_comment with `@docubot` somewhere in the body. Strips
# the mention, hands the rest as the question.
#
# Reusable: consumers call this from a thin wrapper on
#   issue_comment: [created].
#   Secret: anthropic-api-key (optional; skipped gracefully when unset).
#
# Security: comment body is fully attacker-controlled. We only forward it
# via env: into the docubot atom, which feeds it as `question` JSON
# field to Claude — no shell exec.
# ─────────────────────────────────────────────────────────────────────────────
name: pr-agent-docubot

on:
  issue_comment:
    types: [created]
  workflow_call:
    secrets:
      anthropic-api-key:
        required: false

permissions: {}

concurrency:
  group: pr-agent-docubot-${{ github.event.issue.number }}-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  reply:
    name: Docubot Reply
    if: contains(github.event.comment.body, '@docubot')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }

      - name: Skip when ANTHROPIC_API_KEY missing
        id: gate
        env:
          K: ${{ secrets.anthropic-api-key }}
        run: |
          if [ -z "$K" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Docubot Skipped::ANTHROPIC_API_KEY missing"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Strip mention
        if: steps.gate.outputs.skip != 'true'
        id: q
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          q="$(printf '%s' "$BODY" | sed -E 's/@docubot//gi' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          {
            echo "question<<__OPENCI_EOF__"
            echo "$q"
            echo "__OPENCI_EOF__"
          } >> "$GITHUB_OUTPUT"

      - if: steps.gate.outputs.skip != 'true'
        uses: ./actions/_common/docubot
        with:
          question:          ${{ steps.q.outputs.question }}
          number:            ${{ github.event.issue.number }}
          github-token:      ${{ github.token }}
          anthropic-api-key: ${{ secrets.anthropic-api-key }}
