# agent.yml — manual entry to the AI harness for ad-hoc tasks.
# OpenCI ships agent.yml (the harness) + skills/ (canonical prompts).
# Consumers compose their own scheduled / event-driven workflows that
# invoke agent.yml with task + prompt-path + context — see EvolveCI's
# .github/workflows/agent-{daily,weekly,heartbeat,triage}.yml for the
# pattern. This shim only exposes a manual dispatch surface for OpenCI's
# own dogfooding.
name: agent

on:
  workflow_dispatch:
    inputs:
      task:
        required: true
        type: string
        default: claude-default
      prompt:
        required: false
        type: string
        default: ""
      prompt-path:
        required: false
        type: string
        default: ""
      model:
        required: false
        type: string
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read

concurrency:
  group: agent-${{ inputs.task }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  agent:
    uses: YiAgent/OpenCI/.github/workflows/reusable-agent.yml@5ff2579c96dd77692b3db49ed991ecb8edece8f9
    with:
      task: ${{ inputs.task }}
      prompt: ${{ inputs.prompt }}
      prompt-path: ${{ inputs.prompt-path }}
      model: ${{ inputs.model }}
      runner: blacksmith-2vcpu-ubuntu-2404
    # Repo secrets are UPPER_SNAKE_CASE; the reusable declares kebab-case
    # secret inputs, so `secrets: inherit` does not match. Explicit map.
    secrets:
      api-key:         ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:    ${{ secrets.ANTHROPIC_BASE_URL }}
      slack-webhook:   ${{ secrets.SLACK_WEBHOOK_URL }}
      sentry-token:    ${{ secrets.SENTRY_TOKEN }}
      datadog-api-key: ${{ secrets.DD_API_KEY }}
