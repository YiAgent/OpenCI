# agent.yml — manual entry to the AI harness for ad-hoc tasks.
# OpenCI ships agent.yml (the harness) + skills/ (canonical prompts).
# Consumers compose their own scheduled / event-driven workflows that
# invoke agent.yml with task + prompt-path + context — see EvolveCI's
# .github/workflows/agent-{daily,weekly,heartbeat,triage}.yml for the
# pattern. This shim only exposes a manual dispatch surface for OpenCI's
# own dogfooding.
name: agent

on:
  workflow_dispatch:
    inputs:
      task:
        required: true
        type: string
        default: claude-default
      prompt:
        required: false
        type: string
        default: ""
      prompt-path:
        required: false
        type: string
        default: ""
      model:
        required: false
        type: string
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read

concurrency:
  group: agent-${{ inputs.task }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  agent:
    uses: YiAgent/OpenCI/.github/workflows/reusable/agent.yml@d280a64a392b7f1a3e906246286ca983e610f920
    with:
      task: ${{ inputs.task }}
      prompt: ${{ inputs.prompt }}
      prompt-path: ${{ inputs.prompt-path }}
      model: ${{ inputs.model }}
      runner: blacksmith-32vcpu-ubuntu-2404
    secrets: inherit
