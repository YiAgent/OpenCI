# ci.yml — event entry that fires the CI pipeline on every merge to main.
# Forwards all inputs/secrets to reusable-ci.yml. External users should
# write their own ci.yml against `uses: YiAgent/OpenCI/.github/workflows/reusable-ci.yml@v3`.
name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  actions: write
  issues: write
  security-events: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: YiAgent/OpenCI/.github/workflows/reusable-ci.yml@16b77dfbfda91520249d66955c97335a23b3f147
    with:
      openci-ref:      ${{ github.sha }}
      registry:        ghcr.io
      image-name:      ${{ vars.IMAGE_NAME || github.event.repository.name }}
      enable-ai-smoke: true
      runner:          blacksmith-2vcpu-ubuntu-2404
    secrets: inherit

  harness-test:
    name: Harness Tests (BATS)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with: { persist-credentials: false }
      - name: Install bats
        run: |
          set -euo pipefail
          if ! command -v bats >/dev/null 2>&1; then
            sudo apt-get install -y bats
          fi
      - name: Run BATS test suite
        run: bats tests/ --recursive
