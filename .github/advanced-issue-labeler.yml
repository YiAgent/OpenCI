policy:
  - section:
      - id: [area]
        block-list: []
        label:
          - name: area:frontend
            keys: [frontend]
          - name: area:backend
            keys: [backend]
          - name: area:ai
            keys: [ai]
          - name: area:ci
            keys: [ci]
          - name: area:docs
            keys: [docs]
          - name: area:infra
            keys: [infra]
          - name: area:other
            keys: [other]
      - id: [severity]
        block-list: []
        label:
          - name: severity:blocker
            keys: [blocker, "blocker (production outage / data loss)"]
